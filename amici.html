<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drakonia - Compagni d'Arme</title>
    <link rel="icon" type="image/png" href="icon/icon_192x192.png">
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #b8860b; --leather: #2c1e11; --parchment: #f4e4bc; --blood: #8b0000; }
        body { 
            background: #1a110a url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--parchment); font-family: 'Almendra', serif; margin: 0; padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-family: 'Grenze Gotisch'; color: var(--gold); text-align: center; font-size: 2.5rem; }
        
        .section { 
            background: rgba(244, 228, 188, 0.1); border: 2px solid var(--gold); 
            padding: 20px; border-radius: 8px; margin-bottom: 20px; 
        }

        input { 
            background: var(--parchment); border: 1px solid var(--gold); padding: 10px; 
            font-family: 'MedievalSharp'; width: calc(100% - 24px); margin-bottom: 10px;
        }

        .btn { 
            background: var(--leather); color: var(--gold); border: 1px solid var(--gold);
            padding: 10px 20px; cursor: pointer; font-family: 'Grenze Gotisch'; width: 100%;
        }
        .btn:hover { background: var(--blood); color: white; }

        .friend-list { list-style: none; padding: 0; }
        .friend-card { 
            background: var(--parchment); color: var(--leather); padding: 15px; 
            margin-bottom: 10px; border-radius: 5px; display: flex; 
            justify-content: space-between; align-items: center;
            border-left: 5px solid var(--gold);
        }
        .status-pending { font-style: italic; font-size: 0.8rem; color: #666; }
        .btn-accept { background: #2ecc71; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <a href="hub.html" style="color: var(--gold); text-decoration: none;">⬅ Torna al Portale</a>
    <h1>Compagni d'Arme</h1>

    <div class="section">
        <h3>Aggiungi Amico</h3>
        <p style="font-size: 0.8rem;">Inserisci il codice unico del tuo compagno:</p>
        <input type="text" id="friend-code" placeholder="Es: DRK-123456">
        <button class="btn" onclick="sendFriendRequest()">INVIA RICHIESTA</button>
    </div>

    <div id="pending-section" class="section" style="display:none;">
        <h3>Richieste In Sospeso</h3>
        <ul id="pending-list" class="friend-list"></ul>
    </div>

    <div class="section">
        <h3>I Tuoi Compagni</h3>
        <ul id="friends-list" class="friend-list"></ul>
    </div>
</div>

<script>
    const firebaseConfig = { /* ... la tua config ... */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
        if (user) {
            loadFriends(user);
            loadPendingRequests(user);
        } else {
            window.location.href = 'login.html';
        }
    });

    async function sendFriendRequest() {
        const code = document.getElementById('friend-code').value.trim().toUpperCase();
        const user = auth.currentUser;

        if (!code) return;

        try {
            // Cerchiamo l'utente che ha quel codice
            const userSnap = await db.collection("users").where("myCode", "==", code).get();
            
            if (userSnap.empty) {
                alert("Codice non trovato negli Annali!");
                return;
            }

            const friendData = userSnap.docs[0].data();
            const friendId = userSnap.docs[0].id;

            if (friendId === user.uid) {
                alert("Non puoi essere amico di te stesso, viandante!");
                return;
            }

            // Calcolo scadenza (1 settimana)
            const oneWeek = 7 * 24 * 60 * 60 * 1000;
            const expiresAt = Date.now() + oneWeek;

            await db.collection("friendships").add({
                senderId: user.uid,
                senderName: user.displayName || "Un ignoto",
                receiverId: friendId,
                receiverCode: code,
                status: "pending",
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                expiresAt: firebase.firestore.Timestamp.fromMillis(expiresAt),
                users: [user.uid, friendId]
            });

            alert("Richiesta inviata! L'amico ha 7 giorni per accettare.");
            document.getElementById('friend-code').value = "";

        } catch (e) {
            console.error(e);
        }
    }

    function loadFriends(user) {
        // Mostra solo le amicizie accettate
        db.collection("friendships")
            .where("users", "array-contains", user.uid)
            .where("status", "==", "accepted")
            .onSnapshot(async snap => {
                const list = document.getElementById('friends-list');
                list.innerHTML = "";

                for (let doc of snap.docs) {
                    const data = doc.data();
                    const friendId = data.users.find(id => id !== user.uid);
                    
                    // Recuperiamo il vero nome dell'amico invece del codice
                    const friendSnap = await db.collection("users").doc(friendId).get();
                    const name = friendSnap.exists ? (friendSnap.data().username || "Guerriero") : "Ignoto";

                    list.innerHTML += `
                        <li class="friend-card">
                            <span>🛡️ ${name}</span>
                            <span style="font-size: 0.7rem; color: var(--gold)">Amici Storici</span>
                        </li>
                    `;
                }
            });
    }

    function loadPendingRequests(user) {
        const now = firebase.firestore.Timestamp.now();

        db.collection("friendships")
            .where("receiverId", "==", user.uid)
            .where("status", "==", "pending")
            .onSnapshot(snap => {
                const list = document.getElementById('pending-list');
                const section = document.getElementById('pending-section');
                list.innerHTML = "";

                let count = 0;
                snap.forEach(doc => {
                    const data = doc.data();
                    
                    // Verifica se la richiesta è scaduta
                    if (data.expiresAt.toMillis() < Date.now()) {
                        // Eliminiamo la richiesta scaduta silenziosamente
                        db.collection("friendships").doc(doc.id).delete();
                    } else {
                        count++;
                        list.innerHTML += `
                            <li class="friend-card">
                                <div>
                                    <b>${data.senderName}</b> vorrebbe allearsi<br>
                                    <small>Scade tra: ${Math.round((data.expiresAt.toMillis() - Date.now()) / (1000*60*60*24))} giorni</small>
                                </div>
                                <button class="btn-accept" onclick="acceptFriend('${doc.id}')">ACCETTA</button>
                            </li>
                        `;
                    }
                });
                section.style.display = count > 0 ? "block" : "none";
            });
    }

    async function acceptFriend(docId) {
        await db.collection("friendships").doc(docId).update({
            status: "accepted"
        });
        alert("Alleanza stretta!");
    }
</script>
</body>
</html>
