<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drakonia - Compagni d'Arme</title>
    <link rel="icon" type="image/png" href="icon/icon_192x192.png">
    <link rel="apple-touch-icon" href="icon/icon_192x192.png">
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #b8860b; --leather: #2c1e11; --parchment: #f4e4bc; --blood: #8b0000; --ink: #1a110a; }
        body { 
            background: var(--ink) url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--parchment); font-family: 'Almendra', serif; margin: 0; padding: 15px;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-family: 'Grenze Gotisch'; color: var(--gold); text-align: center; font-size: 2.5rem; margin-bottom: 10px; }
        .section { background: rgba(244, 228, 188, 0.05); border: 1px solid rgba(184, 134, 11, 0.3); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input { background: var(--parchment); border: 2px solid var(--gold); padding: 12px; font-family: 'MedievalSharp'; width: 100%; box-sizing: border-box; margin-bottom: 15px; font-size: 1.1rem; color: var(--ink); }
        .btn { background: var(--leather); color: var(--gold); border: 1px solid var(--gold); padding: 12px 20px; cursor: pointer; font-family: 'Grenze Gotisch'; width: 100%; font-size: 1.2rem; transition: 0.3s; }
        .btn:hover { background: var(--blood); color: white; }
        .requests-toggle { background: var(--leather); color: var(--gold); border: 2px solid var(--gold); padding: 12px; border-radius: 50px; cursor: pointer; font-family: 'Grenze Gotisch'; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; position: relative; }
        #request-count { background: var(--blood); color: white; border-radius: 50%; padding: 2px 8px; font-weight: bold; font-size: 0.9rem; display: none; border: 1px solid var(--gold); }
        #pending-panel { display: none; background: rgba(0,0,0,0.6); border: 2px double var(--gold); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .friend-list { list-style: none; padding: 0; margin: 0; }
        .card-item { background: var(--parchment); color: var(--ink); padding: 15px; margin-bottom: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--gold); }
        .action-btns { display: flex; gap: 8px; }
        .btn-sm { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-family: 'MedievalSharp'; }
        .btn-acc { background: #27ae60; color: white; }
        .btn-rej { background: var(--blood); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <a href="index.html" style="color: var(--gold); text-decoration: none; font-family: 'MedievalSharp';">⬅ Portale</a>
        <span id="my-display-code" style="font-size: 0.8rem; opacity: 0.7;">Caricamento codice...</span>
    </div>

    <h1>Compagni d'Arme</h1>

    <div id="btn-toggle-requests" class="requests-toggle" onclick="toggleRequests()">
        <span>📜 MISSIVE IN SOSPESO</span>
        <span id="request-count">0</span>
    </div>

    <div id="pending-panel">
        <ul id="pending-list" class="friend-list"></ul>
    </div>

    <div class="section">
        <h3 style="margin-top:0; font-family:'Grenze Gotisch'; color:var(--gold);">Cerca Alleato</h3>
        <input type="text" id="friend-code-input" placeholder="Codice (es: DRK-12345)">
        <button id="submit-request-btn" class="btn" onclick="sendFriendRequest()">INVIA RICHIESTA</button>
    </div>

    <div class="section">
        <h3 style="margin-top:0; font-family:'Grenze Gotisch'; color:var(--gold);">I Tuoi Fedeli Compagni</h3>
        <ul id="friends-list" class="friend-list"></ul>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
        authDomain: "drakonia-companion.firebaseapp.com",
        projectId: "drakonia-companion",
        storageBucket: "drakonia-companion.firebasestorage.app",
        messagingSenderId: "803844500713",
        appId: "1:803844500713:web:c902b67f4e395bd20c9478"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
        if (user) {
            console.log("Utente loggato:", user.uid);
            setupMyCodeDisplay(user);
            loadFriends(user);
            loadPendingRequests(user);
        } else {
            window.location.href = 'login.html';
        }
    });

    async function setupMyCodeDisplay(user) {
        try {
            const doc = await db.collection("users").doc(user.uid).get();
            if (doc.exists) {
                const code = doc.data().myCode || "Non generato";
                document.getElementById('my-display-code').innerText = "Il tuo codice: " + code;
            }
        } catch (e) { console.error("Errore caricamento codice:", e); }
    }

    async function sendFriendRequest() {
        const inputField = document.getElementById('friend-code-input');
        const btn = document.getElementById('submit-request-btn');
        const code = inputField.value.trim().toUpperCase();
        const user = auth.currentUser;

        if (!code) { alert("Inserisci un codice!"); return; }

        // Disabilita tasto per evitare invii multipli
        btn.disabled = true;
        btn.innerText = "VERIFICA IN CORSO...";

        console.log("Ricerca codice:", code);

        try {
            // Cerchiamo l'utente con quel codice
            const userSnap = await db.collection("users").where("myCode", "==", code).get();

            if (userSnap.empty) {
                alert("Codice errato o inesistente negli Annali!");
                btn.disabled = false;
                btn.innerText = "INVIA RICHIESTA";
                return;
            }

            const targetId = userSnap.docs[0].id;
            const targetData = userSnap.docs[0].data();

            if (targetId === user.uid) {
                alert("Non puoi essere amico di te stesso!");
                btn.disabled = false;
                btn.innerText = "INVIA RICHIESTA";
                return;
            }

            // Calcola scadenza (7 giorni da ora)
            const expiresAt = Date.now() + (7 * 24 * 60 * 60 * 1000);

            // Aggiunge il documento alla collezione "friendships"
            // Firestore la crea automaticamente se non esiste
            await db.collection("friendships").add({
                senderId: user.uid,
                senderName: user.displayName || "Un Viandante",
                receiverId: targetId,
                receiverCode: code,
                status: "pending",
                expiresAt: firebase.firestore.Timestamp.fromMillis(expiresAt),
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                users: [user.uid, targetId]
            });

            alert("Missiva inviata! L'alleato ha 7 giorni per accettare.");
            inputField.value = "";
        } catch (e) {
            console.error("Errore durante l'invio della richiesta:", e);
            alert("Errore del server. Riprova più tardi.");
        } finally {
            btn.disabled = false;
            btn.innerText = "INVIA RICHIESTA";
        }
    }

    function loadPendingRequests(user) {
        db.collection("friendships")
            .where("receiverId", "==", user.uid)
            .where("status", "==", "pending")
            .onSnapshot(snap => {
                const list = document.getElementById('pending-list');
                const badge = document.getElementById('request-count');
                list.innerHTML = "";
                let count = 0;

                snap.forEach(doc => {
                    const data = doc.data();
                    // Controllo scadenza real-time
                    if (data.expiresAt && data.expiresAt.toMillis() < Date.now()) {
                        db.collection("friendships").doc(doc.id).delete();
                    } else {
                        count++;
                        list.innerHTML += `
                            <li class="card-item">
                                <div><b>${data.senderName}</b></div>
                                <div class="action-btns">
                                    <button class="btn-sm btn-acc" onclick="updateFriend('${doc.id}', 'accepted')">SÌ</button>
                                    <button class="btn-sm btn-rej" onclick="updateFriend('${doc.id}', 'no')">NO</button>
                                </div>
                            </li>`;
                    }
                });
                badge.innerText = count;
                badge.style.display = count > 0 ? "inline-block" : "none";
            });
    }

    function loadFriends(user) {
        db.collection("friendships")
            .where("users", "array-contains", user.uid)
            .where("status", "==", "accepted")
            .onSnapshot(async snap => {
                const list = document.getElementById('friends-list');
                list.innerHTML = "";

                for (const d of snap.docs) {
                    const data = d.data();
                    const friendId = data.users.find(id => id !== user.uid);
                    
                    const fDoc = await db.collection("users").doc(friendId).get();
                    const name = fDoc.exists ? (fDoc.data().username || "Compagno") : "Ignoto";

                    list.innerHTML += `
                        <li class="card-item">
                            <span>🛡️ ${name}</span>
                            <span style="font-size:0.8rem; color:var(--gold);">ALLEATO</span>
                        </li>`;
                }
            });
    }

    async function updateFriend(docId, status) {
        try {
            if (status === 'accepted') {
                await db.collection("friendships").doc(docId).update({ status: 'accepted' });
            } else {
                await db.collection("friendships").doc(docId).delete();
            }
        } catch (e) { console.error("Errore aggiornamento:", e); }
    }

    function toggleRequests() {
        const panel = document.getElementById('pending-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }
</script>
</body>
</html>
