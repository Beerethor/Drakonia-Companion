<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drakonia - Compagni d'Arme</title>
    <link rel="icon" type="image/png" href="icon/icon_192x192.png">
    <link rel="apple-touch-icon" href="icon/icon_192x192.png">
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #b8860b; --leather: #2c1e11; --parchment: #f4e4bc; --blood: #8b0000; --ink: #1a110a; }
        body { 
            background: var(--ink) url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--parchment); font-family: 'Almendra', serif; margin: 0; padding: 15px;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-family: 'Grenze Gotisch'; color: var(--gold); text-align: center; font-size: 2.5rem; margin: 10px 0; }
        
        .section { background: rgba(244, 228, 188, 0.05); border: 1px solid rgba(184, 134, 11, 0.3); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        
        input { background: var(--parchment); border: 2px solid var(--gold); padding: 12px; font-family: 'MedievalSharp'; width: 100%; box-sizing: border-box; margin-bottom: 15px; font-size: 1.1rem; color: var(--ink); }
        
        .btn { background: var(--leather); color: var(--gold); border: 1px solid var(--gold); padding: 12px 20px; cursor: pointer; font-family: 'Grenze Gotisch'; width: 100%; font-size: 1.2rem; transition: 0.3s; }
        .btn:hover { background: var(--blood); color: white; }
        
        .requests-toggle { background: var(--leather); color: var(--gold); border: 2px solid var(--gold); padding: 12px; border-radius: 50px; cursor: pointer; font-family: 'Grenze Gotisch'; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        #request-count { background: var(--blood); color: white; border-radius: 50%; padding: 2px 8px; font-weight: bold; font-size: 0.9rem; display: none; border: 1px solid var(--gold); }
        
        #pending-panel { display: none; background: rgba(0,0,0,0.6); border: 2px double var(--gold); padding: 15px; border-radius: 8px; margin-bottom: 20px; animation: fadeIn 0.3s; }
        
        .friend-list { list-style: none; padding: 0; margin: 0; }
        .card-item { background: var(--parchment); color: var(--ink); padding: 15px; margin-bottom: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .action-btns { display: flex; gap: 8px; }
        .btn-sm { padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; font-family: 'MedievalSharp'; font-weight: bold; }
        .btn-acc { background: #27ae60; color: white; }
        .btn-rej { background: var(--blood); color: white; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <a href="index.html" style="color: var(--gold); text-decoration: none; font-family: 'MedievalSharp';">⬅ Portale</a>
        <span id="my-display-code" style="font-size: 0.9rem; color: var(--gold); font-weight: bold;">DRK-XXXXX</span>
    </div>

    <h1>Compagni d'Arme</h1>

    <div id="btn-toggle-requests" class="requests-toggle" onclick="toggleRequests()">
        <span>📜 MISSIVE IN SOSPESO</span>
        <span id="request-count">0</span>
    </div>

    <div id="pending-panel">
        <ul id="pending-list" class="friend-list"></ul>
    </div>

    <div class="section">
        <h3 style="margin-top:0; font-family:'Grenze Gotisch'; color:var(--gold);">Cerca Alleato</h3>
        <input type="text" id="friend-code-input" placeholder="Inserisci Codice Amico">
        <button id="submit-request-btn" class="btn" onclick="sendFriendRequest()">INVIA RICHIESTA</button>
    </div>

    <div class="section">
        <h3 style="margin-top:0; font-family:'Grenze Gotisch'; color:var(--gold);">I Tuoi Fedeli Compagni</h3>
        <ul id="friends-list" class="friend-list"></ul>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
        authDomain: "drakonia-companion.firebaseapp.com",
        projectId: "drakonia-companion",
        storageBucket: "drakonia-companion.firebasestorage.app",
        messagingSenderId: "803844500713",
        appId: "1:803844500713:web:c902b67f4e395bd20c9478"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let currentUserName = "Un Viandante";

    auth.onAuthStateChanged(user => {
        if (user) {
            setupUserSession(user);
            loadPendingRequests(user);
            loadFriends(user);
        } else {
            window.location.href = 'login.html';
        }
    });

    async function setupUserSession(user) {
        const doc = await db.collection("users").doc(user.uid).get();
        if (doc.exists) {
            const data = doc.data();
            currentUserName = data.username || "Eroe";
            document.getElementById('my-display-code').innerText = "Il tuo codice: " + (data.friendCode || "---");
        }
    }

    async function sendFriendRequest() {
        const input = document.getElementById('friend-code-input');
        const code = input.value.trim().toUpperCase();
        if (!code) return alert("Inserisci un codice!");

        try {
            const snap = await db.collection("users").where("friendCode", "==", code).get();
            if (snap.empty) return alert("Nessun eroe trovato con questo codice.");
            
            const targetId = snap.docs[0].id;
            if (targetId === auth.currentUser.uid) return alert("Non puoi inviare una richiesta a te stesso.");

            // Controllo se esiste già un legame
            const existing = await db.collection("friendships")
                .where("users", "array-contains", auth.currentUser.uid)
                .get();
            
            const alreadyLinked = existing.docs.some(d => d.data().users.includes(targetId));
            if (alreadyLinked) return alert("Siete già alleati o c'è una missiva pendente.");

            await db.collection("friendships").add({
                senderId: auth.currentUser.uid,
                senderName: currentUserName,
                receiverId: targetId,
                status: "pending",
                users: [auth.currentUser.uid, targetId],
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("Missiva inviata con successo!");
            input.value = "";
        } catch (e) { alert("Errore: " + e.message); }
    }

    function loadPendingRequests(user) {
        db.collection("friendships")
            .where("receiverId", "==", user.uid)
            .where("status", "==", "pending")
            .onSnapshot(snap => {
                const list = document.getElementById('pending-list');
                const badge = document.getElementById('request-count');
                list.innerHTML = snap.empty ? "<li style='color:white; text-align:center;'>Nessuna missiva in arrivo.</li>" : "";
                
                badge.innerText = snap.size;
                badge.style.display = snap.size > 0 ? "inline-block" : "none";

                snap.forEach(doc => {
                    const data = doc.data();
                    list.innerHTML += `
                        <li class="card-item">
                            <b>${data.senderName}</b>
                            <div class="action-btns">
                                <button class="btn-sm btn-acc" onclick="updateFriend('${doc.id}', 'accepted')">ACCETTA</button>
                                <button class="btn-sm btn-rej" onclick="updateFriend('${doc.id}', 'rejected')">RIFIUTA</button>
                            </div>
                        </li>`;
                });
            });
    }

    async function updateFriend(docId, status) {
        try {
            if (status === 'accepted') {
                // AGGIORNAMENTO SICURO: Modifichiamo solo il documento della friendship
                await db.collection("friendships").doc(docId).update({ 
                    status: 'accepted' 
                });
                alert("Alleanza suggellata!");
            } else {
                await db.collection("friendships").doc(docId).delete();
            }
        } catch (e) { 
            console.error(e);
            alert("Errore di permessi. Verifica le regole del database."); 
        }
    }

    function loadFriends(user) {
        db.collection("friendships")
            .where("users", "array-contains", user.uid)
            .where("status", "==", "accepted")
            .onSnapshot(async snap => {
                const list = document.getElementById('friends-list');
                list.innerHTML = snap.empty ? "<li style='opacity:0.6; color:white;'>Non hai ancora alleati.</li>" : "";
                
                for (const d of snap.docs) {
                    const friendId = d.data().users.find(id => id !== user.uid);
                    const fDoc = await db.collection("users").doc(friendId).get();
                    const name = fDoc.exists ? (fDoc.data().username || "Alleato") : "Ignoto";
                    
                    list.innerHTML += `
                        <li class="card-item">
                            <span>🛡️ <b>${name}</b></span>
                            <button class="btn-sm btn-rej" onclick="updateFriend('${d.id}', 'remove')">ELIMINA</button>
                        </li>`;
                }
            });
    }

    function toggleRequests() {
        const panel = document.getElementById('pending-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }
</script>
</body>
</html>
