<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Drakonia - Database Regole</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root {
            --parchment: #f4e4bc;
            --ink: #2c1e11;
            --gold: #b8860b;
            --dark-gold: #8a6508;
            --border: #4a321f;
            --blood: #8b0000;
        }

        body {
            background: #120d08 url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--ink);
            font-family: 'Almendra', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .top-nav {
            width: 100%;
            background: #2c1e11 url('https://www.transparenttextures.com/patterns/black-linen.png');
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid var(--gold);
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            box-sizing: border-box;
        }

        .btn-home {
            background: var(--gold);
            color: white;
            border: 2px solid var(--dark-gold);
            padding: 10px 25px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-family: 'MedievalSharp', cursive;
            transition: 0.3s;
            box-shadow: 2px 2px 0 #000;
        }

        .btn-home:hover {
            background: var(--blood);
            transform: scale(1.05);
        }

        #ruleSearch {
            width: 100%;
            max-width: 400px;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid var(--gold);
            background: #3d2b1d;
            color: var(--parchment);
            font-family: 'Almendra', serif;
            font-size: 1rem;
        }

        header h1 {
            font-family: 'Grenze Gotisch', cursive;
            color: var(--gold);
            font-size: 4rem;
            margin: 40px 0 10px;
            text-shadow: 3px 3px 6px #000;
            letter-spacing: 4px;
        }

        .database-container {
            max-width: 1100px;
            width: 90%;
            margin: 30px auto 60px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .category-card {
            background: var(--parchment) url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            border: 2px solid var(--border);
            outline: 4px double var(--border);
            outline-offset: -10px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.6);
            position: relative;
        }

        .category-card:hover {
            transform: translateY(-8px) rotate(-1deg);
            background-color: #fff;
            outline-color: var(--gold);
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
        }

        .category-card span {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 15px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
        }

        .category-card h3 {
            margin: 0;
            font-family: 'MedievalSharp', cursive;
            font-size: 1.5rem;
            color: var(--ink);
            text-transform: uppercase;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #e9d5a3 url('https://www.transparenttextures.com/patterns/aged-paper.png');
            width: 90%;
            max-width: 850px;
            max-height: 85vh;
            padding: 50px;
            border: 10px double var(--border);
            overflow-y: auto;
            position: relative;
            box-shadow: 0 0 50px #000;
        }

        .close-btn {
            position: absolute;
            right: 25px; top: 15px;
            font-size: 40px;
            cursor: pointer;
            color: var(--blood);
            font-family: serif;
        }

        .selection-item {
            background: rgba(0, 0, 0, 0.05);
            margin: 15px 0;
            padding: 20px;
            border: 1px dashed var(--border);
            cursor: pointer;
            font-family: 'MedievalSharp', cursive;
            font-size: 1.3rem;
            transition: 0.2s;
        }

        .selection-item:hover {
            background: var(--gold);
            color: white;
            padding-left: 30px;
        }

        details {
            background: rgba(0,0,0,0.03);
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 4px;
        }

        summary {
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--blood);
            list-style: none;
        }

        summary::before {
            content: "📜 ";
        }

        .rule-block {
            padding: 8px 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .hidden { display: none; }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--ink); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 5px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="btn-home" onclick="window.location.href='index.html'">🏰 Torna alla Home</button>
        <input type="text" id="ruleSearch" onkeyup="filterRules()" placeholder="Cerca nel Codex (es. Forza, Fuoco, PE)...">
    </div>

    <header>
        <h1>Codex Drakonia</h1>
    </header>

    <div class="database-container" id="main-index">
        <div class="category-card" onclick="openSelection('generali')">
            <span>📜</span>
            <h3>Leggi Generali</h3>
        </div>
        <div class="category-card" onclick="openSelection('combattimento')">
            <span>⚔️</span>
            <h3>Arte della Guerra</h3>
        </div>
        <div class="category-card" onclick="openSelection('magia')">
            <span>🧙</span>
            <h3>Dottrina Arcana</h3>
        </div>
        <div class="category-card" onclick="openSelection('grimori')">
            <span>📖</span>
            <h3>Antichi Grimori</h3>
        </div>
        <div class="category-card" onclick="openSelection('equipaggiamento')">
            <span>🛡️</span>
            <h3>Armeria e Merci</h3>
        </div>
        <div class="category-card" onclick="openSelection('classi')">
            <span>🎭</span>
            <h3>Sentieri degli Eroi</h3>
        </div>
    </div>

    <div id="modal-selection" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('modal-selection')">&times;</span>
            <h2 id="selection-title" style="font-family: 'Grenze Gotisch'; font-size: 2.5rem; text-align: center;">Seleziona Documento</h2>
            <div id="selection-options"></div>
        </div>
    </div>

    <div id="modal-view" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('modal-view')">&times;</span>
            <h2 id="view-title" style="color: var(--blood); font-family: 'MedievalSharp'; text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px;">Dettaglio</h2>
            <div id="view-body"></div>
        </div>
    </div>

    <script>
        // Mappa dei file. Per le classi usiamo il file 'classi.json'
        const databaseMap = {
            'generali': ['general-rules.json', 'rules-data.json'],
            'combattimento': ['combat-rules.json'],
            'magia': ['magic-rules.json'],
            'grimori': ['sorcerer-grimoire.json', 'druid-grimoire.json'],
            'equipaggiamento': ['equipment-data.json'],
            'classi': ['Guerriero', 'Truffatore', 'Saggio', 'Stregone', 'Druido']
        };

        function filterRules() {
            let input = document.getElementById('ruleSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('category-card');
            for (let card of cards) {
                card.classList.toggle('hidden', !card.innerText.toLowerCase().includes(input));
            }
        }

        function openSelection(cat) {
            const options = databaseMap[cat];
            const container = document.getElementById('selection-options');
            document.getElementById('selection-title').innerText = "Archivi di: " + cat.toUpperCase();
            container.innerHTML = '';
            
            options.forEach(opt => {
                const item = document.createElement('div');
                item.className = 'selection-item';
                item.innerText = "➤ " + opt.replace('.json', '').replace(/-/g, ' ').toUpperCase();
                
                // Se la categoria è 'classi', passiamo true come secondo parametro
                item.onclick = () => showFinalRule(opt, cat === 'classi');
                container.appendChild(item);
            });
            document.getElementById('modal-selection').style.display = 'flex';
        }

        async function showFinalRule(name, isClassRequest) {
            const body = document.getElementById('view-body');
            document.getElementById('view-title').innerText = name.replace('.json', '').replace(/-/g, ' ').toUpperCase();
            body.innerHTML = "<p style='text-align:center;'>Consultando gli antichi tomi...</p>";
            document.getElementById('modal-view').style.display = 'flex';

            try {
                if (isClassRequest) {
                    // Carica il file classi.json e cerca l'eroe specifico
                    const response = await fetch('classi.json');
                    if (!response.ok) throw new Error("Archivio classi non trovato.");
                    const allHeroData = await response.json();
                    
                    if (allHeroData[name]) {
                        body.innerHTML = formatJsonToHtml(allHeroData[name]);
                    } else {
                        throw new Error("Dati eroe non trovati nell'archivio.");
                    }
                } else {
                    // Caricamento standard per gli altri file JSON
                    const response = await fetch(name);
                    if (!response.ok) throw new Error("Documento non trovato o corrotto.");
                    const data = await response.json();
                    body.innerHTML = formatJsonToHtml(data);
                }
            } catch (err) {
                body.innerHTML = `<p style="color:var(--blood); text-align:center;">Errore Arcano: ${err.message}</p>`;
            }
        }

        function formatJsonToHtml(obj) {
            let html = '';
            for (let key in obj) {
                let value = obj[key];
                let cleanKey = key.replace(/_/g, ' ').toUpperCase();

                if (Array.isArray(value)) {
                    html += `<details open><summary>${cleanKey}</summary><ul style="padding-left:20px;">`;
                    value.forEach(item => {
                        html += `<li>${typeof item === 'object' ? formatJsonToHtml(item) : item}</li>`;
                    });
                    html += `</ul></details>`;
                } else if (typeof value === 'object' && value !== null) {
                    html += `<details open><summary>${cleanKey}</summary><div style="padding-left:15px; border-left:2px solid var(--gold); margin:10px 0;">${formatJsonToHtml(value)}</div></details>`;
                } else {
                    html += `<div class="rule-block"><strong>${cleanKey}:</strong> ${value}</div>`;
                }
            }
            return html;
        }

        function closeModal(id) { 
            document.getElementById(id).style.display = 'none'; 
        }

        window.onclick = (event) => {
            if (event.target.className === 'modal') event.target.style.display = "none";
        }
    </script>
</body>
</html>
