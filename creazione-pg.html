<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drakonia - Creazione Personaggio</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #b8860b; --leather: #2c1e11; --parchment: #f4e4bc; --blood: #8b0000; --ink: #1a110a; }
        
        body { 
            background: #120d08 url('https://www.transparenttextures.com/patterns/dark-leather.png'); 
            color: var(--ink); font-family: 'Almendra', serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .btn-back {
            align-self: flex-start; background: var(--leather); border: 1px solid var(--gold);
            color: var(--gold); padding: 8px 15px; font-family: 'Grenze Gotisch';
            cursor: pointer; text-decoration: none; margin-bottom: 20px; transition: 0.3s;
        }

        .container { 
            max-width: 850px; width: 100%; background: var(--parchment); 
            padding: 40px; border: 8px solid transparent; 
            border-image: url('https://www.transparenttextures.com/patterns/dark-leather.png') 30 stretch;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9); box-sizing: border-box;
        }

        h1 { font-family: 'Grenze Gotisch'; text-align: center; font-size: 3rem; color: var(--leather); margin: 0 0 30px 0; border-bottom: 2px double var(--leather); }
        
        h2 { font-family: 'Grenze Gotisch'; color: var(--blood); border-bottom: 1px solid var(--gold); margin-top: 30px; }

        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-bottom: 20px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-family: 'MedievalSharp'; font-weight: bold; margin-bottom: 5px; color: var(--leather); }

        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid var(--leather); 
            background: rgba(255,255,255,0.6); font-family: 'Almendra'; font-size: 1.1rem;
            box-sizing: border-box;
        }

        .stat-input { text-align: center; font-size: 1.5rem; font-weight: bold; color: var(--blood); }

        .manual-box { 
            margin-top: 10px; padding: 15px; background: rgba(184, 134, 11, 0.1); 
            border: 1px dashed var(--gold); display: none; 
        }

        .btn-save { 
            background: var(--leather); color: var(--gold); padding: 20px; 
            border: 2px solid var(--gold); width: 100%; font-family: 'Grenze Gotisch'; 
            font-size: 1.8rem; cursor: pointer; transition: 0.3s; margin-top: 40px;
        }
        .btn-save:hover { background: var(--blood); color: white; box-shadow: 0 0 20px var(--gold); }
    </style>
</head>
<body>

    <a href="index.html" class="btn-back">« TORNA AL PORTALE</a>

    <div class="container">
        <h1>Nuovo Eroe</h1>

        <h2>Identità</h2>
        <div class="form-group">
            <label>Nome del Personaggio</label>
            <input type="text" id="pg-name" placeholder="Es: Grog lo Spacca-Crani">
        </div>

        <div class="form-group">
            <label>Campagna di Appartenenza</label>
            <select id="campaign-select" onchange="toggleManualCampaign(this.value)">
                <option value="">Caricamento cronache...</option>
            </select>
            <div id="manual-campaign-box" class="manual-box">
                <label>Inserimento Manuale Campagna</label>
                <input type="text" id="campaign-manual" placeholder="Nome della campagna non in lista">
            </div>
        </div>

        <div class="grid-stats">
            <div class="form-group">
                <label>Razza</label>
                <input type="text" id="pg-race" placeholder="Umano, Nano...">
            </div>
            <div class="form-group">
                <label>Classe</label>
                <input type="text" id="pg-class" placeholder="Guerriero, Mago...">
            </div>
            <div class="form-group">
                <label>Livello</label>
                <input type="number" id="pg-lvl" value="1">
            </div>
        </div>

        <h2>Attributi</h2>
        <div class="grid-stats">
            <div class="form-group">
                <label>FOR</label>
                <input type="number" id="st-for" class="stat-input" value="10">
            </div>
            <div class="form-group">
                <label>DES</label>
                <input type="number" id="st-des" class="stat-input" value="10">
            </div>
            <div class="form-group">
                <label>COS</label>
                <input type="number" id="st-cos" class="stat-input" value="10">
            </div>
            <div class="form-group">
                <label>INT</label>
                <input type="number" id="st-int" class="stat-input" value="10">
            </div>
            <div class="form-group">
                <label>SAG</label>
                <input type="number" id="st-sag" class="stat-input" value="10">
            </div>
            <div class="form-group">
                <label>CAR</label>
                <input type="number" id="st-car" class="stat-input" value="10">
            </div>
        </div>

        <h2>Equipaggiamento e Poteri</h2>
        <div class="form-group">
            <label>Abilità Speciali / Incantesimi</label>
            <textarea id="pg-skills" rows="4" placeholder="Elenca qui le tue doti uniche..."></textarea>
        </div>

        <div class="form-group">
            <label>Zaino ed Equipaggiamento</label>
            <textarea id="pg-items" rows="4" placeholder="Cosa porti con te?"></textarea>
        </div>

        <h2>La tua Storia</h2>
        <div class="form-group">
            <label>Biografia</label>
            <textarea id="pg-bio" rows="6" placeholder="Il passato dell'eroe..."></textarea>
        </div>

        <button class="btn-save" onclick="salvaPersonaggio()">📜 INCIDI NEGLI ANNALI</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
            authDomain: "drakonia-companion.firebaseapp.com",
            projectId: "drakonia-companion",
            storageBucket: "drakonia-companion.firebasestorage.app",
            messagingSenderId: "803844500713",
            appId: "1:803844500713:web:c902b67f4e395bd20c9478"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user) { caricaCampagneIscritto(user.uid); }
            else { window.location.href = 'login.html'; }
        });

        async function caricaCampagneIscritto(userId) {
            const select = document.getElementById('campaign-select');
            try {
                const snapshot = await db.collection("campagne").where("giocatori", "array-contains", userId).get();
                select.innerHTML = '<option value="">-- Seleziona --</option>';
                if (snapshot.empty) {
                    select.innerHTML += '<option value="manual">Nessuna iscrizione (Scrivi manuale)</option>';
                } else {
                    snapshot.forEach(doc => {
                        select.innerHTML += `<option value="${doc.data().titolo}">${doc.data().titolo}</option>`;
                    });
                    select.innerHTML += '<option value="manual">-- Altra (Manuale) --</option>';
                }
            } catch (e) { select.innerHTML = '<option value="manual">Errore (Scrivi manuale)</option>'; }
        }

        function toggleManualCampaign(val) {
            document.getElementById('manual-campaign-box').style.display = (val === 'manual') ? 'block' : 'none';
        }

        async function salvaPersonaggio() {
            const user = auth.currentUser;
            const selectVal = document.getElementById('campaign-select').value;
            const campagna = (selectVal === 'manual') ? document.getElementById('campaign-manual').value : selectVal;

            if (!document.getElementById('pg-name').value || !campagna) return alert("Inserisci Nome e Campagna!");

            const pg = {
                ownerId: user.uid,
                nome: document.getElementById('pg-name').value,
                campagna: campagna,
                razza: document.getElementById('pg-race').value,
                classe: document.getElementById('pg-class').value,
                livello: document.getElementById('pg-lvl').value,
                stats: {
                    for: document.getElementById('st-for').value,
                    des: document.getElementById('st-des').value,
                    cos: document.getElementById('st-cos').value,
                    int: document.getElementById('st-int').value,
                    sag: document.getElementById('st-sag').value,
                    car: document.getElementById('st-car').value
                },
                abilita: document.getElementById('pg-skills').value,
                oggetti: document.getElementById('pg-items').value,
                biografia: document.getElementById('pg-bio').value,
                dataCreazione: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection("characters").add(pg);
                alert("Personaggio creato con successo!");
                window.location.href = 'index.html';
            } catch (e) { alert("Errore: " + e.message); }
        }
    </script>
</body>
</html>
