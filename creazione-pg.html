<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drakonia - Creazione Personaggio</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #b8860b; --leather: #2c1e11; --parchment: #f4e4bc; --blood: #8b0000; --ink: #1a110a; }
        
        body { 
            background: #120d08 url('https://www.transparenttextures.com/patterns/dark-leather.png'); 
            color: var(--ink); font-family: 'Almendra', serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .btn-back {
            align-self: flex-start; background: var(--leather); border: 1px solid var(--gold);
            color: var(--gold); padding: 8px 15px; font-family: 'Grenze Gotisch';
            cursor: pointer; text-decoration: none; margin-bottom: 20px; transition: 0.3s;
        }
        .btn-back:hover { background: var(--blood); color: white; }

        .container { 
            max-width: 700px; width: 100%; background: var(--parchment); 
            padding: 30px; border: 8px solid transparent; 
            border-image: url('https://www.transparenttextures.com/patterns/dark-leather.png') 30 stretch;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); box-sizing: border-box;
        }

        h1 { font-family: 'Grenze Gotisch'; text-align: center; font-size: 2.5rem; color: var(--leather); margin-top: 0; border-bottom: 2px double var(--leather); }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-family: 'MedievalSharp'; font-weight: bold; margin-bottom: 5px; color: var(--blood); }

        input, select, textarea { 
            width: 100%; padding: 10px; border: 1px solid var(--leather); 
            background: rgba(255,255,255,0.5); font-family: 'Almendra'; font-size: 1.1rem;
            box-sizing: border-box;
        }

        .manual-box { 
            margin-top: 10px; padding: 15px; background: rgba(0,0,0,0.05); 
            border-left: 4px solid var(--gold); display: none; 
        }

        .btn-save { 
            background: var(--leather); color: var(--gold); padding: 15px; 
            border: 2px solid var(--gold); width: 100%; font-family: 'Grenze Gotisch'; 
            font-size: 1.5rem; cursor: pointer; transition: 0.3s; margin-top: 20px;
        }
        .btn-save:hover { background: var(--blood); color: white; box-shadow: 0 0 15px var(--gold); }

        .helper-text { font-size: 0.85rem; color: #555; font-style: italic; }
    </style>
</head>
<body>

    <a href="index.html" class="btn-back">« TORNA AL PORTALE</a>

    <div class="container">
        <h1>Incidi il tuo Nome</h1>
        
        <div class="form-group">
            <label>Nome dell'Eroe</label>
            <input type="text" id="pg-name" placeholder="Es: Valerius il Temerario">
        </div>

        <div class="form-group">
            <label>Assegna a una Campagna</label>
            <select id="campaign-select" onchange="toggleManualCampaign(this.value)">
                <option value="">Caricamento cronache...</option>
            </select>
            <p class="helper-text">Appaiono solo le campagne a cui il Master ti ha iscritto.</p>
            
            <div id="manual-campaign-box" class="manual-box">
                <label>Nome Campagna Manuale</label>
                <input type="text" id="campaign-manual" placeholder="Inserisci il nome manualmente">
            </div>
        </div>

        <div class="form-group">
            <label>Classe / Archetipo</label>
            <input type="text" id="pg-class" placeholder="Es: Paladino, Ladro, Mago dell'Accademia...">
        </div>

        <div class="form-group">
            <label>Storia e Background</label>
            <textarea id="pg-bio" rows="5" placeholder="Racconta brevemente le origini del tuo eroe..."></textarea>
        </div>

        <button class="btn-save" onclick="salvaPersonaggio()">📜 SIGILLA IL DESTINO</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
            authDomain: "drakonia-companion.firebaseapp.com",
            projectId: "drakonia-companion",
            storageBucket: "drakonia-companion.firebasestorage.app",
            messagingSenderId: "803844500713",
            appId: "1:803844500713:web:c902b67f4e395bd20c9478"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            if (user) {
                caricaCampagneIscritto(user.uid);
            } else {
                window.location.href = 'login.html';
            }
        });

        // 1. Carica le campagne dal database
        async function caricaCampagneIscritto(userId) {
            const select = document.getElementById('campaign-select');
            try {
                // Cerchiamo campagne dove l'utente è nell'array giocatori
                const snapshot = await db.collection("campagne")
                                         .where("giocatori", "array-contains", userId)
                                         .get();

                select.innerHTML = '<option value="">-- Seleziona una Campagna --</option>';

                if (snapshot.empty) {
                    select.innerHTML += '<option value="manual">Nessuna iscrizione trovata (Scrivi manualmente)</option>';
                } else {
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        select.innerHTML += `<option value="${data.titolo}">${data.titolo}</option>`;
                    });
                    select.innerHTML += '<option value="manual">-- Altra (Scrivi manualmente) --</option>';
                }
            } catch (e) {
                console.error(e);
                select.innerHTML = '<option value="manual">Errore caricamento (Scrivi manualmente)</option>';
            }
        }

        // 2. Gestione visualizzazione campo manuale
        function toggleManualCampaign(value) {
            const box = document.getElementById('manual-campaign-box');
            box.style.display = (value === 'manual') ? 'block' : 'none';
        }

        // 3. Funzione di salvataggio finale
        async function salvaPersonaggio() {
            const user = auth.currentUser;
            const nome = document.getElementById('pg-name').value;
            const classe = document.getElementById('pg-class').value;
            const bio = document.getElementById('pg-bio').value;
            
            // Logica per determinare il nome della campagna
            const selectVal = document.getElementById('campaign-select').value;
            const campagnaFinale = (selectVal === 'manual') ? 
                                    document.getElementById('campaign-manual').value : 
                                    selectVal;

            if (!nome || !campagnaFinale) {
                alert("Un eroe deve avere almeno un nome e una campagna!");
                return;
            }

            const nuovoPG = {
                ownerId: user.uid,
                ownerNome: user.displayName || "Anonimo",
                nome: nome,
                campagna: campagnaFinale,
                classe: classe,
                biografia: bio,
                dataCreazione: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection("characters").add(nuovoPG);
                alert("Il tuo eroe è stato iscritto negli annali di Drakonia!");
                window.location.href = 'index.html';
            } catch (e) {
                alert("Errore durante il salvataggio: " + e.message);
            }
        }
    </script>
</body>
</html>
