<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drakonia - Creazione Eroe</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #b8860b; --leather: #2c1e11; --parchment: #f4e4bc; }
        
        body { 
            background: #120d08 url('https://www.transparenttextures.com/patterns/dark-leather.png'); 
            color: var(--leather); font-family: 'Almendra', serif; margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }

        .sheet-container {
            background: var(--parchment) url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            width: 100%; max-width: 800px; padding: 40px;
            border: 20px solid transparent;
            border-image: url('https://www.transparenttextures.com/patterns/dark-leather.png') 30 stretch;
            box-shadow: 0 0 50px black;
            position: relative;
        }

        h1 { font-family: 'Grenze Gotisch'; text-align: center; font-size: 3rem; margin-top: 0; border-bottom: 2px solid var(--leather); }

        .grid-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        
        .input-group { margin-bottom: 10px; }
        label { display: block; font-weight: bold; font-family: 'Grenze Gotisch'; font-size: 1.1rem; }
        input, textarea, select { 
            width: 100%; padding: 8px; border: none; border-bottom: 1px solid var(--leather);
            background: rgba(0,0,0,0.05); font-family: 'Almendra'; font-size: 1.1rem; box-sizing: border-box;
        }

        .stat-box { border: 2px solid var(--leather); padding: 10px; text-align: center; border-radius: 10px; }
        .stat-box input { text-align: center; font-size: 1.5rem; background: none; }

        .inventory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        .btn-save {
            background: var(--leather); color: var(--gold); border: 2px solid var(--gold);
            padding: 15px; width: 100%; font-family: 'Grenze Gotisch'; font-size: 1.8rem;
            cursor: pointer; margin-top: 30px; transition: 0.3s;
        }
        .btn-save:hover { background: #3d2a18; transform: scale(1.02); }

        .header-meta { background: rgba(0,0,0,0.1); padding: 10px; margin-bottom: 20px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="sheet-container">
    <div class="header-meta">
        <div style="display:flex; justify-content: space-between;">
            <span>Eroe di: <strong id="owner-name">...</strong></span>
            <div class="input-group" style="width: 60%;">
                <label>NOME CAMPAGNA (Filtro)</label>
                <input type="text" id="campagna" placeholder="Es. Le Cronache di Erath" required>
            </div>
        </div>
    </div>

    <h1>SCHEDA DELL'AVVENTURIERO</h1>

    <div class="grid-section">
        <div>
            <div class="input-group"><label>Nome</label><input type="text" id="nome"></div>
            <div class="input-group"><label>Classe</label><input type="text" id="classe"></div>
            <div style="display:flex; gap:10px;">
                <div class="input-group"><label>Livello</label><input type="number" id="livello" value="1"></div>
                <div class="input-group"><label>Rango</label><input type="text" id="rango"></div>
            </div>
        </div>
        <div class="stat-box" style="display:flex; flex-direction:column; justify-content:center;">
            <label>URL RITRATTO</label>
            <input type="text" id="ritratto" placeholder="Link immagine...">
            <p style="font-size:0.8rem; opacity:0.6;">Verrà visualizzato nella cornice della scheda</p>
        </div>
    </div>

    <div class="grid-section">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="stat-box"><label>Prodezza (PRD)</label><input type="number" id="prd"></div>
            <div class="stat-box"><label>Intelligenza</label><input type="number" id="int"></div>
            <div class="stat-box"><label>Rapidità (RPD)</label><input type="number" id="rpd"></div>
            <div class="stat-box"><label>Resistenza (PR)</label><input type="number" id="pr"></div>
        </div>
        <div>
            <label>STORIA</label>
            <textarea id="storia" rows="6" placeholder="Le origini del tuo eroe..."></textarea>
        </div>
    </div>

    <hr style="border:1px solid var(--leather)">
    
    <div class="grid-section">
        <div>
            <h3>EQUIPAGGIAMENTO</h3>
            <div class="input-group"><label>Armatura</label><input type="text" id="armatura"></div>
            <div class="input-group"><label>Arma</label><input type="text" id="arma"></div>
            <div class="input-group"><label>Anello</label><input type="text" id="anello"></div>
            <div class="input-group"><label>Pezzi d'Oro (PO)</label><input type="number" id="oro" value="0"></div>
        </div>
        <div>
            <h3>INVENTARIO (Zaino)</h3>
            <div class="inventory-grid">
                <input type="text" id="inv1" placeholder="1"> <input type="text" id="inv2" placeholder="2"> <input type="text" id="inv3" placeholder="3">
                <input type="text" id="inv4" placeholder="4"> <input type="text" id="inv5" placeholder="5"> <input type="text" id="inv6" placeholder="6">
                <input type="text" id="inv7" placeholder="7"> <input type="text" id="inv8" placeholder="8"> <input type="text" id="inv9" placeholder="9">
            </div>
        </div>
    </div>

    <div class="input-group">
        <label>INCANTESIMI MEMORIZZATI</label>
        <textarea id="incantesimi" rows="3"></textarea>
    </div>

    <button class="btn-save" onclick="salvaEroe()">INCIDI NEGLI ANNALI</button>
</div>

<script>
    // Configurazione Firebase (Usa la tua)
    const firebaseConfig = {
        apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
        authDomain: "drakonia-companion.firebaseapp.com",
        projectId: "drakonia-companion",
        storageBucket: "drakonia-companion.firebasestorage.app",
        messagingSenderId: "803844500713",
        appId: "1:803844500713:web:c902b67f4e395bd20c9478"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // Carica dati utente loggato
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('owner-name').innerText = user.displayName || "Eroe Sconosciuto";
        } else {
            window.location.href = 'login.html';
        }
    });

    async function salvaEroe() {
        const user = auth.currentUser;
        if (!user) return;

        const characterData = {
            userId: user.uid,
            userName: user.displayName,
            campagna: document.getElementById('campagna').value,
            nome: document.getElementById('nome').value,
            classe: document.getElementById('classe').value,
            livello: document.getElementById('livello').value,
            rango: document.getElementById('rango').value,
            ritratto: document.getElementById('ritratto').value,
            stats: {
                prd: document.getElementById('prd').value,
                int: document.getElementById('int').value,
                rpd: document.getElementById('rpd').value,
                pr: document.getElementById('pr').value
            },
            storia: document.getElementById('storia').value,
            equip: {
                armatura: document.getElementById('armatura').value,
                arma: document.getElementById('arma').value,
                anello: document.getElementById('anello').value,
                oro: document.getElementById('oro').value
            },
            zaino: [
                document.getElementById('inv1').value, document.getElementById('inv2').value, document.getElementById('inv3').value,
                document.getElementById('inv4').value, document.getElementById('inv5').value, document.getElementById('inv6').value,
                document.getElementById('inv7').value, document.getElementById('inv8').value, document.getElementById('inv9').value
            ],
            incantesimi: document.getElementById('incantesimi').value,
            dataCreazione: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            await db.collection("characters").add(characterData);
            alert("L'Eroe " + characterData.nome + " è stato salvato nel database!");
            window.location.href = 'profile.html';
        } catch (e) {
            alert("Errore durante l'incisione: " + e.message);
        }
    }
</script>

</body>
</html>
