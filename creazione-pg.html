<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drakonia - Creazione Eroe</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #b8860b; --leather: #2c1e11; --parchment: #f4e4bc; --blood: #8b0000; }
        
        body { 
            background: #120d08 url('https://www.transparenttextures.com/patterns/dark-leather.png'); 
            color: var(--leather); font-family: 'Almendra', serif; margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }

        .sheet-container {
            background: var(--parchment) url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            width: 100%; max-width: 800px; padding: 40px;
            border: 20px solid transparent;
            border-image: url('https://www.transparenttextures.com/patterns/dark-leather.png') 30 stretch;
            box-shadow: 0 0 50px black; position: relative;
        }

        .btn-back {
            position: absolute; top: 10px; left: 10px;
            background: var(--leather); color: var(--gold); border: 1px solid var(--gold);
            padding: 5px 15px; cursor: pointer; font-family: 'Grenze Gotisch'; text-decoration: none;
        }

        h1 { font-family: 'Grenze Gotisch'; text-align: center; font-size: 3rem; margin-top: 10px; border-bottom: 2px solid var(--leather); }

        .grid-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-weight: bold; font-family: 'Grenze Gotisch'; font-size: 1.1rem; }
        
        input, textarea, select { 
            width: 100%; padding: 8px; border: none; border-bottom: 1px solid var(--leather);
            background: rgba(0,0,0,0.05); font-family: 'Almendra'; font-size: 1.1rem; box-sizing: border-box;
        }

        .stat-box { border: 2px solid var(--leather); padding: 10px; text-align: center; border-radius: 10px; background: rgba(255,255,255,0.3); }
        .stat-box input { text-align: center; font-size: 1.5rem; background: none; font-weight: bold; }

        .roll-section { background: rgba(0,0,0,0.05); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed var(--leather); }
        
        .btn-roll {
            background: var(--blood); color: white; border: 1px solid var(--gold);
            padding: 10px; cursor: pointer; width: 100%; font-family: 'Grenze Gotisch'; margin-top: 10px;
        }

        .inventory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-save {
            background: var(--leather); color: var(--gold); border: 2px solid var(--gold);
            padding: 15px; width: 100%; font-family: 'Grenze Gotisch'; font-size: 1.8rem;
            cursor: pointer; margin-top: 30px; transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="sheet-container">
    <a href="index.html" class="btn-back">⬅ INDIETRO</a>

    <div class="header-meta">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <span>Eroe di: <strong id="owner-name">Caricamento...</strong></span>
            <div class="input-group" style="width: 50%;">
                <label>CAMPAGNA</label>
                <input type="text" id="campagna" placeholder="Nome Campagna">
            </div>
        </div>
    </div>

    <h1>CREAZIONE PERSONAGGIO</h1>

    <div class="grid-section">
        <div>
            <div class="input-group"><label>Nome</label><input type="text" id="nome"></div>
            <div class="input-group">
                <label>Classe</label>
                <select id="classe-select" onchange="applicaClasse()">
                    <option value="">Scegli una Classe...</option>
                    <option value="Guerriero">Guerriero</option>
                    <option value="Mago">Mago</option>
                    <option value="Chierico">Chierico</option>
                    <option value="Ladro">Ladro</option>
                </select>
            </div>
            <div class="input-group"><label>Livello</label><input type="number" id="livello" value="1" readonly></div>
        </div>
        <div class="stat-box">
            <label>URL RITRATTO</label>
            <input type="text" id="ritratto" placeholder="Link immagine...">
            <div id="preview-img" style="width: 100px; height: 100px; margin: 10px auto; border: 1px solid; background: #eee;"></div>
        </div>
    </div>

    <div class="roll-section">
        <label>METODO LANCIO STATISTICHE</label>
        <select id="roll-method">
            <option value="standard">Standard (3d6)</option>
            <option value="eroico">Eroico (4d6, scarta il più basso)</option>
            <option value="manuale">Manuale / Point Buy</option>
        </select>
        <button class="btn-roll" onclick="rollStats()">🎲 LANCIA I DADI DEL DESTINO</button>
    </div>

    <div class="grid-section">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="stat-box"><label>Prodezza (PRD)</label><input type="number" id="prd"></div>
            <div class="stat-box"><label>Intelligenza</label><input type="number" id="int"></div>
            <div class="stat-box"><label>Rapidità (RPD)</label><input type="number" id="rpd"></div>
            <div class="stat-box"><label>Resistenza (PR)</label><input type="number" id="pr"></div>
        </div>
        <div>
            <label>STORIA</label>
            <textarea id="storia" rows="6"></textarea>
        </div>
    </div>

    <hr style="border:1px solid var(--leather)">
    
    <div class="grid-section">
        <div>
            <h3>EQUIPAGGIAMENTO DI CLASSE</h3>
            <div class="input-group"><label>Armatura</label><input type="text" id="armatura"></div>
            <div class="input-group"><label>Arma</label><input type="text" id="arma"></div>
            <div class="input-group"><label>Anello</label><input type="text" id="anello"></div>
            <div class="input-group"><label>Pezzi d'Oro (PO)</label><input type="number" id="oro" value="0"></div>
        </div>
        <div>
            <h3>ZAINO</h3>
            <div class="inventory-grid">
                <input type="text" id="inv1"> <input type="text" id="inv2"> <input type="text" id="inv3">
                <input type="text" id="inv4"> <input type="text" id="inv5"> <input type="text" id="inv6">
                <input type="text" id="inv7"> <input type="text" id="inv8"> <input type="text" id="inv9">
            </div>
        </div>
    </div>

    <button class="btn-save" onclick="salvaEroe()">INCIDI NEGLI ANNALI</button>
</div>

<script>
    const firebaseConfig = { /* TUA CONFIGURAZIONE */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // Dati Classi (Simulazione JSON)
    const classiData = {
        "Guerriero": { prd: 2, int: -1, equip: { arma: "Spada Lunga", armatura: "Cotta di Maglia", oro: 10 }, zaino: ["Razioni", "Torcia"] },
        "Mago": { prd: -1, int: 2, equip: { arma: "Bastone", armatura: "Tunica", oro: 15 }, zaino: ["Pergamena", "Inchiostro"] },
        "Ladro": { rpd: 2, pr: -1, equip: { arma: "Daga", armatura: "Cuoio", oro: 25 }, zaino: ["Grimaldelli"] }
    };

    auth.onAuthStateChanged(user => {
        if (user) {
            // Recupera lo username dal profilo Firestore invece che dal login Google
            db.collection("users").doc(user.uid).get().then(doc => {
                document.getElementById('owner-name').innerText = doc.exists ? doc.data().username : user.displayName;
            });
        } else { window.location.href = 'login.html'; }
    });

    function applicaClasse() {
        const classe = document.getElementById('classe-select').value;
        const data = classiData[classe];
        if (!data) return;

        document.getElementById('arma').value = data.equip.arma;
        document.getElementById('armatura').value = data.equip.armatura;
        document.getElementById('oro').value = data.equip.oro;
        
        // Reset zaino e inserimento oggetti classe
        for(let i=1; i<=9; i++) document.getElementById('inv'+i).value = data.zaino[i-1] || "";
        alert("Bonus Classe " + classe + " applicati! (Dati equipaggiamento aggiornati)");
    }

    function rollStats() {
        const method = document.getElementById('roll-method').value;
        if (method === 'manuale') return alert("Inserisci i valori manualmente nelle caselle.");

        const roll = () => {
            let dice = [0,0,0,0].map(() => Math.floor(Math.random() * 6) + 1);
            if (method === 'eroico') {
                dice.sort().shift(); // Scarta il più basso
                return dice.reduce((a, b) => a + b, 0);
            }
            return dice.slice(0,3).reduce((a, b) => a + b, 0);
        };

        document.getElementById('prd').value = roll();
        document.getElementById('int').value = roll();
        document.getElementById('rpd').value = roll();
        document.getElementById('pr').value = roll();
    }

    async function salvaEroe() {
        const user = auth.currentUser;
        const characterData = {
            userId: user.uid,
            userName: document.getElementById('owner-name').innerText,
            campagna: document.getElementById('campagna').value,
            nome: document.getElementById('nome').value,
            classe: document.getElementById('classe-select').value,
            stats: {
                prd: document.getElementById('prd').value,
                int: document.getElementById('int').value,
                rpd: document.getElementById('rpd').value,
                pr: document.getElementById('pr').value
            },
            equip: {
                arma: document.getElementById('arma').value,
                armatura: document.getElementById('armatura').value,
                oro: document.getElementById('oro').value
            },
            zaino: Array.from({length: 9}, (_, i) => document.getElementById('inv'+(i+1)).value),
            dataCreazione: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            await db.collection("characters").add(characterData);
            alert("Eroe salvato!");
            window.location.href = 'index.html';
        } catch (e) { alert("Errore: " + e.message); }
    }
</script>
</body>
</html>
