<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drakonia - Creazione Eroe</title>
    <link rel="icon" type="image/png" href="icon/icon_192x192.png">
    <link rel="apple-touch-icon" href="icon/icon_192x192.png">
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #b8860b; --leather: #2c1e11; --parchment: #f4e4bc; --blood: #8b0000; }
        body { 
            background: #120d08 url('https://www.transparenttextures.com/patterns/dark-leather.png'); 
            color: var(--leather); font-family: 'Almendra', serif; margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }
        .sheet-container {
            background: var(--parchment) url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            width: 100%; max-width: 800px; padding: 40px;
            border: 20px solid transparent;
            border-image: url('https://www.transparenttextures.com/patterns/dark-leather.png') 30 stretch;
            box-shadow: 0 0 50px black; position: relative;
        }
        .btn-back {
            position: absolute; top: 10px; left: 10px;
            background: var(--leather); color: var(--gold); border: 1px solid var(--gold);
            padding: 5px 15px; cursor: pointer; font-family: 'Grenze Gotisch'; text-decoration: none;
        }
        h1 { font-family: 'Grenze Gotisch'; text-align: center; font-size: 3rem; margin: 10px 0; border-bottom: 2px solid var(--leather); }
        .grid-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        label { display: block; font-weight: bold; font-family: 'Grenze Gotisch'; font-size: 1rem; margin-top: 5px; }
        input, textarea, select { 
            width: 100%; padding: 5px; border: none; border-bottom: 1px solid var(--leather);
            background: rgba(0,0,0,0.03); font-family: 'Almendra'; font-size: 1rem; box-sizing: border-box;
        }
        .stat-box { border: 2px solid var(--leather); padding: 8px; text-align: center; border-radius: 8px; }
        .stat-box input { text-align: center; font-size: 1.3rem; background: none; font-weight: bold; border-bottom: none; }
        .roll-section { background: rgba(0,0,0,0.07); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 2px double var(--leather); text-align: center;}
        .btn-roll { background: var(--blood); color: white; border: 1px solid var(--gold); padding: 10px 20px; cursor: pointer; font-family: 'Grenze Gotisch'; width: 100%; }
        .inventory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px; }
        .btn-save { background: var(--leather); color: var(--gold); border: 2px solid var(--gold); padding: 15px; width: 100%; font-family: 'Grenze Gotisch'; font-size: 1.8rem; cursor: pointer; margin-top: 20px; }
        
        /* Area Ritratto */
        .portrait-upload {
            border: 2px dashed var(--leather);
            height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            background: rgba(0,0,0,0.02);
            transition: 0.3s;
        }
        .portrait-upload:hover { background: rgba(0,0,0,0.05); }
        #img-preview { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            object-fit: cover; display: none; 
        }
        .loading-overlay {
            display: none; position: absolute; background: rgba(0,0,0,0.6);
            color: white; width: 100%; height: 100%; align-items: center; justify-content: center;
            font-size: 0.8rem; z-index: 5;
        }
    </style>
</head>
<body>

<div class="sheet-container">
    <a href="index.html" class="btn-back">⬅ INDIETRO</a>
    <div style="display:flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px;">
        <span>Avventuriero: <strong id="owner-name">Caricamento...</strong></span>
        <div style="width: 55%;">
            <label>CAMPAGNA</label>
            <select id="campagna-select" onchange="toggleCampagnaManuale(this.value)">
                <option value="">Caricamento cronache...</option>
            </select>
            <div id="manual-campagna-box" style="display:none; margin-top: 5px; border: 1px dashed var(--blood); padding: 5px;">
                <input type="text" id="campagna-manuale" placeholder="Inserisci il titolo della campagna...">
            </div>
        </div>
    </div>

    <h1>SCHEDA DELL'AVVENTURIERO</h1>

    <div class="grid-section">
        <div>
            <label>Nome</label><input type="text" id="nome">
            <label>Classe</label>
            <select id="classe-select" onchange="applicaClasse()">
                <option value="">Scegli...</option>
                <option value="Guerriero">Guerriero</option>
                <option value="Mago">Mago</option>
                <option value="Chierico">Chierico</option>
                <option value="Ladro">Ladro</option>
            </select>
            <label>Livello</label><input type="number" id="livello" value="1" oninput="aggiornaLivelloERango()">
            <label>Rango</label><input type="text" id="rango" readonly>
        </div>
        <div class="stat-box">
            <label>RITRATTO</label>
            <div class="portrait-upload" onclick="document.getElementById('file-input').click()">
                <div id="loading-txt" class="loading-overlay">✨ INCANTESIMO IN CORSO...</div>
                <span id="placeholder-txt">📸 TOCCA PER CARICARE</span>
                <img id="img-preview" src="">
                <input type="file" id="file-input" accept="image/*" style="display:none" onchange="uploadToImgur(this)">
                <input type="hidden" id="ritratto"> </div>
        </div>
    </div>

    <div class="roll-section">
        <label>MODALITÀ DI LANCIO</label>
        <select id="roll-method">
            <option value="normale">Normale (Punteggio Fisso)</option>
            <option value="difficile">Difficile (Migliore 2d6 + Bonus)</option>
            <option value="estrema">Estrema (1d6 + Bonus)</option>
        </select>
        <button class="btn-roll" onclick="rollStats()">🎲 CALCOLA CARATTERISTICHE E PR</button>
    </div>

    <div class="grid-section">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="stat-box"><label>Prodezza (PRD)</label><input type="number" id="prd"></div>
            <div class="stat-box"><label>Intelligenza</label><input type="number" id="int"></div>
            <div class="stat-box"><label>Rapidità (RPD)</label><input type="number" id="rpd"></div>
            <div class="stat-box"><label>Resistenza (PR)</label><input type="number" id="pr"></div>
            <div class="stat-box" style="grid-column: span 2;"><label>Esperienza (PE)</label><input type="number" id="pe" readonly></div>
        </div>
        <div><label>Storia</label><textarea id="storia" rows="8" placeholder="Scrivi le tue origini..."></textarea></div>
    </div>

    <div style="border: 2px solid var(--leather); padding: 15px; border-radius: 10px;">
        <div class="grid-section">
            <div>
                <label>Armatura</label><input type="text" id="armatura">
                <label>Arma</label><input type="text" id="arma">
                <label>Anello</label><input type="text" id="anello">
                <label>Pezzi d'Oro (PO)</label><input type="number" id="oro">
            </div>
            <div>
                <label>Zaino (9 Slot)</label>
                <div class="inventory-grid">
                    <input type="text" id="inv1"> <input type="text" id="inv2"> <input type="text" id="inv3">
                    <input type="text" id="inv4"> <input type="text" id="inv5"> <input type="text" id="inv6">
                    <input type="text" id="inv7"> <input type="text" id="inv8"> <input type="text" id="inv9">
                </div>
            </div>
        </div>
        <label>Incantesimi / Abilità Speciali</label><input type="text" id="incantesimi">
    </div>

    <button class="btn-save" onclick="salvaEroe()">INCIDI NEGLI ANNALI</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
        authDomain: "drakonia-companion.firebaseapp.com",
        projectId: "drakonia-companion",
        storageBucket: "drakonia-companion.firebasestorage.app",
        messagingSenderId: "803844500713",
        appId: "1:803844500713:web:c902b67f4e395bd20c9478"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const classiData = {
        "Guerriero": { bonus: 3, max: 9, equip: "Spada Lunga, Cotta di Maglia", oro: 5, zaino: ["Scudo"] },
        "Mago": { bonus: 1, max: 7, equip: "Bastone, Tunica", oro: 5, zaino: ["Libro Incantesimi"] },
        "Ladro": { bonus: 2, max: 8, equip: "Daga, Armatura di Cuoio", oro: 5, zaino: ["Grimaldelli"] },
        "Chierico": { bonus: 2, max: 8, equip: "Mazza, Tunica Pesante", oro: 5, zaino: ["Simbolo Sacro"] }
    };

    // --- LOGICA AUTENTICAZIONE E CARICAMENTO ---
    auth.onAuthStateChanged(user => {
        if (user) {
            db.collection("users").doc(user.uid).get().then(doc => {
                document.getElementById('owner-name').innerText = doc.exists ? doc.data().username : user.displayName;
            });
            aggiornaLivelloERango();
            caricaCampagne(user.uid);
        } else { window.location.href = 'login.html'; }
    });

    async function caricaCampagne(userId) {
        const select = document.getElementById('campagna-select');
        try {
            const snapshot = await db.collection("campagne").where("giocatori", "array-contains", userId).get();
            select.innerHTML = '<option value="">-- Seleziona --</option>';
            snapshot.forEach(doc => {
                const c = doc.data();
                if(c.stato !== "Conclusa") select.innerHTML += `<option value="${c.titolo}">${c.titolo}</option>`;
            });
            select.innerHTML += '<option value="manuale">-- Altra (Scrivi Manuale) --</option>';
        } catch (e) { select.innerHTML = '<option value="manuale">Errore (Usa manuale)</option>'; }
    }

    function toggleCampagnaManuale(val) {
        document.getElementById('manual-campagna-box').style.display = (val === 'manuale') ? 'block' : 'none';
    }

    // --- LOGICA UPLOAD IMGUR ---
    async function uploadToImgur(input) {
        const file = input.files[0];
        if (!file) return;

        const loading = document.getElementById('loading-txt');
        const preview = document.getElementById('img-preview');
        const placeholder = document.getElementById('placeholder-txt');
        const ritrattoInput = document.getElementById('ritratto');

        loading.style.display = 'flex';

        const formData = new FormData();
        formData.append('image', file);

        try {
            const response = await fetch('https://api.imgur.com/3/image', {
                method: 'POST',
                headers: { Authorization: 'Client-ID 12936798031d683' },
                body: formData
            });
            const data = await response.json();
            if (data.success) {
                ritrattoInput.value = data.data.link;
                preview.src = data.data.link;
                preview.style.display = 'block';
                placeholder.style.display = 'none';
            }
        } catch (e) { alert("La pergamena dell'immagine è bruciata. Riprova."); }
        finally { loading.style.display = 'none'; }
    }

    // --- MECCANICHE DI GIOCO ---
    function aggiornaLivelloERango() {
        const liv = parseInt(document.getElementById('livello').value) || 1;
        const tabella = { 1: ["Alle Prime Armi", 0], 2: ["Principiante", 250], 3: ["Esperto", 500], 4: ["Navigato", 750], 5: ["Provetto", 1250], 6: ["Veterano", 1750], 7: ["Straordinario", 2750], 8: ["Leggendario", 3750], 9: ["Epico", 5000] };
        const [rango, pe] = tabella[liv] || ["Leggenda", 5000];
        document.getElementById('rango').value = rango;
        document.getElementById('pe').value = pe;
    }

    function applicaClasse() {
        const cl = document.getElementById('classe-select').value;
        if (!classiData[cl]) return;
        const d = classiData[cl];
        document.getElementById('arma').value = d.equip.split(', ')[0];
        document.getElementById('armatura').value = d.equip.split(', ')[1] || "";
        document.getElementById('oro').value = d.oro;
        for(let i=1; i<=9; i++) document.getElementById('inv'+i).value = d.zaino[i-1] || "";
    }

    function rollStats() {
        const cl = document.getElementById('classe-select').value;
        const method = document.getElementById('roll-method').value;
        if (!cl) return alert("Scegli una classe prima del tiro!");
        const data = classiData[cl];
        const r = () => Math.floor(Math.random() * 6) + 1;
        
        const getVal = (isPR) => {
            if (method === 'normale') return data.max;
            if (method === 'difficile') return isPR ? Math.max(1, Math.max(r(), r())) : Math.max(r(), r()) + data.bonus;
            return isPR ? r() : r() + data.bonus;
        };

        document.getElementById('prd').value = getVal(false);
        document.getElementById('int').value = getVal(false);
        document.getElementById('rpd').value = getVal(false);
        document.getElementById('pr').value = getVal(true);
    }

    async function salvaEroe() {
        const user = auth.currentUser;
        const sVal = document.getElementById('campagna-select').value;
        const campagna = (sVal === 'manuale' || sVal === "") ? document.getElementById('campagna-manuale').value : sVal;

        if(!campagna || !document.getElementById('nome').value) return alert("Dati mancanti!");

        const data = {
            userId: user.uid,
            userName: document.getElementById('owner-name').innerText,
            nome: document.getElementById('nome').value,
            campagna: campagna,
            classe: document.getElementById('classe-select').value,
            livello: document.getElementById('livello').value,
            rango: document.getElementById('rango').value,
            ritratto: document.getElementById('ritratto').value || "https://i.imgur.com/8K9v67k.png",
            storia: document.getElementById('storia').value,
            stats: { 
                prd: document.getElementById('prd').value, int: document.getElementById('int').value, 
                rpd: document.getElementById('rpd').value, pr: document.getElementById('pr').value, pe: document.getElementById('pe').value 
            },
            inventario: { 
                oro: document.getElementById('oro').value, arma: document.getElementById('arma').value, 
                armatura: document.getElementById('armatura').value, anello: document.getElementById('anello').value,
                zaino: Array.from({length:9}, (_,i)=>document.getElementById('inv'+(i+1)).value),
                incantesimi: document.getElementById('incantesimi').value
            },
            dataCreazione: firebase.firestore.FieldValue.serverTimestamp()
        };

        try { 
            await db.collection("characters").add(data); 
            alert("Eroe inciso negli annali!"); 
            window.location.href="index.html"; 
        } catch (e) { alert("Errore: " + e.message); }
    }
</script>
</body>
</html>
