<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drakonia RPG</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="account-bar">
            <div id="account-level" class="badge level-player">Player</div>
            <!-- Sezione Profilo Utente -->
            <div id="user-menu" class="user-profile-container">
                <img id="user-avatar" src="" alt="Profilo" class="hidden" onclick="window.location.href='profile.html'">
                <button id="auth-btn">Accedi</button>
            </div>
        </div>
        <h1>DRAKONIA</h1>
    </header>

    <main>
        <section id="chars-section">
            <div class="card-grid">
                <div class="card" onclick="alert('Apertura creazione eroe...')">
                    <span>+</span>
                    <p>Nuovo Eroe</p>
                </div>
                <div class="card" onclick="alert('Accesso archivio...')">
                    <span>📜</span>
                    <p>Archivio PG</p>
                </div>
            </div>
        </section>

        <nav class="main-nav">
            <button class="active" onclick="showSection('campagne')">Campagne</button>
            <button onclick="showSection('sessione')">Sessione</button>
            <button onclick="showSection('regolamento')">Regole</button>
        </nav>

        <section id="content-display" class="content-area">
            <div id="placeholder-text">Seleziona una sezione per iniziare l'avventura.</div>
        </section>

        <div id="pwa-tooltip" class="tooltip hidden">
            <p>💡 <strong>Installa Drakonia:</strong> Clicca su condividi e seleziona "Aggiungi alla Home"!</p>
            <button onclick="closeTooltip()">OK</button>
        </div>
    </main>

    <footer>
        <div class="quick-dice">
            <button onclick="tiraD6()">🎲 D6</button>
            <button onclick="tiraDadiBOSS('Normale')">Prova BOSS</button>
        </div>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
