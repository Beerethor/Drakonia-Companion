<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drakonia RPG - Portale dell'Avventuriero</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --gold: #b8860b;
            --leather: #2c1e11;
            --parchment: #f4e4bc;
            --blood: #8b0000;
            --shadow: rgba(0,0,0,0.8);
        }

        body {
            background: #1a110a url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--parchment);
            font-family: 'Almendra', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Bar & Avatar */
        header {
            background: linear-gradient(to bottom, #2c1e11, #1a110a);
            border-bottom: 3px solid var(--gold);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px var(--shadow);
        }

        .logo-title {
            font-family: 'Grenze Gotisch';
            font-size: 2.5rem;
            color: var(--gold);
            margin: 0;
            text-shadow: 2px 2px 4px #000;
            letter-spacing: 3px;
        }

        .profile-trigger {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            cursor: pointer;
            overflow: hidden;
            background: var(--leather);
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(184, 134, 11, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-trigger:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--gold);
        }

        .profile-trigger img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-trigger i {
            font-size: 1.5rem;
            color: var(--gold);
        }

        /* Hub Centrale */
        .hub-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 30px;
        }

        .welcome-msg {
            text-align: center;
            font-family: 'MedievalSharp';
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--gold);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 900px;
        }

        .menu-card {
            background: var(--parchment) url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            color: var(--leather);
            border: 4px double var(--leather);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .menu-card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            background-color: #fff;
        }

        .menu-card span {
            font-size: 3.5rem;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
        }

        .menu-card h2 {
            margin: 0;
            font-family: 'Grenze Gotisch';
            font-size: 2rem;
            color: var(--blood);
        }

        .menu-card p {
            margin: 0;
            font-size: 1.1rem;
            font-style: italic;
            opacity: 0.8;
        }

        /* Footer decorativo */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            opacity: 0.6;
            border-top: 1px solid rgba(184, 134, 11, 0.2);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1 class="logo-title">DRAKONIA</h1>
        
        <div id="profile-btn" class="profile-trigger" onclick="handleProfileClick()">
            <img id="user-avatar" src="https://img.icons8.com/color/96/fantasy.png" alt="Eroe">
        </div>
    </header>

    <main class="hub-container">
        <div class="welcome-msg">
            <span id="welcome-text">Benvenuto, Viandante</span>
        </div>

        <div class="card-grid">
            <a href="creazione-pg.html" class="menu-card">
                <span>✨</span>
                <h2>NUOVO EROE</h2>
                <p>Incidi il tuo destino negli annali</p>
            </a>
            
            <a href="#" class="menu-card" onclick="alert('L\'archivio degli eroi è in fase di restauro magico...')">
                <span>👥</span>
                <h2>ARCHIVIO PG</h2>
                <p>Consulta le gesta dei tuoi eroi</p>
            </a>

            <a href="drakonia-rules-database.html" class="menu-card" style="grid-column: 1 / -1;">
                <span>📜</span>
                <h2>CODEX REGOLE</h2>
                <p>Leggi le leggi delle Terre Selvagge</p>
            </a>
        </div>
    </main>

    <footer>
        &copy; 2026 Drakonia RPG - Portale Digitale
    </footer>

    <script>
        // Configurazione Firebase (Assicurati che coincida con le altre pagine)
        const firebaseConfig = {
            apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
            authDomain: "drakonia-companion.firebaseapp.com",
            projectId: "drakonia-companion",
            storageBucket: "drakonia-companion.firebasestorage.app",
            messagingSenderId: "803844500713",
            appId: "1:803844500713:web:c902b67f4e395bd20c9478"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Controllo stato login
        auth.onAuthStateChanged(user => {
            const avatarImg = document.getElementById('user-avatar');
            const welcomeText = document.getElementById('welcome-text');

            if (user) {
                // Utente loggato: mostra foto profilo o default
                avatarImg.src = user.photoURL || "https://img.icons8.com/color/96/fantasy.png";
                welcomeText.innerText = "Bentornato, " + (user.displayName || "Eroe");
            } else {
                // Utente non loggato
                avatarImg.src = "https://img.icons8.com/ios-filled/50/b8860b/user-shield.png";
                welcomeText.innerText = "Benvenuto, Viandante. Accedi per continuare.";
            }
        });

        // Gestione click su Avatar
        function handleProfileClick() {
            if (auth.currentUser) {
                window.location.href = 'profile.html';
            } else {
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
