<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drakonia RPG - Portale dell'Avventuriero</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --parchment: #f4e4bc;
            --ink: #2c1e11;
            --gold: #b8860b;
            --blood: #8b0000;
            --leather: #1a110a;
        }

        body {
            background: radial-gradient(circle, #2c1e11 0%, #1a110a 100%);
            color: var(--parchment);
            font-family: 'Almendra', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            background: url('https://www.transparenttextures.com/patterns/dark-leather.png'), #1a110a;
            border-bottom: 3px double var(--gold);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
        }

        header h1 {
            font-family: 'Grenze Gotisch', cursive;
            font-size: 2.5rem;
            margin: 0;
            color: var(--gold);
            text-shadow: 2px 2px 4px #000;
            letter-spacing: 3px;
        }

        /* Avatar Rotondo */
        .profile-trigger {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            cursor: pointer;
            overflow: hidden;
            background: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .profile-trigger:hover { transform: scale(1.1); }
        .profile-trigger img { width: 100%; height: 100%; object-fit: cover; }

        /* Card Grid */
        .hub-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .welcome-msg {
            font-family: 'MedievalSharp';
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: var(--gold);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        .card {
            background: var(--parchment);
            color: var(--ink);
            border: 4px double #4a321f;
            border-radius: 8px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .card:hover { transform: translateY(-5px); border-color: var(--gold); background: #fff; }
        .card span { font-size: 3rem; display: block; margin-bottom: 10px; }
        .card p { margin: 0; font-weight: bold; font-family: 'MedievalSharp'; font-size: 1.3rem; }

        footer {
            background: #1a110a;
            padding: 15px;
            text-align: center;
            font-size: 0.8rem;
            border-top: 1px solid var(--gold);
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <header>
        <h1>DRAKONIA</h1>
        <div id="profile-btn" class="profile-trigger" onclick="handleProfileClick()">
            <img id="user-avatar" src="https://img.icons8.com/color/96/fantasy.png" alt="Profilo">
        </div>
    </header>

    <main class="hub-container">
        <div class="welcome-msg">
            <span id="welcome-text">In attesa dell'eroe...</span>
        </div>

        <div class="card-grid">
            <a href="creazione-pg.html" class="card">
                <span>✨</span>
                <p>Nuovo Eroe</p>
            </a>
            
            <a href="#" class="card" onclick="alert('Consultando gli annali...')">
                <span>👥</span>
                <p>Archivio PG</p>
            </a>

            <a href="drakonia-rules-database.html" class="card">
                <span>📜</span>
                <p>Codex Regole</p>
            </a>
        </div>
    </main>

    <footer>&copy; 2026 Drakonia Companion - Portale dell'Avventuriero</footer>

    <script>
        // Configurazione Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
            authDomain: "drakonia-companion.firebaseapp.com",
            projectId: "drakonia-companion",
            storageBucket: "drakonia-companion.firebasestorage.app",
            messagingSenderId: "803844500713",
            appId: "1:803844500713:web:c902b67f4e395bd20c9478",
            measurementId: "G-GE42YKVX9G"
        };

        // Inizializzazione sicura
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Monitoraggio dello stato dell'eroe
        auth.onAuthStateChanged(user => {
            const welcomeText = document.getElementById('welcome-text');
            const avatarImg = document.getElementById('user-avatar');

            if (user) {
                // Ascolta i cambiamenti nel Codex (Firestore)
                db.collection("users").doc(user.uid).onSnapshot((doc) => {
                    let name = user.displayName || "Eroe";
                    let photo = user.photoURL || "https://img.icons8.com/color/96/fantasy.png";

                    if (doc.exists) {
                        const data = doc.data();
                        name = data.username || name;
                        photo = data.avatar || photo;
                    }
                    
                    welcomeText.innerText = "Bentornato, " + name;
                    avatarImg.src = photo;
                });
            } else {
                welcomeText.innerText = "Benvenuto, Viandante. Accedi per continuare.";
                avatarImg.src = "https://img.icons8.com/ios-filled/50/b8860b/user-shield.png";
            }
        });

        // Navigazione intelligente dell'Avatar
        function handleProfileClick() {
            if (auth.currentUser) {
                window.location.href = 'profile.html';
            } else {
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
