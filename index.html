<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drakonia RPG - Portale dell'Avventuriero</title>
    <!-- Font Fantasy Google -->
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root {
            --parchment: #f4e4bc;
            --ink: #2c1e11;
            --gold: #b8860b;
            --dark-gold: #8a6508;
            --blood: #8b0000;
            --border: #4a321f;
        }

        body {
            background: radial-gradient(circle, #2c1e11 0%, #1a110a 100%);
            color: var(--parchment);
            font-family: 'Almendra', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            background: url('https://www.transparenttextures.com/patterns/dark-leather.png'), #1a110a;
            border-bottom: 3px double var(--gold);
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
        }

        header h1 {
            font-family: 'Grenze Gotisch', cursive;
            font-size: 3.5rem;
            margin: 10px 0;
            color: var(--gold);
            text-shadow: 3px 3px 5px #000;
            letter-spacing: 5px;
        }

        .account-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .badge {
            background: var(--dark-gold);
            padding: 5px 15px;
            border-radius: 3px;
            border: 1px solid var(--parchment);
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Hero Selection Grid */
        #chars-section {
            padding: 30px 10px;
            max-width: 900px;
            margin: 0 auto;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--parchment);
            color: var(--ink);
            border: 4px double var(--border);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px) rotate(1deg);
            background: #fff;
            border-color: var(--gold);
        }

        .card span {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
        }

        .card p {
            margin: 0;
            font-weight: bold;
            font-size: 1.2rem;
            font-family: 'MedievalSharp', cursive;
        }

        /* Database Button Special */
        .card.db-card {
            background: linear-gradient(135deg, var(--parchment) 0%, #e0c090 100%);
            border-color: var(--gold);
        }

        /* Navigazione */
        .main-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
        }

        .main-nav button {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px 20px;
            font-family: 'MedievalSharp', cursive;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 4px;
        }

        .main-nav button.active, .main-nav button:hover {
            background: var(--gold);
            color: #fff;
            box-shadow: 0 0 10px var(--gold);
        }

        .content-area {
            flex-grow: 1;
            padding: 40px;
            text-align: center;
            font-size: 1.4rem;
            color: #a38b75;
            font-style: italic;
        }

        footer {
            background: #1a110a;
            padding: 20px;
            border-top: 2px solid var(--border);
        }

        .quick-dice {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .quick-dice button {
            background: var(--blood);
            color: white;
            border: 2px solid var(--gold);
            padding: 12px 25px;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 5px;
            font-family: 'Almendra', serif;
        }

        .quick-dice button:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="account-bar">
            <div id="account-level" class="badge level-player">Avventuriero</div>
            <div id="user-menu" class="user-profile-container">
                <img id="user-avatar" src="" alt="Profilo" class="hidden" onclick="window.location.href='profile.html'">
                <button id="auth-btn" class="badge" style="cursor: pointer; background: var(--blood);">Accedi</button>
            </div>
        </div>
        <h1>DRAKONIA</h1>
    </header>

    <main>
        <section id="chars-section">
            <div class="card-grid">
                <!-- Crea Eroe -->
                <div class="card" onclick="alert('Invocazione rituale di creazione...')">
                    <span>✨</span>
                    <p>Nuovo Eroe</p>
                </div>
                
                <!-- Archivio PG -->
                <div class="card" onclick="alert('Consultazione annali eroi...')">
                    <span>👥</span>
                    <p>Archivio PG</p>
                </div>

                <!-- TASTO DATABASE REGOLE -->
                <div class="card db-card" onclick="window.location.href='drakonia-rules-database.html'">
                    <span>📜</span>
                    <p>Codex Regole</p>
                </div>
            </div>
        </section>

        <nav class="main-nav">
            <button class="active" onclick="showSection('campagne')">Campagne</button>
            <button onclick="showSection('sessione')">Sessione</button>
            <button onclick="showSection('regolamento')">Libro Mastro</button>
        </nav>

        <section id="content-display" class="content-area">
            <div id="placeholder-text">Il destino ti attende. Scegli la tua via.</div>
        </section>

        <!-- Tooltip PWA -->
        <div id="pwa-tooltip" class="tooltip hidden">
            <p>💡 <strong>Porta Drakonia con te:</strong> Aggiungi l'app alla Home!</p>
            <button onclick="closeTooltip()">Chiudi</button>
        </div>
    </main>

    <footer>
        <div class="quick-dice">
            <button onclick="tiraD6()">🎲 Lancia D6</button>
            <button onclick="tiraDadiBOSS('Normale')">⚔️ Sfida BOSS</button>
        </div>
    </footer>

    <script type="module" src="app.js"></script>
    <script>
        // Funzione per simulare il cambio sezione
        function showSection(id) {
            const display = document.getElementById('placeholder-text');
            const buttons = document.querySelectorAll('.main-nav button');
            
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if(id === 'regolamento') {
                display.innerText = "Consultando il Libro Mastro delle Terre Selvagge...";
            } else if(id === 'sessione') {
                display.innerText = "Preparazione del tavolo da gioco in corso...";
            } else {
                display.innerText = "Esplorazione delle campagne attive...";
            }
        }
    </script>
</body>
</html>
