<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drakonia RPG - Portale</title>
    <link rel="icon" type="image/png" href="icon/icon_192x192.png">
    <link rel="apple-touch-icon" href="icon/icon_192x192.png">
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --parchment: #f4e4bc; --ink: #2c1e11; --gold: #b8860b; --blood: #8b0000; --sky: #2196F3; }
        
        body {
            background: radial-gradient(circle, #2c1e11 0%, #1a110a 100%);
            color: var(--parchment); font-family: 'Almendra', serif; margin: 0;
            display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden;
        }

        header {
            background: url('https://www.transparenttextures.com/patterns/dark-leather.png'), #1a110a;
            border-bottom: 3px double var(--gold); padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
        }

        header h1 { font-family: 'Grenze Gotisch'; font-size: 2.2rem; margin: 0; color: var(--gold); letter-spacing: 3px; }

        .profile-trigger {
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold);
            cursor: pointer; overflow: hidden; background: var(--ink); transition: 0.2s;
        }
        .profile-trigger:hover { transform: scale(1.1); }
        .profile-trigger img { width: 100%; height: 100%; object-fit: cover; }

        .hub-container { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .welcome-msg { font-family: 'MedievalSharp'; font-size: 1.4rem; margin-bottom: 30px; color: var(--gold); text-align: center; }

        .card-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px; width: 100%; max-width: 800px;
        }

        .card {
            background: var(--parchment); color: var(--ink); border: 3px double #4a321f;
            border-radius: 8px; padding: 18px; text-align: center; text-decoration: none;
            transition: 0.3s; box-shadow: 0 8px 16px rgba(0,0,0,0.5); position: relative;
        }
        .card:hover { transform: translateY(-3px); border-color: var(--gold); background: #fff; }
        .card span { font-size: 2rem; display: block; margin-bottom: 5px; }
        .card p { margin: 0; font-weight: bold; font-family: 'MedievalSharp'; font-size: 0.95rem; }
        
        .badge {
            position: absolute; top: -8px; right: -8px; background: var(--blood); color: white;
            min-width: 20px; height: 20px; border-radius: 10px; border: 1.5px solid var(--gold);
            font-family: 'Grenze Gotisch'; font-size: 0.8rem; display: none; align-items: center; justify-content: center; z-index: 5;
        }

        .role-tag {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            background: var(--blood); color: white; font-size: 0.65rem; padding: 1px 8px;
            border-radius: 3px; border: 1px solid var(--gold); font-family: 'Grenze Gotisch'; display: none;
        }

        footer { padding: 15px; text-align: center; font-size: 0.75rem; opacity: 0.5; border-top: 1px solid rgba(184, 134, 11, 0.2); }

        #pwa-tip {
            display: none; position: fixed; bottom: 20px; left: 15px; right: 15px;
            background: var(--parchment); color: var(--ink); border: 2px solid var(--gold);
            border-radius: 10px; padding: 12px; z-index: 100; box-shadow: 0 5px 20px #000;
        }
        #pwa-tip.active { display: block; animation: fadeInUp 0.4s; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <h1>DRAKONIA</h1>
        <div class="profile-trigger" onclick="location.href=auth.currentUser?'profile.html':'login.html'">
            <img id="u-avatar" src="https://img.icons8.com/color/96/fantasy.png" alt="PG">
        </div>
    </header>

    <main class="hub-container">
        <div class="welcome-msg" id="w-msg">In cammino...</div>

        <div class="card-grid">
            <a href="creazione-pg.html" class="card"><span>✨</span><p>Nuovo Eroe</p></a>
            <a href="archivio-pg.html" class="card"><span>📂</span><p>Archivio PG</p></a>
            <a href="campagne.html" class="card">
                <div id="tag-master" class="role-tag">MASTER</div>
                <span>🏰</span><p>Campagne</p>
            </a>
            <a href="amici.html" class="card">
                <div id="b-friend" class="badge" style="background:var(--sky)">0</div>
                <span>👥</span><p>Compagni</p>
            </a>
            <a href="messaggi.html" id="m-card" class="card">
                <div id="b-msg" class="badge">!</div>
                <span>✉️</span><p>Messaggi</p>
            </a>
            <a href="drakonia-rules-database.html" class="card"><span>📜</span><p>Codex</p></a>
        </div>
    </main>

    <footer>&copy; 2026 Drakonia Companion</footer>

    <div id="pwa-tip">
        <div style="display:flex; align-items:center; gap:12px; font-size:0.85rem;">
            <span>📱</span>
            <div style="flex-grow:1"><b>Drakonia Web-App</b>: aggiungi alla <b>Schermata Home</b> per l'esperienza completa.</div>
            <button onclick="this.parentElement.parentElement.classList.remove('active'); localStorage.setItem('pwa_off', '1')" 
                    style="background:var(--ink); color:var(--gold); border:1px solid; border-radius:4px; padding:4px 8px; cursor:pointer;">X</button>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
            authDomain: "drakonia-companion.firebaseapp.com",
            projectId: "drakonia-companion",
            storageBucket: "drakonia-companion.firebasestorage.app",
            messagingSenderId: "803844500713",
            appId: "1:803844500713:web:c902b67f4e395bd20c9478"
        };

        firebase.initializeApp(config);
        const auth = firebase.auth(), db = firebase.firestore();

        const UI = {
            welcome: document.getElementById('w-msg'),
            avatar: document.getElementById('u-avatar'),
            master: document.getElementById('tag-master'),
            msgBadge: document.getElementById('b-msg'),
            friendBadge: document.getElementById('b-friend')
        };

        auth.onAuthStateChanged(user => {
            if (user) {
                // Sincronizzazione profilo
                db.collection("users").doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        UI.welcome.innerText = `Bentornato, ${d.username || 'Eroe'}`;
                        UI.avatar.src = d.avatar || "https://img.icons8.com/color/96/fantasy.png";
                        UI.master.style.display = (['Master', 'Founder'].includes(d.role)) ? 'block' : 'none';
                    }
                });

                // Notifiche Messaggi
                db.collection("chats").where("participants", "array-contains", user.uid).onSnapshot(snap => {
                    UI.msgBadge.style.display = (!snap.empty && !sessionStorage.getItem('m_read')) ? 'flex' : 'none';
                });

                // Richieste Amicizia
                db.collection("friendships").where("receiverId", "==", user.uid).where("status", "==", "pending").onSnapshot(snap => {
                    if (!snap.empty) {
                        UI.friendBadge.innerText = snap.size;
                        UI.friendBadge.style.display = 'flex';
                    } else UI.friendBadge.style.display = 'none';
                });
            } else {
                UI.welcome.innerText = "Benvenuto, Viandante. Accedi.";
            }
        });

        document.getElementById('m-card').onclick = () => sessionStorage.setItem('m_read', '1');

        // PWA Prompt
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent) && !localStorage.getItem('pwa_off')) {
            window.onload = () => setTimeout(() => document.getElementById('pwa-tip').classList.add('active'), 2000);
        }
    </script>
</body>
</html>
