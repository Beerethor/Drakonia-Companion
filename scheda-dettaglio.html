<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drakonia - Esamina Eroe</title>
    <link rel="icon" type="image/png" href="icon/icon_192x192.png">
    <link rel="apple-touch-icon" href="icon/icon_192x192.png">
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --gold: #b8860b; --leather: #2c1e11; --parchment: #f4e4bc; --blood: #8b0000; }
        
        body { 
            background: #120d08 url('https://www.transparenttextures.com/patterns/dark-leather.png'); 
            color: var(--leather); font-family: 'Almendra', serif; margin: 0; padding: 10px;
        }

        .nav-controls {
            max-width: 800px; margin: 0 auto 15px; display: flex; gap: 10px; justify-content: space-between;
        }

        .btn {
            background: var(--leather); color: var(--gold); border: 1px solid var(--gold);
            padding: 10px 15px; cursor: pointer; font-family: 'Grenze Gotisch'; 
            text-decoration: none; transition: 0.3s; display: flex; align-items: center; gap: 8px;
            font-size: 0.9rem; flex: 1; justify-content: center;
        }
        .btn:hover { background: var(--blood); color: white; }

        #sheet-to-print {
            background: var(--parchment) url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            width: 100%; max-width: 800px; margin: 0 auto; padding: 25px;
            border: 10px solid transparent;
            border-image: url('https://www.transparenttextures.com/patterns/dark-leather.png') 30 stretch;
            box-shadow: 0 0 30px rgba(0,0,0,0.8); box-sizing: border-box;
        }

        h1 { font-family: 'Grenze Gotisch'; text-align: center; font-size: 2.2rem; margin: 10px 0; border-bottom: 2px solid var(--leather); }
        
        /* Layout Header per Mobile */
        .header-info { display: flex; flex-direction: column-reverse; gap: 15px; margin-bottom: 20px; }
        .portrait { width: 120px; height: 150px; border: 3px double var(--leather); object-fit: cover; align-self: center; background: rgba(0,0,0,0.1); }
        
        .info-row { font-size: 1.1rem; margin-bottom: 5px; border-bottom: 1px dashed rgba(0,0,0,0.2); display: flex; justify-content: space-between; }
        .info-label { font-family: 'Grenze Gotisch'; color: var(--blood); }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 20px 0; }
        .stat-box { border: 2px solid var(--leather); border-radius: 8px; padding: 8px; background: rgba(0,0,0,0.03); text-align: center; }
        .stat-val { font-size: 1.5rem; font-weight: bold; display: block; color: var(--blood); }
        .stat-label { font-size: 0.75rem; font-family: 'Grenze Gotisch'; text-transform: uppercase; }

        .section-title { font-family: 'Grenze Gotisch'; font-size: 1.5rem; border-bottom: 1px solid var(--gold); margin: 20px 0 10px; color: var(--blood); text-align: center; }
        .content-box { white-space: pre-wrap; line-height: 1.3; font-size: 1rem; min-height: 40px; background: rgba(0,0,0,0.02); padding: 5px; }

        /* Layout Inventario per Mobile */
        .inv-grid { display: flex; flex-direction: column; gap: 15px; }
        .zaino-list { list-style: none; padding: 0; margin: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .zaino-list li { border-bottom: 1px solid rgba(0,0,0,0.1); padding: 2px 0; font-size: 0.9rem; }

        #loading-overlay { text-align: center; padding: 100px 20px; font-family: 'Grenze Gotisch'; font-size: 1.5rem; color: var(--gold); }

        /* Media Query per schermi più grandi (Tablet/PC) */
        @media (min-width: 600px) {
            h1 { font-size: 3rem; }
            .header-info { display: grid; grid-template-columns: 1fr 150px; flex-direction: row; }
            .portrait { width: 150px; height: 180px; }
            .stats-grid { grid-template-columns: repeat(4, 1fr); }
            .inv-grid { display: grid; grid-template-columns: 1fr 1fr; }
            .zaino-list { display: block; column-count: 2; }
            .section-title { text-align: left; }
        }
    </style>
</head>
<body>

    <div class="nav-controls">
        <a href="archivio-pg.html" class="btn">⬅ ARCHIVIO</a>
        <button class="btn" onclick="scaricaPDF()">📜 SALVA PDF</button>
    </div>

    <div id="loading-overlay">Consultando i Tomi Antichi...</div>

    <div id="sheet-to-print" style="display: none;">
        <div style="display: flex; justify-content: space-between; font-size: 0.8rem; opacity: 0.8;">
            <span>Eroe di: <strong id="val-owner">...</strong></span>
            <span id="val-campagna">...</span>
        </div>
        
        <h1 id="val-nome">NOME EROE</h1>

        <div class="header-info">
            <div>
                <div class="info-row"><span class="info-label">CLASSE:</span> <span id="val-classe">...</span></div>
                <div class="info-row"><span class="info-label">LIVELLO:</span> <span id="val-livello">...</span></div>
                <div class="info-row"><span class="info-label">RANGO:</span> <span id="val-rango">...</span></div>
                <div class="info-row"><span class="info-label">ESPERIENZA:</span> <span id="val-pe">...</span> PE</div>
            </div>
            <img id="val-ritratto" src="" class="portrait" alt="Ritratto">
        </div>

        <div class="stats-grid">
            <div class="stat-box"><span class="stat-label">Prodezza</span><span class="stat-val" id="val-prd">0</span></div>
            <div class="stat-box"><span class="stat-label">Intelligenza</span><span class="stat-val" id="val-int">0</span></div>
            <div class="stat-box"><span class="stat-label">Rapidità</span><span class="stat-val" id="val-rpd">0</span></div>
            <div class="stat-box"><span class="stat-label">Resistenza</span><span class="stat-val" id="val-pr">0</span></div>
        </div>

        <div class="section-title">Equipaggiamento</div>
        <div class="info-row"><span class="info-label">ARMA:</span> <span id="val-arma">...</span></div>
        <div class="info-row"><span class="info-label">ARMATURA:</span> <span id="val-armatura">...</span></div>
        <div class="info-row"><span class="info-label">RELIQUIA:</span> <span id="val-anello">...</span></div>
        <div class="info-row"><span class="info-label">TESORO:</span> <span><span id="val-oro">0</span> Mo</span></div>

        <div class="inv-grid">
            <div>
                <div class="section-title">Zaino</div>
                <ul class="zaino-list" id="val-zaino"></ul>
            </div>
            <div>
                <div class="section-title">Magia e Poteri</div>
                <div class="content-box" id="val-incantesimi">...</div>
            </div>
        </div>

        <div class="section-title">Storia</div>
        <div class="content-box" id="val-storia" style="font-style: italic;">...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
            authDomain: "drakonia-companion.firebaseapp.com",
            projectId: "drakonia-companion",
            storageBucket: "drakonia-companion.firebasestorage.app",
            messagingSenderId: "803844500713",
            appId: "1:803844500713:web:c902b67f4e395bd20c9478"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user) { caricaScheda(); } 
            else { window.location.href = 'login.html'; }
        });

        async function caricaScheda() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const characterId = urlParams.get('id');

                if (!characterId) { window.location.href = "archivio-pg.html"; return; }

                const doc = await db.collection("characters").doc(characterId).get();
                if (!doc.exists) { alert("Eroe non trovato."); window.location.href = "archivio-pg.html"; return; }

                const data = doc.data();

                document.getElementById('val-nome').innerText = data.nome || "Senza Nome";
                document.getElementById('val-owner').innerText = data.userName || "Ignoto";
                document.getElementById('val-campagna').innerText = data.campagna || "Cieli di Drakonia";
                document.getElementById('val-classe').innerText = data.classe || "Viandante";
                document.getElementById('val-livello').innerText = data.livello || "1";
                document.getElementById('val-rango').innerText = data.rango || "-";
                
                if(data.stats) {
                    document.getElementById('val-prd').innerText = data.stats.prd || 0;
                    document.getElementById('val-int').innerText = data.stats.int || 0;
                    document.getElementById('val-rpd').innerText = data.stats.rpd || 0;
                    document.getElementById('val-pr').innerText = data.stats.pr || 0;
                    document.getElementById('val-pe').innerText = data.stats.pe || 0;
                }

                if(data.inventario) {
                    document.getElementById('val-arma').innerText = data.inventario.arma || "Nessuna";
                    document.getElementById('val-armatura').innerText = data.inventario.armatura || "Nessuna";
                    document.getElementById('val-anello').innerText = data.inventario.anello || "Nessuno";
                    document.getElementById('val-oro').innerText = data.inventario.oro || 0;
                    document.getElementById('val-incantesimi').innerText = data.inventario.incantesimi || "Nessun potere.";
                    
                    const zainoUl = document.getElementById('val-zaino');
                    zainoUl.innerHTML = data.inventario.zaino ? 
                        data.inventario.zaino.filter(i => i).map(i => `<li>${i}</li>`).join('') : "Vuoto";
                }

                document.getElementById('val-storia').innerText = data.storia || "Nessun racconto presente.";
                
                if(data.ritratto) {
                    document.getElementById('val-ritratto').src = data.ritratto;
                    document.getElementById('val-ritratto').style.display = 'block';
                } else {
                    document.getElementById('val-ritratto').style.display = 'none';
                }

                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('sheet-to-print').style.display = 'block';

            } catch (error) {
                console.error(error);
                alert("Errore nel recupero dati.");
            }
        }

        function scaricaPDF() {
            const element = document.getElementById('sheet-to-print');
            const nomeEroe = document.getElementById('val-nome').innerText;
            const opt = {
                margin: [0.2, 0.2, 0.2, 0.2],
                filename: `Drakonia_${nomeEroe}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
