<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drakonia - Cronache delle Campagne</title>
    <link rel="icon" type="image/png" href="icon/icon_192x192.png">
    <link rel="apple-touch-icon" href="icon/icon_192x192.png">
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #b8860b; --leather: #2c1e11; --parchment: #f4e4bc; --blood: #8b0000; --ink: #1a110a; }
        
        body { background: #120d08 url('https://www.transparenttextures.com/patterns/dark-leather.png'); color: var(--ink); font-family: 'Almendra', serif; margin: 0; padding: 20px; }

        .nav-header { max-width: 1000px; margin: 0 auto 20px; display: flex; justify-content: space-between; }
        .btn-nav { background: var(--leather); color: var(--gold); border: 1px solid var(--gold); padding: 10px 15px; cursor: pointer; font-family: 'Grenze Gotisch'; text-decoration: none; transition: 0.3s; }
        .btn-nav:hover { background: var(--blood); color: white; }

        .container { max-width: 1000px; margin: 0 auto; background: var(--parchment); padding: 30px; border: 8px double var(--leather); box-shadow: 0 10px 30px rgba(0,0,0,0.8); min-height: 80vh; }

        .campagne-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .campagna-thumb { background: rgba(0,0,0,0.05); border: 1px solid var(--leather); padding: 20px; cursor: pointer; transition: 0.3s; border-radius: 4px; border-left: 5px solid var(--gold); }
        .campagna-thumb:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); overflow-y: auto; }
        .modal-content { background: var(--parchment); margin: 5% auto; padding: 25px; width: 90%; max-width: 600px; border: 4px solid var(--leather); position: relative; }
        .close { position: absolute; right: 20px; top: 10px; font-size: 2rem; cursor: pointer; color: var(--blood); }

        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid rgba(0,0,0,0.1); padding: 12px; text-align: left; }
        th { background: rgba(0,0,0,0.05); font-family: 'Grenze Gotisch'; width: 35%; color: var(--blood); }

        .btn-action { background: var(--leather); color: var(--gold); padding: 12px; border: 1px solid var(--gold); cursor: pointer; font-family: 'Grenze Gotisch'; width: 100%; margin-top: 10px; font-size: 1.1rem; }
        .btn-delete { background: var(--blood); color: white; }
        
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; font-family: 'Almendra'; border: 1px solid var(--leather); box-sizing: border-box; background: rgba(255,255,255,0.5); }
        .section-title { font-family: 'Grenze Gotisch'; border-bottom: 2px solid var(--leather); margin: 20px 0 10px; color: var(--blood); font-size: 1.5rem; }
        
        .pg-list { list-style: none; padding: 0; display: flex; flex-wrap: wrap; gap: 8px; }
        .pg-tag { background: var(--leather); color: var(--gold); padding: 4px 12px; border-radius: 20px; font-size: 0.9rem; font-family: 'MedievalSharp'; }
    </style>
</head>
<body>

<div class="nav-header">
    <a href="index.html" class="btn-nav">⬅ TORNA AL PORTALE</a>
    <button id="btn-nuova" class="btn-nav" style="display:none;" onclick="openModal('modalCreate')">📜 NUOVA CAMPAGNA</button>
</div>

<div class="container">
    <h1 style="text-align:center; font-family:'Grenze Gotisch'; font-size: 3rem; margin: 0; color: var(--blood);">Cronache di Drakonia</h1>
    <p style="text-align:center; margin-bottom: 30px;">Annali delle avventure passate e presenti</p>
    <div id="loader" style="text-align:center;">📜 Consultando i tomi...</div>
    <div class="campagne-grid" id="campagne-list"></div>
</div>

<div id="modalDetail" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('modalDetail')">&times;</span>
        <h2 id="det-titolo" style="font-family:'Grenze Gotisch'; font-size: 2.2rem; margin:0; color: var(--blood);"></h2>
        
        <div class="section-title">Informazioni</div>
        <table>
            <tr><th>Master</th><td id="det-master"></td></tr>
            <tr><th>Stato</th><td id="det-stato"></td></tr>
            <tr><th>Descrizione</th><td id="det-desc"></td></tr>
        </table>

        <div class="section-title">Eroi Partecipanti (<span id="det-count"></span>)</div>
        <div id="det-pg-list" class="pg-list"></div>

        <div class="section-title">Codex della Trama</div>
        <div id="det-trama" style="white-space: pre-wrap; padding: 10px; background: rgba(0,0,0,0.03); border-radius: 4px;"></div>

        <div id="admin-controls" style="margin-top:20px;"></div>
    </div>
</div>

<div id="modalCreate" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('modalCreate')">&times;</span>
        <h2 style="font-family:'Grenze Gotisch'; text-align:center;">Inizia una nuova Cronaca</h2>
        <input type="text" id="crea-titolo" placeholder="Titolo dell'Avventura">
        <textarea id="crea-desc" rows="3" placeholder="Sinossi pubblica..."></textarea>
        <input type="number" id="crea-max" placeholder="Posti disponibili (es: 5)">
        <button class="btn-action" onclick="eseguiCreazione()">🔥 PUBBLICA NEGLI ANNALI</button>
    </div>
</div>

<div id="modalEdit" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('modalEdit')">&times;</span>
        <h2 style="font-family:'Grenze Gotisch';">Modifica Codex</h2>
        <label>Stato della Campagna</label>
        <select id="edit-status">
            <option value="In Preparazione">In Preparazione</option>
            <option value="Attiva">Attiva</option>
            <option value="Conclusa">Conclusa</option>
            <option value="Abbandonata">Abbandonata</option>
        </select>
        <label>Note di Trama (Visibili a tutti)</label>
        <textarea id="edit-trama" rows="8"></textarea>
        <button class="btn-action" onclick="saveChanges()">💾 AGGIORNA CRONACA</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
        authDomain: "drakonia-companion.firebaseapp.com",
        projectId: "drakonia-companion",
        storageBucket: "drakonia-companion.firebasestorage.app",
        messagingSenderId: "803844500713",
        appId: "1:803844500713:web:c902b67f4e395bd20c9478"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let currentUserData = null;
    let currentCampId = null;

    auth.onAuthStateChanged(async user => {
        if (user) {
            const userDoc = await db.collection("users").doc(user.uid).get();
            currentUserData = userDoc.data();
            if (['Master', 'Founder'].includes(currentUserData.role)) {
                document.getElementById('btn-nuova').style.display = 'block';
            }
            caricaCampagne();
        } else { window.location.href = 'login.html'; }
    });

    function caricaCampagne() {
        db.collection("campagne").orderBy("dataCreazione", "desc").onSnapshot(snapshot => {
            const list = document.getElementById('campagne-list');
            document.getElementById('loader').style.display = 'none';
            list.innerHTML = "";
            snapshot.forEach(doc => {
                const c = doc.data();
                const dotColor = c.stato === "Attiva" ? "#2e7d32" : (c.stato === "In Preparazione" ? "#ed6c02" : "#424242");
                list.innerHTML += `
                    <div class="campagna-thumb" onclick="openDetail('${doc.id}')">
                        <h3 style="margin:0; font-family:'Grenze Gotisch'; color:var(--blood);">${c.titolo}</h3>
                        <p style="font-size:0.85rem; margin:8px 0;"><span class="status-dot" style="background:${dotColor}"></span>${c.stato || 'In Prep.'}</p>
                        <p style="font-size:0.9rem; font-family:'MedievalSharp';">👥 Eroi: ${c.giocatori ? c.giocatori.length : 0} / ${c.maxGiocatori}</p>
                    </div>
                `;
            });
        });
    }

    async function eseguiCreazione() {
        const t = document.getElementById('crea-titolo').value;
        const d = document.getElementById('crea-desc').value;
        const m = parseInt(document.getElementById('crea-max').value);
        if(!t || !m) return alert("Compila i campi necessari!");

        await db.collection("campagne").add({
            titolo: t, descrizione: d, maxGiocatori: m,
            stato: "In Preparazione", masterId: auth.currentUser.uid,
            masterNome: currentUserData.username, giocatori: [], giocatoriNomi: [],
            tramaAggiornamenti: "La storia deve ancora essere scritta...",
            dataCreazione: firebase.firestore.FieldValue.serverTimestamp()
        });
        closeModal('modalCreate');
    }

    async function openDetail(id) {
        currentCampId = id;
        const doc = await db.collection("campagne").doc(id).get();
        const c = doc.data();
        
        document.getElementById('det-titolo').innerText = c.titolo;
        document.getElementById('det-stato').innerText = c.stato || "In Preparazione";
        document.getElementById('det-master').innerText = c.masterNome;
        document.getElementById('det-count').innerText = `${c.giocatori.length} / ${c.maxGiocatori}`;
        document.getElementById('det-desc').innerText = c.descrizione;
        document.getElementById('det-trama').innerText = c.tramaAggiornamenti;
        
        // Visualizzazione PG iscritti
        const pgContainer = document.getElementById('det-pg-list');
        pgContainer.innerHTML = c.giocatoriNomi.length > 0 
            ? c.giocatoriNomi.map(nome => `<span class="pg-tag">🛡️ ${nome}</span>`).join('')
            : "<p style='font-style:italic; opacity:0.6;'>Nessun eroe ha ancora risposto alla chiamata.</p>";

        // Controlli Admin/Iscrizione
        const controls = document.getElementById('admin-controls');
        controls.innerHTML = "";
        const isMaster = c.masterId === auth.currentUser.uid;
        const isFounder = currentUserData.role === "Founder";
        const isJoined = c.giocatori.includes(auth.currentUser.uid);

        if (!isMaster && !isJoined && c.giocatori.length < c.maxGiocatori) {
            controls.innerHTML += `<button class="btn-action" onclick="iscriviti('${id}')">⚔️ ISCRIVITI ALLA CAMPAGNA</button>`;
        }

        if (isMaster || isFounder) {
            controls.innerHTML += `<button class="btn-action" onclick="openEditModal('${c.stato}', \`${c.tramaAggiornamenti}\`)">✍️ AGGIORNA CRONACA</button>`;
        }

        if (isFounder) {
            controls.innerHTML += `<button class="btn-action btn-delete" onclick="eliminaCampagna('${id}')">🗑️ CANCELLA CRONACA</button>`;
        }

        document.getElementById('modalDetail').style.display = 'block';
    }

    async function iscriviti(id) {
        try {
            await db.collection("campagne").doc(id).update({
                giocatori: firebase.firestore.FieldValue.arrayUnion(auth.currentUser.uid),
                giocatoriNomi: firebase.firestore.FieldValue.arrayUnion(currentUserData.username)
            });
            openDetail(id);
        } catch (e) { alert("Errore durante l'iscrizione."); }
    }

    function openEditModal(stato, trama) {
        document.getElementById('edit-status').value = stato;
        document.getElementById('edit-trama').value = trama;
        document.getElementById('modalEdit').style.display = 'block';
    }

    async function saveChanges() {
        await db.collection("campagne").doc(currentCampId).update({
            stato: document.getElementById('edit-status').value,
            tramaAggiornamenti: document.getElementById('edit-trama').value
        });
        closeModal('modalEdit');
        openDetail(currentCampId);
    }

    async function eliminaCampagna(id) {
        if(confirm("Questa azione rimuoverà la cronaca per sempre. Procedere?")) {
            await db.collection("campagne").doc(id).delete();
            closeModal('modalDetail');
        }
    }

    function openModal(m) { document.getElementById(m).style.display = 'block'; }
    function closeModal(m) { document.getElementById(m).style.display = 'none'; }
</script>
</body>
</html>
