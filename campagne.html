<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drakonia - Cronache delle Campagne</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #b8860b; --leather: #2c1e11; --parchment: #f4e4bc; --blood: #8b0000; --ink: #1a110a; --active: #2e7d32; --prep: #ed6c02; --end: #424242; }
        
        body { background: #120d08 url('https://www.transparenttextures.com/patterns/dark-leather.png'); color: var(--ink); font-family: 'Almendra', serif; margin: 0; padding: 20px; }

        .nav-header { max-width: 1000px; margin: 0 auto 20px; display: flex; justify-content: space-between; }
        .btn-nav { background: var(--leather); color: var(--gold); border: 1px solid var(--gold); padding: 10px 15px; cursor: pointer; font-family: 'Grenze Gotisch'; text-decoration: none; transition: 0.3s; }
        .btn-nav:hover { background: var(--blood); color: white; }

        .container { max-width: 1000px; margin: 0 auto; background: var(--parchment); padding: 30px; border: 10px solid transparent; border-image: url('https://www.transparenttextures.com/patterns/dark-leather.png') 30 stretch; box-shadow: 0 10px 30px rgba(0,0,0,0.8); min-height: 80vh; }

        /* Grid Semplificata per Player */
        .campagne-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .campagna-thumb { background: rgba(0,0,0,0.05); border: 2px solid var(--leather); padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; border-radius: 5px; }
        .campagna-thumb:hover { background: var(--leather); color: var(--gold); }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }

        /* Layer (Modal) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); overflow-y: auto; }
        .modal-content { background: var(--parchment); margin: 2% auto; padding: 30px; width: 90%; max-width: 800px; border: 5px solid var(--leather); position: relative; }
        .close { position: absolute; right: 20px; top: 10px; font-size: 2rem; cursor: pointer; color: var(--blood); }

        /* Tabelle Info */
        table { width: 100%; border-collapse: collapse; margin: 20px 0; background: rgba(255,255,255,0.3); }
        th, td { border: 1px solid var(--leather); padding: 12px; text-align: left; }
        th { background: var(--leather); color: var(--gold); font-family: 'Grenze Gotisch'; }

        .btn-action { background: var(--leather); color: var(--gold); padding: 10px 20px; border: 1px solid var(--gold); cursor: pointer; font-family: 'Grenze Gotisch'; margin: 5px; }
        .btn-delete { background: var(--blood); color: white; }
        
        .section-title { font-family: 'Grenze Gotisch'; border-bottom: 2px solid var(--leather); margin-top: 25px; color: var(--blood); }
        
        select, input, textarea { width: 100%; padding: 8px; margin: 5px 0; font-family: 'Almendra'; }
    </style>
</head>
<body>

<div class="nav-header">
    <a href="index.html" class="btn-nav">🏰 PORTALE</a>
    <button id="btn-nuova" class="btn-nav" style="display:none;" onclick="openCreateModal()">📜 NUOVA CAMPAGNA</button>
</div>

<div class="container">
    <h1 style="text-align:center; font-family:'Grenze Gotisch'; font-size: 3rem;">Cronache di Drakonia</h1>
    <div class="campagne-grid" id="campagne-list"></div>
</div>

<div id="modalDetail" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('modalDetail')">&times;</span>
        <h2 id="det-titolo" style="font-family:'Grenze Gotisch'; font-size: 2.5rem; margin:0;"></h2>
        <div id="det-status-badge"></div>
        
        <div class="section-title">Informazioni Base</div>
        <table>
            <tr><th>Master</th><td id="det-master"></td></tr>
            <tr><th>Eroi Arruolati</th><td id="det-count"></td></tr>
            <tr><th>Descrizione</th><td id="det-desc"></td></tr>
        </table>

        <div class="section-title">Dettagli Avanzati (Codex Master)</div>
        <table id="table-avanzata">
            <tr><th>Note di Trama</th><td id="det-trama"></td></tr>
            <tr><th>Ultimo Aggiornamento</th><td id="det-data"></td></tr>
        </table>

        <div id="admin-controls" style="margin-top:20px; border-top: 2px double var(--leather); padding-top:15px;">
            </div>
    </div>
</div>

<div id="modalEdit" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('modalEdit')">&times;</span>
        <h2 style="font-family:'Grenze Gotisch';">Modifica Cronaca</h2>
        <label>Stato Campagna</label>
        <select id="edit-status">
            <option value="In Preparazione">In Preparazione</option>
            <option value="Attiva">Attiva</option>
            <option value="Conclusa">Conclusa</option>
            <option value="Abbandonata">Abbandonata</option>
        </select>
        <label>Informazioni Aggiuntive / Note Master</label>
        <textarea id="edit-trama" rows="10"></textarea>
        <button class="btn-action" onclick="saveChanges()">SALVA NEGLI ANNALI</button>
    </div>
</div>

<script>
    // Configurazione Firebase (usa la tua esistente)
    const firebaseConfig = {
        apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
        authDomain: "drakonia-companion.firebaseapp.com",
        projectId: "drakonia-companion",
        storageBucket: "drakonia-companion.firebasestorage.app",
        messagingSenderId: "803844500713",
        appId: "1:803844500713:web:c902b67f4e395bd20c9478"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let currentUserData = null;
    let currentCampId = null;

    auth.onAuthStateChanged(async user => {
        if (user) {
            const userDoc = await db.collection("users").doc(user.uid).get();
            currentUserData = userDoc.data();
            if (currentUserData.role === "Master" || currentUserData.role === "Founder") {
                document.getElementById('btn-nuova').style.display = 'block';
            }
            caricaCampagne();
        } else { window.location.href = 'login.html'; }
    });

    function caricaCampagne() {
        db.collection("campagne").onSnapshot(snapshot => {
            const list = document.getElementById('campagne-list');
            list.innerHTML = "";
            snapshot.forEach(doc => {
                const c = doc.data();
                const statusColor = getStatusColor(c.stato);
                list.innerHTML += `
                    <div class="campagna-thumb" onclick="openDetail('${doc.id}')">
                        <h3 style="margin:0">${c.titolo}</h3>
                        <p><span class="status-dot" style="background:${statusColor}"></span>${c.stato || 'In Preparazione'}</p>
                        <p>Eroi: ${c.giocatori.length} / ${c.maxGiocatori}</p>
                    </div>
                `;
            });
        });
    }

    function getStatusColor(s) {
        if(s === "Attiva") return "#2e7d32";
        if(s === "In Preparazione") return "#ed6c02";
        return "#424242";
    }

    async function openDetail(id) {
        currentCampId = id;
        const doc = await db.collection("campagne").doc(id).get();
        const c = doc.data();
        
        document.getElementById('det-titolo').innerText = c.titolo;
        document.getElementById('det-master').innerText = c.masterNome;
        document.getElementById('det-count').innerText = `${c.giocatori.length} / ${c.maxGiocatori}`;
        document.getElementById('det-desc').innerText = c.descrizione;
        document.getElementById('det-trama').innerText = c.tramaAggiornamenti || "Nessuna nota aggiuntiva.";
        document.getElementById('det-data').innerText = c.dataCreazione ? c.dataCreazione.toDate().toLocaleDateString() : "-";
        
        const controls = document.getElementById('admin-controls');
        controls.innerHTML = "";

        // Tasto Iscriviti (per player)
        if (!c.giocatori.includes(auth.currentUser.uid) && c.giocatori.length < c.maxGiocatori && c.masterId !== auth.currentUser.uid) {
            controls.innerHTML += `<button class="btn-action" onclick="iscriviti('${id}')">🛡️ ISCRIVITI</button>`;
        }

        // Tasto Modifica (per Master della campagna o Founder)
        if (c.masterId === auth.currentUser.uid || currentUserData.role === "Founder") {
            controls.innerHTML += `<button class="btn-action" onclick="openEditModal('${c.stato}', '${c.tramaAggiornamenti}')">✍️ MODIFICA</button>`;
        }

        // Tasto Elimina (Solo Founder)
        if (currentUserData.role === "Founder") {
            controls.innerHTML += `<button class="btn-action btn-delete" onclick="eliminaCampagna('${id}')">🔥 ELIMINA DEFINITIVAMENTE</button>`;
        }

        document.getElementById('modalDetail').style.display = 'block';
    }

    function openEditModal(stato, trama) {
        document.getElementById('edit-status').value = stato || "In Preparazione";
        document.getElementById('edit-trama').value = trama || "";
        document.getElementById('modalEdit').style.display = 'block';
    }

    async function saveChanges() {
        await db.collection("campagne").doc(currentCampId).update({
            stato: document.getElementById('edit-status').value,
            tramaAggiornamenti: document.getElementById('edit-trama').value
        });
        closeModal('modalEdit');
        openDetail(currentCampId);
    }

    async function eliminaCampagna(id) {
        if(confirm("Sei il Founder. Vuoi davvero distruggere questa cronaca per sempre?")) {
            await db.collection("campagne").doc(id).delete();
            closeModal('modalDetail');
        }
    }

    async function iscriviti(id) {
        await db.collection("campagne").doc(id).update({
            giocatori: firebase.firestore.FieldValue.arrayUnion(auth.currentUser.uid),
            giocatoriNomi: firebase.firestore.FieldValue.arrayUnion(currentUserData.username)
        });
        openDetail(id);
    }

    function closeModal(m) { document.getElementById(m).style.display = 'none'; }
</script>

</body>
</html>
