<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Missive Attive - Drakonia</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --gold: #b8860b; 
            --parchment: #f4e4bc; 
            --leather: #2c1e11; 
            --blood: #8b0000; 
            --ink: #1a110a; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: var(--ink) url('https://www.transparenttextures.com/patterns/dark-leather.png'); 
            color: var(--parchment); 
            font-family: 'Almendra', serif; 
            margin: 0; 
            padding: 15px;
            min-height: 100vh;
        }

        .container { max-width: 600px; margin: 0 auto; }

        .nav-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px;
        }

        h1 { 
            font-family: 'Grenze Gotisch'; 
            color: var(--gold); 
            text-align: center; 
            font-size: 2.2rem; 
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Lista Conversazioni */
        .chat-card { 
            background: rgba(44, 30, 17, 0.7); 
            border: 1px solid var(--gold); 
            padding: 18px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: transform 0.2s, background 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .chat-card:active { transform: scale(0.98); background: rgba(184, 134, 11, 0.2); }

        .chat-info h3 { margin: 0; color: var(--gold); font-family: 'MedievalSharp'; font-size: 1.2rem; }
        
        .expiry-warning { 
            font-size: 0.8rem; 
            color: #ffaaaa; 
            font-style: italic; 
            margin-top: 5px;
            display: block;
        }

        /* Pulsanti */
        .btn-new { 
            background: var(--gold); 
            color: var(--leather); 
            border: none; 
            padding: 10px 15px; 
            border-radius: 8px;
            cursor: pointer; 
            font-family: 'MedievalSharp';
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
        }

        /* Modal Mobile Friendly */
        #new-msg-modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center; 
        }

        .modal-content { 
            background: var(--leather); 
            border: 2px solid var(--gold); 
            padding: 30px 20px; 
            width: 90%; 
            max-width: 400px; 
            border-radius: 15px; 
            text-align: center;
            box-shadow: 0 0 20px var(--gold);
        }

        select { 
            width: 100%; 
            padding: 15px; 
            background: var(--parchment); 
            margin: 20px 0; 
            font-family: 'Almendra'; 
            font-size: 1.1rem; 
            border-radius: 8px;
            border: none;
        }

        .btn-main { 
            background: var(--gold); 
            color: var(--leather); 
            border: none; 
            padding: 15px; 
            font-family: 'MedievalSharp'; 
            font-size: 1.1rem; 
            font-weight: bold;
            cursor: pointer; 
            width: 100%; 
            margin-top: 10px; 
            border-radius: 8px;
        }

        .btn-ghost {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 12px;
            margin-top: 10px;
            width: 100%;
            border-radius: 8px;
            font-family: 'MedievalSharp';
        }

        .back-link { color: var(--gold); text-decoration: none; font-family: 'MedievalSharp'; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-header">
        <a href="index.html" class="back-link">« Portale</a>
        <button class="btn-new" onclick="openModal()">📜 SCRIVI</button>
    </div>

    <h1>Missive Attive</h1>

    <div id="inbox-list">
        <p style="text-align:center; opacity:0.5; margin-top: 50px;">Consultando gli archivi reali...</p>
    </div>
</div>

<div id="new-msg-modal">
    <div class="modal-content">
        <h2 style="color: var(--gold); font-family: 'Grenze Gotisch'; margin: 0 0 10px 0;">Invia Missiva</h2>
        <p style="font-size: 0.9rem;">Seleziona un alleato per iniziare una conversazione.</p>
        <select id="friend-selector">
            <option value="">-- Seleziona Alleato --</option>
        </select>
        <button class="btn-main" onclick="startChat()">APRI PERGAMENA</button>
        <button class="btn-ghost" onclick="closeModal()">ANNULLA</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
        authDomain: "drakonia-companion.firebaseapp.com",
        projectId: "drakonia-companion",
        storageBucket: "drakonia-companion.firebasestorage.app",
        messagingSenderId: "803844500713",
        appId: "1:803844500713:web:c902b67f4e395bd20c9478"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
        if (user) { 
            loadInbox(user); 
            loadFriendsList(user); 
        } else { 
            window.location.href = 'login.html'; 
        }
    });

    function loadInbox(user) {
        // Aggiornamento in tempo reale: ascolta le chat dove l'utente è partecipante
        db.collection("chats")
        .where("participants", "array-contains", user.uid)
        .orderBy("lastUpdate", "desc")
        .onSnapshot(async snap => {
            const list = document.getElementById('inbox-list');
            if (snap.empty) { 
                list.innerHTML = "<p style='text-align:center; opacity:0.5; margin-top: 50px;'>Nessuna missiva attiva trovata.</p>"; 
                return; 
            }
            
            list.innerHTML = "";
            
            // Usiamo Promise.all per caricare tutti i nomi contemporaneamente
            const chatPromises = snap.docs.map(async doc => {
                const data = doc.data();
                const otherId = data.participants.find(id => id !== user.uid);
                
                // Prendi dati destinatario
                const fDoc = await db.collection("users").doc(otherId).get();
                const name = fDoc.exists ? (fDoc.data().username || "Viandante") : "Viandante";
                
                // Calcolo scadenza (7 giorni dall'ultimo messaggio)
                const lastUpdate = data.lastUpdate ? data.lastUpdate.toMillis() : Date.now();
                const expiry = lastUpdate + (7 * 24 * 60 * 60 * 1000);
                const diff = expiry - Date.now();
                const giorni = Math.max(0, Math.floor(diff / (1000 * 60 * 60 * 24)));
                const ore = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

                return `
                    <div class="chat-card" onclick="location.href='chat.html?id=${otherId}&name=${encodeURIComponent(name)}'">
                        <div class="chat-info">
                            <h3>✉️ ${name}</h3>
                            <span class="expiry-warning">Svanirà tra: ${giorni}g ${ore}h</span>
                        </div>
                        <span style="color:var(--gold); font-size:1.5rem;">»</span>
                    </div>`;
            });

            const results = await Promise.all(chatPromises);
            list.innerHTML = results.join("");
        });
    }

    async function loadFriendsList(user) {
        const sel = document.getElementById('friend-selector');
        // Carica amici confermati
        const snap = await db.collection("friendships")
            .where("users", "array-contains", user.uid)
            .where("status", "==", "accepted")
            .get();
        
        snap.forEach(async d => {
            const fId = d.data().users.find(id => id !== user.uid);
            const fDoc = await db.collection("users").doc(fId).get();
            if (fDoc.exists) {
                const opt = document.createElement('option');
                opt.value = fId; 
                opt.innerText = fDoc.data().username; 
                opt.dataset.name = fDoc.data().username;
                sel.appendChild(opt);
            }
        });
    }

    function openModal() { document.getElementById('new-msg-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('new-msg-modal').style.display = 'none'; }
    
    function startChat() {
        const sel = document.getElementById('friend-selector');
        if (!sel.value) return;
        const name = sel.options[sel.selectedIndex].dataset.name;
        location.href = `chat.html?id=${sel.value}&name=${encodeURIComponent(name)}`;
    }
</script>
</body>
</html>
