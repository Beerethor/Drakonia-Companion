<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox Missive - Drakonia</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #b8860b; --parchment: #f4e4bc; --leather: #2c1e11; --blood: #8b0000; --ink: #1a110a; }
        
        body { 
            background: var(--ink) url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--parchment); font-family: 'Almendra', serif; margin: 0; padding: 20px;
        }

        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-family: 'Grenze Gotisch'; color: var(--gold); text-align: center; }

        /* Lista Chat */
        .chat-card { 
            background: rgba(244, 228, 188, 0.05); border: 1px solid var(--gold); 
            padding: 15px; margin-bottom: 10px; border-radius: 8px; cursor: pointer;
            transition: 0.3s; display: flex; justify-content: space-between; align-items: center;
        }
        .chat-card:hover { background: rgba(184, 134, 11, 0.15); }
        .expiry-warning { font-size: 0.75rem; color: #ff6666; font-style: italic; }

        /* Modal */
        #new-msg-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--leather); border: 2px solid var(--gold); padding: 25px;
            width: 90%; max-width: 400px; border-radius: 10px; text-align: center;
        }

        .btn-main {
            background: var(--gold); color: var(--leather); border: none; padding: 12px 20px;
            font-family: 'Grenze Gotisch'; font-size: 1.1rem; cursor: pointer; width: 100%;
            margin-top: 10px; border-radius: 4px;
        }

        select {
            width: 100%; padding: 12px; background: var(--parchment); color: var(--ink);
            font-family: 'Almendra'; margin: 15px 0; border-radius: 4px; font-size: 1rem;
        }

        .empty-state { text-align: center; opacity: 0.6; margin-top: 40px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <a href="index.html" style="color: var(--gold); text-decoration: none; font-family: 'MedievalSharp';">« Portale</a>
        <button onclick="openModal()" style="background:none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; cursor: pointer; font-family: 'Grenze Gotisch';">📜 Nuova Missiva</button>
    </div>

    <h1>Inbox Missive</h1>

    <div id="inbox-list">
        <p class="empty-state">Consultando gli archivi...</p>
    </div>
</div>

<div id="new-msg-modal">
    <div class="modal-content">
        <h2 style="color: var(--gold); margin-top: 0; font-family: 'Grenze Gotisch';">Invia Missiva</h2>
        <p>Scegli il destinatario tra i tuoi alleati:</p>
        <select id="friend-selector">
            <option value="">-- Seleziona Alleato --</option>
        </select>
        <button class="btn-main" onclick="startChat()">APRI PERGAMENA</button>
        <button class="btn-main" onclick="closeModal()" style="background:none; color:var(--gold); border: 1px solid var(--gold);">CHIUDI</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
        authDomain: "drakonia-companion.firebaseapp.com",
        projectId: "drakonia-companion",
        storageBucket: "drakonia-companion.firebasestorage.app",
        messagingSenderId: "803844500713",
        appId: "1:803844500713:web:c902b67f4e395bd20c9478"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
        if (user) {
            loadInbox(user);
            loadFriendsList(user);
        } else {
            window.location.href = 'login.html';
        }
    });

    function loadInbox(user) {
        db.collection("chats")
            .where("participants", "array-contains", user.uid)
            .orderBy("lastUpdate", "desc")
            .onSnapshot(async snap => {
                const list = document.getElementById('inbox-list');
                if (snap.empty) {
                    list.innerHTML = "<p class='empty-state'>Nessun messaggio trovato. Inizia una nuova conversazione!</p>";
                    return;
                }

                list.innerHTML = "";
                for (const doc of snap.docs) {
                    const data = doc.data();
                    const otherId = data.participants.find(id => id !== user.uid);
                    
                    const friendDoc = await db.collection("users").doc(otherId).get();
                    const friendName = friendDoc.exists ? (friendDoc.data().username || "Ignoto") : "Ignoto";

                    const lastUpdate = data.lastUpdate ? data.lastUpdate.toMillis() : Date.now();
                    const diff = (lastUpdate + (7 * 24 * 60 * 60 * 1000)) - Date.now();
                    const giorni = Math.max(0, Math.floor(diff / (1000 * 60 * 60 * 24)));

                    list.innerHTML += `
                        <div class="chat-card" onclick="goToChat('${otherId}', '${friendName}')">
                            <div>
                                <div style="font-size: 1.2rem; font-weight: bold; color: var(--gold);">✉️ ${friendName}</div>
                                <div class="expiry-warning">Cancellazione tra ${giorni} giorni</div>
                            </div>
                            <span style="color: var(--gold); font-size: 1.5rem;">»</span>
                        </div>`;
                }
            }, err => {
                console.error("Errore snapshot:", err);
                document.getElementById('inbox-list').innerHTML = "Errore nel caricamento dei messaggi.";
            });
    }

    async function loadFriendsList(user) {
        const selector = document.getElementById('friend-selector');
        const snap = await db.collection("friendships")
            .where("users", "array-contains", user.uid)
            .where("status", "==", "accepted")
            .get();

        for (const d of snap.docs) {
            const friendId = d.data().users.find(id => id !== user.uid);
            const fDoc = await db.collection("users").doc(friendId).get();
            if (fDoc.exists) {
                const opt = document.createElement('option');
                opt.value = friendId;
                const name = fDoc.data().username || "Compagno";
                opt.dataset.name = name;
                opt.innerText = name;
                selector.appendChild(opt);
            }
        }
    }

    function openModal() { document.getElementById('new-msg-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('new-msg-modal').style.display = 'none'; }

    function startChat() {
        const sel = document.getElementById('friend-selector');
        const id = sel.value;
        const name = sel.options[sel.selectedIndex].dataset.name;
        if (!id) return alert("Scegli un alleato!");
        goToChat(id, name);
    }

    function goToChat(id, name) {
        // PUNTIAMO ALLA PAGINA DELLA CHAT SINGOLA
        window.location.href = `chat.html?id=${id}&name=${encodeURIComponent(name)}`;
    }
</script>
</body>
</html>
