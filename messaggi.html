<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missive Segrete - Drakonia</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #b8860b; --parchment: #f4e4bc; --leather: #2c1e11; --blood: #8b0000; --ink: #1a110a; }
        
        body { 
            background: var(--ink) url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--parchment); font-family: 'Almendra', serif; margin: 0; display: flex; flex-direction: column; height: 100vh;
        }

        /* Header */
        .chat-header { 
            background: var(--leather); padding: 15px; border-bottom: 2px solid var(--gold);
            display: flex; align-items: center; justify-content: space-between;
        }
        .back-btn { color: var(--gold); text-decoration: none; font-family: 'MedievalSharp'; }

        /* Timer Scadenza */
        #expiry-timer { 
            font-size: 0.85rem; text-align: center; padding: 5px; 
            background: rgba(139, 0, 0, 0.2); color: #ff6666; font-weight: bold;
        }

        /* Area Messaggi */
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px;
            background: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
        }

        .msg { max-width: 80%; padding: 10px 15px; border-radius: 8px; position: relative; line-height: 1.4; }
        .msg.sent { align-self: flex-end; background: var(--gold); color: var(--leather); border-bottom-right-radius: 2px; }
        .msg.received { align-self: flex-start; background: var(--leather); color: var(--parchment); border: 1px solid var(--gold); border-bottom-left-radius: 2px; }
        
        .msg-time { font-size: 0.7rem; opacity: 0.7; display: block; margin-top: 5px; text-align: right; }

        /* Input Area */
        .input-area { 
            background: var(--leather); padding: 15px; display: flex; gap: 10px; border-top: 2px solid var(--gold);
        }
        input { 
            flex: 1; background: var(--parchment); border: none; padding: 12px; 
            font-family: 'Almendra'; border-radius: 4px; font-size: 1rem;
        }
        .send-btn { 
            background: var(--gold); border: none; padding: 0 20px; 
            font-family: 'MedievalSharp'; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="chat-header">
        <a href="amici-pg.html" class="back-btn">⬅ Alleati</a>
        <h3 id="chat-with-name" style="margin:0; color:var(--gold);">Missiva</h3>
        <div style="width: 50px;"></div>
    </div>

    <div id="expiry-timer">Calcolo tempo rimasto...</div>

    <div id="chat-window">
        </div>

    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Scrivi una missiva..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">INVIA</button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
        authDomain: "drakonia-companion.firebaseapp.com",
        projectId: "drakonia-companion",
        storageBucket: "drakonia-companion.firebasestorage.app",
        messagingSenderId: "803844500713",
        appId: "1:803844500713:web:c902b67f4e395bd20c9478"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // Ottieni parametri dall'URL (amici-pg.html dovrà passare l'ID amico)
    const urlParams = new URLSearchParams(window.location.search);
    const friendId = urlParams.get('id');
    const friendName = urlParams.get('name');
    let chatId = null;

    if (!friendId) window.location.href = 'amici-pg.html';
    document.getElementById('chat-with-name').innerText = friendName;

    auth.onAuthStateChanged(user => {
        if (user) {
            setupChat(user);
        } else {
            window.location.href = 'login.html';
        }
    });

    async function setupChat(user) {
        // Genera un ID chat unico basato sui due UID (sempre nello stesso ordine)
        chatId = user.uid < friendId ? `${user.uid}_${friendId}` : `${friendId}_${user.uid}`;

        // Ascolta i messaggi
        db.collection("chats").doc(chatId).collection("messages")
            .orderBy("timestamp", "asc")
            .onSnapshot(snap => {
                const win = document.getElementById('chat-window');
                win.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const isSent = m.senderId === user.uid;
                    win.innerHTML += `
                        <div class="msg ${isSent ? 'sent' : 'received'}">
                            ${m.text}
                            <span class="msg-time">${m.timestamp ? new Date(m.timestamp.toMillis()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : ''}</span>
                        </div>`;
                });
                win.scrollTop = win.scrollHeight;
            });

        // Ascolta i dati della chat per il timer
        db.collection("chats").doc(chatId).onSnapshot(doc => {
            if (doc.exists) {
                updateExpiryTimer(doc.data().lastUpdate);
            }
        });
    }

    function updateExpiryTimer(lastUpdate) {
        if (!lastUpdate) return;
        const lastTs = lastUpdate.toMillis();
        const expiryTs = lastTs + (7 * 24 * 60 * 60 * 1000);
        
        const now = Date.now();
        const diff = expiryTs - now;

        if (diff <= 0) {
            document.getElementById('expiry-timer').innerText = "QUESTA MISSIVA È SCADUTA E VERRÀ CANCELLATA.";
            return;
        }

        const giorni = Math.floor(diff / (1000 * 60 * 60 * 24));
        const ore = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        
        document.getElementById('expiry-timer').innerText = 
            `📜 La polvere del tempo spazzerà via questi messaggi tra: ${giorni}g ${ore}ore`;
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        const user = auth.currentUser;

        if (!text || !chatId) return;

        const now = firebase.firestore.FieldValue.serverTimestamp();

        // 1. Aggiungi il messaggio
        await db.collection("chats").doc(chatId).collection("messages").add({
            senderId: user.uid,
            text: text,
            timestamp: now
        });

        // 2. Aggiorna il timestamp della chat (resetta i 7 giorni)
        await db.collection("chats").doc(chatId).set({
            lastUpdate: now,
            participants: [user.uid, friendId]
        }, { merge: true });

        input.value = "";
    }
</script>
</body>
</html>
