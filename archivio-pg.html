<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drakonia - Archivio Eroi</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #b8860b; --leather: #2c1e11; --parchment: #f4e4bc; }
        body { 
            background: #120d08 url('https://www.transparenttextures.com/patterns/dark-leather.png'); 
            color: var(--leather); font-family: 'Almendra', serif; padding: 20px;
        }
        .archive-container {
            max-width: 1000px; margin: 0 auto;
            background: var(--parchment); padding: 30px;
            border: 15px solid transparent;
            border-image: url('https://www.transparenttextures.com/patterns/dark-leather.png') 30 stretch;
        }
        h1 { font-family: 'Grenze Gotisch'; text-align: center; font-size: 2.5rem; border-bottom: 2px solid var(--leather); }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .hero-card { 
            background: rgba(0,0,0,0.05); border: 2px solid var(--leather); border-radius: 10px;
            padding: 15px; position: relative; transition: 0.3s;
        }
        .hero-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .hero-img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; border: 1px solid var(--gold); }
        .hero-info h3 { margin: 10px 0 5px 0; font-family: 'Grenze Gotisch'; color: #8b0000; }
        .badge { font-size: 0.8rem; background: var(--leather); color: var(--gold); padding: 2px 8px; border-radius: 5px; }
        .btn-view { display: block; text-align: center; background: var(--leather); color: var(--gold); padding: 10px; text-decoration: none; margin-top: 10px; font-family: 'Grenze Gotisch'; }
    </style>
</head>
<body>

<div class="archive-container">
    <h1>ARCHIVIO DEGLI EROI</h1>
    <div id="loader" style="text-align:center;">Caricamento cronache in corso...</div>
    <div class="hero-grid" id="hero-grid"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
        authDomain: "drakonia-companion.firebaseapp.com",
        projectId: "drakonia-companion",
        storageBucket: "drakonia-companion.firebasestorage.app",
        messagingSenderId: "803844500713",
        appId: "1:803844500713:web:c902b67f4e395bd20c9478"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            caricaArchivio(user);
        } else {
            window.location.href = 'login.html';
        }
    });

    async function caricaArchivio(user) {
        const grid = document.getElementById('hero-grid');
        const loader = document.getElementById('loader');
        
        try {
            // 1. Recupera il ruolo dell'utente (Giocatore, Master, Founder)
            const userDoc = await db.collection("users").doc(user.uid).get();
            const userData = userDoc.data();
            const role = userData.role || "Giocatore";

            let query;
            
            // 2. Logica di Visualizzazione
            if (role === "Founder") {
                // Il Founder vede tutto
                query = db.collection("characters");
            } else if (role === "Master") {
                // Il Master vede i suoi PG E quelli delle campagne che gestisce
                // Nota: Assicurati che nel documento del PG ci sia il campo 'campagna'
                query = db.collection("characters").where("masterId", "==", user.uid); 
                // Se preferisci vedere tutti i PG filtrati per nome campagna:
                // query = db.collection("characters").where("campagna", "in", userData.campagneGestite);
            } else {
                // Il Giocatore vede solo i propri PG
                query = db.collection("characters").where("userId", "==", user.uid);
            }

            const snapshot = await query.get();
            loader.style.display = 'none';

            if (snapshot.empty) {
                grid.innerHTML = "<p style='text-align:center; width:100%;'>Nessun eroe trovato negli annali.</p>";
                return;
            }

            snapshot.forEach(doc => {
                const hero = doc.data();
                const card = `
                    <div class="hero-card">
                        <img src="${hero.ritratto || 'https://via.placeholder.com/150'}" class="hero-img">
                        <div class="hero-info">
                            <h3>${hero.nome}</h3>
                            <span class="badge">${hero.classe}</span>
                            <p>Livello: ${hero.livello} - ${hero.rango}</p>
                            <p><small>Campagna: ${hero.campagna || 'Nessuna'}</small></p>
                            <a href="scheda-dettaglio.html?id=${doc.id}" class="btn-view">ESAMINA SCHEDA</a>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });

        } catch (error) {
            console.error("Errore nel recupero archivio:", error);
            loader.innerText = "Errore nel caricamento degli annali.";
        }
    }
</script>
</body>
</html>
