<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drakonia - Level Up</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #b8860b; --leather: #2c1e11; --parchment: #f4e4bc; --blood: #8b0000; }
        
        body { 
            background: #120d08; 
            color: var(--leather); 
            font-family: 'Almendra', serif; 
            margin: 0; 
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .sheet-container {
            background: var(--parchment) url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            width: 100%;
            max-width: 500px;
            padding: 15px;
            border: 10px solid transparent;
            border-image: url('https://www.transparenttextures.com/patterns/dark-leather.png') 30 stretch;
            box-shadow: 0 0 30px black;
            box-sizing: border-box;
        }

        h1 { font-family: 'Grenze Gotisch'; font-size: 1.8rem; text-align: center; margin: 10px 0; border-bottom: 2px solid var(--leather); }
        h2 { font-family: 'Grenze Gotisch'; font-size: 1.3rem; text-align: center; color: var(--blood); margin-bottom: 20px; }

        .section { 
            background: rgba(0,0,0,0.05); 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            border: 1px solid rgba(44, 30, 17, 0.3); 
        }

        label { display: block; font-weight: bold; font-family: 'Grenze Gotisch'; margin-bottom: 5px; color: var(--leather); font-size: 0.9rem; }
        
        select, input, textarea { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 10px;
            border: 1px solid var(--leather);
            background: white;
            font-family: 'Almendra';
            font-size: 1rem;
            border-radius: 4px;
            box-sizing: border-box;
        }

        /* Grid Stats ottimizzata per Mobile */
        .stat-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 8px; 
            margin-bottom: 10px; 
        }
        .stat-box { 
            background: rgba(255,255,255,0.5); 
            border: 1px solid var(--leather); 
            text-align: center; 
            padding: 8px;
            border-radius: 4px;
        }
        .stat-val { font-size: 1.4rem; font-weight: bold; color: var(--blood); }

        .ability-box {
            background: var(--leather);
            color: var(--gold);
            padding: 12px;
            border-radius: 6px;
            font-size: 0.95rem;
            display: none;
            border: 1px solid var(--gold);
            margin-top: 10px;
        }

        .inventory-mini {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }
        .inventory-mini input { padding: 8px; font-size: 0.8rem; text-align: center; }

        .btn-main {
            background: var(--blood);
            color: white;
            border: 2px solid var(--gold);
            padding: 15px;
            width: 100%;
            font-family: 'Grenze Gotisch';
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .bonus-highlight {
            background: #fff3cd;
            border: 2px dashed var(--gold);
            padding: 10px;
            margin-top: 10px;
            display: none;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
    </style>
</head>
<body>

<div class="sheet-container">
    <h1>AVANZAMENTO LIVELLO</h1>
    <h2 id="display-nome">Caricamento...</h2>

    <div class="section">
        <label>AZIONE</label>
        <select id="mode-select" onchange="toggleMode()">
            <option value="up">Aumenta Classe Esistente</option>
            <option value="multi">Nuova Classe (Multiclasse)</option>
        </select>

        <div id="box-up">
            <label>QUALE CLASSE?</label>
            <select id="select-current-class" onchange="checkNextAbility()"></select>
        </div>

        <div id="box-multi" style="display:none;">
            <label>SCEGLI NUOVA VIA</label>
            <select id="select-new-class" onchange="checkNextAbility()">
                <option value="">-- Seleziona --</option>
                <option value="Guerriero">Guerriero</option>
                <option value="Truffatore">Truffatore</option>
                <option value="Saggio">Saggio</option>
                <option value="Stregone">Stregone</option>
                <option value="Druido">Druido</option>
            </select>
        </div>

        <div id="ability-info" class="ability-box">
            <strong>ABILITÀ:</strong> <span id="ability-name"></span>
        </div>

        <div id="stat-bonus-box" class="bonus-highlight">
            <label>✨ SELEZIONA AUMENTO STAT (+1)</label>
            <select id="stat-to-boost">
                <option value="">-- Scegli --</option>
                <option value="prd">Prodezza (PRD)</option>
                <option value="int">Intelligenza (INT)</option>
                <option value="rpd">Rapidità (RPD)</option>
                <option value="pr">Resistenza (PR)</option>
            </select>
        </div>
    </div>

    <div class="section">
        <label>STATS ATTUALI</label>
        <div class="stat-grid">
            <div class="stat-box"><small>PRD</small><div id="cur-prd" class="stat-val">0</div></div>
            <div class="stat-box"><small>INT</small><div id="cur-int" class="stat-val">0</div></div>
            <div class="stat-box"><small>RPD</small><div id="cur-rpd" class="stat-val">0</div></div>
            <div class="stat-box"><small>PR</small><div id="cur-pr" class="stat-val">0</div></div>
        </div>
    </div>

    <div class="section">
        <label>ZAINO (OGGETTI)</label>
        <div class="inventory-mini" id="zaino-slots"></div>
    </div>

    <button class="btn-main" onclick="confermaLevelUp()">Incidi nel Destino</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
        authDomain: "drakonia-companion.firebaseapp.com",
        projectId: "drakonia-companion",
        storageBucket: "drakonia-companion.firebasestorage.app",
        messagingSenderId: "803844500713",
        appId: "1:803844500713:web:c902b67f4e395bd20c9478"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    const charId = urlParams.get('id');
    let pgData = null;

    const tabelle = {
        "Guerriero": ["", "Casta dei Guerrieri", "Armature Pesanti", "Minaccioso", "Aumento Caratteristica", "Ambidestro 1", "Aumento Caratteristica", "Addestramento Marziale", "Aumento Caratteristica", "Ambidestro 3"],
        "Truffatore": ["", "Furbizia Lesto", "Tecnica dell'Arco", "Virtuoso", "Tecnica del Pugnale", "Aumento Caratteristica", "Intrallazzo", "Aumento Caratteristica", "Aumento Caratteristica", "Velocità di Pensiero 3"],
        "Saggio": ["", "Guarigione", "Tecnica del Bastone", "Leggere la Mente", "Vista Paranormale", "Aumento Caratteristica", "Aumento Caratteristica", "Immunità", "Aumento Caratteristica", "Esorcismo 3"],
        "Stregone": ["", "Stregoneria 1", "Rituale 1", "Memoria Magica 1", "Stregoneria 2", "Aumento Caratteristica", "Trascrizione", "Aumento Caratteristica", "Aumento Caratteristica", "Stregoneria 4"],
        "Druido": ["", "Magia Primordiale 1", "Tecnica della Natura", "Aumento Caratteristica", "Sintonia 1", "Aumento Caratteristica", "Sintonia 2", "Rituale 2", "Aumento Caratteristica", "Magia Primordiale 4"]
    };

    window.onload = async () => {
        if(!charId) return alert("Nessun ID Personaggio!");
        
        // Setup slot zaino
        const container = document.getElementById('zaino-slots');
        for(let i=0; i<9; i++) container.innerHTML += `<input type="text" id="slot-${i}">`;

        try {
            const doc = await db.collection("characters").doc(charId).get();
            if(!doc.exists) return alert("Eroe non trovato!");
            pgData = doc.data();
            renderPG();
        } catch(e) { console.error("Errore caricamento:", e); }
    };

    function renderPG() {
        document.getElementById('display-nome').innerText = pgData.nome;
        
        const s = pgData.stats || {prd:0, int:0, rpd:0, pr:0};
        document.getElementById('cur-prd').innerText = s.prd;
        document.getElementById('cur-int').innerText = s.int;
        document.getElementById('cur-rpd').innerText = s.rpd;
        document.getElementById('cur-pr').innerText = s.pr;

        // Gestione classi (compatibilità mappa/stringa)
        let mappa = (typeof pgData.classe === 'object') ? pgData.classe : {[pgData.classe]: pgData.livello};
        pgData.mappaClassi = mappa;

        const sel = document.getElementById('select-current-class');
        sel.innerHTML = "";
        for(let c in mappa) {
            sel.innerHTML += `<option value="${c}">${c} (Liv. ${mappa[c]})</option>`;
        }

        if(pgData.inventario && pgData.inventario.zaino) {
            pgData.inventario.zaino.forEach((item, i) => {
                if(i < 9) document.getElementById(`slot-${i}`).value = item;
            });
        }
    }

    function toggleMode() {
        const mode = document.getElementById('mode-select').value;
        document.getElementById('box-up').style.display = mode === 'up' ? 'block' : 'none';
        document.getElementById('box-multi').style.display = mode === 'multi' ? 'block' : 'none';
        checkNextAbility();
    }

    function checkNextAbility() {
        const mode = document.getElementById('mode-select').value;
        const cls = mode === 'up' ? document.getElementById('select-current-class').value : document.getElementById('select-new-class').value;
        
        if(!cls) {
            document.getElementById('ability-info').style.display = 'none';
            return;
        }

        const livFuturo = mode === 'up' ? (pgData.mappaClassi[cls] || 0) + 1 : 1;
        const abil = (tabelle[cls] && tabelle[cls][livFuturo]) ? tabelle[cls][livFuturo] : "Avanzamento Standard";
        
        document.getElementById('ability-name').innerText = abil;
        document.getElementById('ability-info').style.display = 'block';
        
        // Mostra selettore stat se l'abilità contiene "Aumento Caratteristica"
        document.getElementById('stat-bonus-box').style.display = abil.includes("Aumento") ? 'block' : 'none';
    }

    async function confermaLevelUp() {
        if(!pgData) return alert("Dati non pronti!");
        
        const mode = document.getElementById('mode-select').value;
        const cls = mode === 'up' ? document.getElementById('select-current-class').value : document.getElementById('select-new-class').value;
        const boost = document.getElementById('stat-to-boost').value;

        if(!cls) return alert("Seleziona una classe!");
        if(document.getElementById('stat-bonus-box').style.display === 'block' && !boost) {
            return alert("Scegli quale statistica aumentare!");
        }

        let nuovaMappa = {...pgData.mappaClassi};
        nuovaMappa[cls] = (nuovaMappa[cls] || 0) + 1;
        
        let nuovoLvl = (parseInt(pgData.livello) || 1) + 1;
        let nuoveStats = {...pgData.stats};
        if(boost) nuoveStats[boost] = (parseInt(nuoveStats[boost]) || 0) + 1;

        const ranghi = {1:"Alle Prime Armi", 2:"Principiante", 3:"Esperto", 4:"Navigato", 5:"Provetto", 6:"Veterano", 7:"Straordinario", 8:"Leggendario", 9:"Epico"};

        const updateData = {
            livello: nuovoLvl,
            rango: ranghi[nuovoLvl] || "Leggenda",
            classe: nuovaMappa,
            stats: nuoveStats,
            "inventario.zaino": Array.from({length:9}, (_,i) => document.getElementById(`slot-${i}`).value)
        };

        try {
            await db.collection("characters").doc(charId).update(updateData);
            alert("L'Eroe è progredito!");
            window.location.href = "index.html";
        } catch(e) { alert("Errore: " + e.message); }
    }
</script>

</body>
</html>
