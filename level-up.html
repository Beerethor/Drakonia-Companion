<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drakonia - Avanzamento Eroe</title>
    <link rel="icon" type="image/png" href="icon/icon_192x192.png">
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #b8860b; --leather: #2c1e11; --parchment: #f4e4bc; --blood: #8b0000; }
        body { 
            background: #120d08 url('https://www.transparenttextures.com/patterns/dark-leather.png'); 
            color: var(--leather); font-family: 'Almendra', serif; margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }
        .sheet-container {
            background: var(--parchment) url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            width: 100%; max-width: 900px; padding: 40px;
            border: 20px solid transparent;
            border-image: url('https://www.transparenttextures.com/patterns/dark-leather.png') 30 stretch;
            box-shadow: 0 0 50px black; position: relative;
        }
        .btn-back {
            position: absolute; top: 10px; left: 10px;
            background: var(--leather); color: var(--gold); border: 1px solid var(--gold);
            padding: 5px 15px; cursor: pointer; font-family: 'Grenze Gotisch'; text-decoration: none;
        }
        h1, h2 { font-family: 'Grenze Gotisch'; text-align: center; border-bottom: 2px solid var(--leather); margin-top: 10px; }
        .section { background: rgba(0,0,0,0.05); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--leather); }
        
        label { display: block; font-weight: bold; font-family: 'Grenze Gotisch'; margin-bottom: 5px; color: var(--leather); }
        input, textarea, select { 
            width: 100%; padding: 10px; border: 1px solid var(--leather);
            background: rgba(255,255,255,0.6); font-family: 'Almendra'; font-size: 1.1rem; box-sizing: border-box;
        }

        .stat-display-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-box { text-align: center; border: 2px solid var(--leather); padding: 10px; border-radius: 5px; background: rgba(255,255,255,0.3); }
        .stat-val { font-size: 1.8rem; font-weight: bold; color: var(--blood); }

        .ability-gain { background: var(--leather); color: var(--gold); padding: 15px; margin-top: 10px; border-radius: 5px; display: none; border: 1px solid var(--gold); }
        .inventory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        #bonus-stat-selector { 
            display: none; background: #fff3cd; padding: 15px; border-radius: 5px; 
            border: 2px solid var(--gold); margin-top: 15px; animation: flash 1s infinite alternate;
        }
        @keyframes flash { from { box-shadow: 0 0 5px var(--gold); } to { box-shadow: 0 0 15px var(--gold); } }

        .btn-update { 
            background: var(--blood); color: white; border: 2px solid var(--gold); 
            padding: 20px; width: 100%; font-family: 'Grenze Gotisch'; 
            font-size: 1.8rem; cursor: pointer; margin-top: 20px; 
        }
        .btn-update:hover { background: #a00000; }
    </style>
</head>
<body>

<div class="sheet-container">
    <a href="index.html" class="btn-back">⬅ ANNULLA</a>
    
    <h1>AVANZAMENTO DI LIVELLO</h1>
    <h2 id="char-name">Caricamento Eroe...</h2>

    <div class="section">
        <label>COSA DESIDERI FARE?</label>
        <select id="levelup-choice" onchange="updateLevelingUI()">
            <option value="aumenta">Aumenta livello classe attuale</option>
            <option value="multiclasse">Multiclasse (Inizia nuova classe)</option>
        </select>

        <div id="ui-aumenta" style="margin-top:15px;">
            <label>Quale classe vuoi portare al livello successivo?</label>
            <select id="select-class-to-up" onchange="previewAbility()"></select>
        </div>

        <div id="ui-multiclasse" style="margin-top:15px; display:none;">
            <label>Scegli la nuova classe (Partirai dal Livello 1):</label>
            <select id="select-new-class" onchange="previewAbility()">
                <option value="">Scegli...</option>
                <option value="Guerriero">Guerriero</option>
                <option value="Truffatore">Truffatore</option>
                <option value="Saggio">Saggio</option>
                <option value="Stregone">Stregone</option>
                <option value="Druido">Druido</option>
            </select>
        </div>

        <div id="ability-preview" class="ability-gain">
            <strong>✨ NUOVA ABILITÀ:</strong> <span id="ability-text"></span>
        </div>
    </div>

    <div class="section">
        <label>CARATTERISTICHE ATTUALI</label>
        <div class="stat-display-grid">
            <div class="stat-box"><label>PRD</label><div id="val-prd" class="stat-val">0</div></div>
            <div class="stat-box"><label>INT</label><div id="val-int" class="stat-val">0</div></div>
            <div class="stat-box"><label>RPD</label><div id="val-rpd" class="stat-val">0</div></div>
            <div class="stat-box"><label>PR</label><div id="val-pr" class="stat-val">0</div></div>
        </div>

        <div id="bonus-stat-selector">
            <label>⚡ IL LIVELLO CONCEDE UN AUMENTO! Scegli quale Caratteristica aumentare di +1:</label>
            <select id="chosen-stat-bonus">
                <option value="">-- Seleziona --</option>
                <option value="prd">Prodezza (PRD)</option>
                <option value="int">Intelligenza (INT)</option>
                <option value="rpd">Rapidità (RPD)</option>
                <option value="pr">Resistenza (PR)</option>
            </select>
        </div>
    </div>

    <div class="section">
        <label>AGGIORNA LA TUA STORIA (Nuove gesta...)</label>
        <textarea id="edit-storia" rows="4"></textarea>
        
        <label style="margin-top:15px;">EQUIPAGGIAMENTO PRINCIPALE</label>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
            <input type="text" id="edit-arma" placeholder="Arma">
            <input type="text" id="edit-armatura" placeholder="Armatura">
            <input type="text" id="edit-anello" placeholder="Anello">
        </div>

        <label style="margin-top:15px;">ZAINO (9 SLOT)</label>
        <div class="inventory-grid" id="inventory-inputs"></div>

        <label style="margin-top:15px;">ABILITÀ E INCANTESIMI (Aggiungi i nuovi ottenuti)</label>
        <textarea id="edit-incantesimi" rows="3"></textarea>
    </div>

    <button class="btn-update" onclick="salvaAvanzamento()">INCIDI I PROGRESSI NEGLI ANNALI</button>
</div>

<script>
    // Inserisci qui la tua Configurazione Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
        authDomain: "drakonia-companion.firebaseapp.com",
        projectId: "drakonia-companion",
        storageBucket: "drakonia-companion.firebasestorage.app",
        messagingSenderId: "803844500713",
        appId: "1:803844500713:web:c902b67f4e395bd20c9478"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const charId = new URLSearchParams(window.location.search).get('id');
    let charData = null;
    let canGainStat = false;

    // Database Abilità (Tratte dai tuoi manuali)
    const classAbilities = {
        "Guerriero": ["", "Casta dei Guerrieri", "Armature Pesanti", "Minaccioso", "Aumento Caratteristica / Tecnica Scudo", "Lasciapassare / Ambidestro 1", "Veterano / Ambidestro 2", "Aumento Caratteristica / Addestramento Marziale", "Aumento Caratteristica", "Aumento Caratteristica / Ambidestro 3"],
        "Truffatore": ["", "Furbizia Lesta", "Tecnica dell'Arco", "Virtuoso", "Aggancio / Tecnica del Pugnale", "Aumento Caratteristica / Velocità di Pensiero 1", "Aumento Caratteristica / Intrallazzo", "Aumento Caratteristica / Velocità di Pensiero 2", "Aumento Caratteristica / Velocità di Pensiero 3", "Aumento Caratteristica"],
        "Saggio": ["", "Guarigione / Esorcismo 1", "Tecnica del Bastone", "Leggere la Mente", "Conoscenza Superiore / Vista Paranormale", "Esorcismo 2 / Dono delle Lingue / Aumento Caratteristica", "Aumento Caratteristica / Levitazione / Tecnica dell'Arco", "Aumento Caratteristica / Immunità", "Aumento Caratteristica", "Esorcismo 3 / Aumento Caratteristica"],
        "Stregone": ["", "Stregoneria 1 / Armi", "Incantesimo Rituale 1", "Incantesimo Rituale 2 / Memoria Magica 1", "Stregoneria 2 / Incantesimo Rituale 3", "Incantesimo Rituale 4 / Memoria Magica 2 / Aumento Caratteristica", "Apprendimento Trascrizione", "Stregoneria 3 / Memoria Magica 3 / Aumento Caratteristica", "Aumento Caratteristica", "Stregoneria 4 / Aumento Caratteristica"],
        "Druido": ["", "Magia Primordiale 1 / Martello", "Incantesimo Rituale 1 / Tecnica della Natura", "Esperto / Aumento Caratteristica", "Magia Primordiale 2 / Sintonia con la Natura 1", "Aumento Caratteristica / Furia della Natura", "Magia Primordiale 3 / Sintonia con la Natura 2", "Incantesimo Rituale 2", "Aumento Caratteristica", "Magia Primordiale 4 / Aumento Caratteristica"]
    };

    window.onload = async () => {
        if(!charId) return alert("Errore: Nessun ID personaggio!");

        // Crea slot zaino
        const invContainer = document.getElementById('inventory-inputs');
        for(let i=0; i<9; i++) invContainer.innerHTML += `<input type="text" id="inv-${i}" placeholder="Slot ${i+1}">`;

        // Carica Eroe
        const doc = await db.collection("characters").doc(charId).get();
        if(!doc.exists) return alert("Eroe non trovato!");
        charData = doc.data();
        
        initFields();
    };

    function initFields() {
        document.getElementById('char-name').innerText = charData.nome;
        document.getElementById('edit-storia').value = charData.storia || "";
        document.getElementById('edit-arma').value = charData.inventario.arma;
        document.getElementById('edit-armatura').value = charData.inventario.armatura;
        document.getElementById('edit-anello').value = charData.inventario.anello;
        document.getElementById('edit-incantesimi').value = charData.inventario.incantesimi;

        // Stats Visualizzate
        document.getElementById('val-prd').innerText = charData.stats.prd;
        document.getElementById('val-int').innerText = charData.stats.int;
        document.getElementById('val-rpd').innerText = charData.stats.rpd;
        document.getElementById('val-pr').innerText = charData.stats.pr;

        // Zaino
        charData.inventario.zaino.forEach((item, i) => {
            if(document.getElementById(`inv-${i}`)) document.getElementById(`inv-${i}`).value = item;
        });

        // Prepariamo le classi
        let currentClasses = (typeof charData.classe === 'string') ? {[charData.classe]: parseInt(charData.livello)} : charData.classe;
        charData.classiMappa = currentClasses;

        const selectUp = document.getElementById('select-class-to-up');
        selectUp.innerHTML = '<option value="">-- Scegli quale migliorare --</option>';
        for(let c in currentClasses) {
            selectUp.innerHTML += `<option value="${c}">${c} (Liv. attuale ${currentClasses[c]})</option>`;
        }
    }

    function updateLevelingUI() {
        const mode = document.getElementById('levelup-choice').value;
        document.getElementById('ui-aumenta').style.display = (mode === 'aumenta') ? 'block' : 'none';
        document.getElementById('ui-multiclasse').style.display = (mode === 'multiclasse') ? 'block' : 'none';
        previewAbility();
    }

    function previewAbility() {
        const mode = document.getElementById('levelup-choice').value;
        let targetClass = (mode === 'aumenta') ? document.getElementById('select-class-to-up').value : document.getElementById('select-new-class').value;
        
        if(!targetClass) {
            document.getElementById('ability-preview').style.display = 'none';
            document.getElementById('bonus-stat-selector').style.display = 'none';
            return;
        }

        let nextLvl = (mode === 'aumenta') ? charData.classiMappa[targetClass] + 1 : 1;
        
        const ability = (classAbilities[targetClass] && classAbilities[targetClass][nextLvl]) ? classAbilities[targetClass][nextLvl] : "Abilità generica di livello " + nextLvl;
        
        document.getElementById('ability-text').innerText = ability;
        document.getElementById('ability-preview').style.display = 'block';

        // Controllo automatico aumento caratteristica
        if(ability.includes("Aumento Caratteristica")) {
            document.getElementById('bonus-stat-selector').style.display = 'block';
            canGainStat = true;
        } else {
            document.getElementById('bonus-stat-selector').style.display = 'none';
            canGainStat = false;
        }
    }

    async function salvaAvanzamento() {
        const mode = document.getElementById('levelup-choice').value;
        const bonusStat = document.getElementById('chosen-stat-bonus').value;

        if(canGainStat && !bonusStat) return alert("Scegli quale caratteristica aumentare!");

        let nuoveClassi = {...charData.classiMappa};
        let lvTot = parseInt(charData.livello);

        if(mode === 'aumenta') {
            const c = document.getElementById('select-class-to-up').value;
            if(!c) return alert("Seleziona la classe!");
            if(nuoveClassi[c] >= 9) return alert("Classe al massimo!");
            nuoveClassi[c]++;
        } else {
            const c = document.getElementById('select-new-class').value;
            if(!c) return alert("Seleziona la nuova classe!");
            if(nuoveClassi[c]) return alert("Possiedi già questa classe!");
            nuoveClassi[c] = 1;
        }
        lvTot++;

        // Applica bonus stat
        let statsFinali = {...charData.stats};
        if(canGainStat && bonusStat) {
            statsFinali[bonusStat] = (parseInt(statsFinali[bonusStat]) || 0) + 1;
        }

        // Rango
        const rangoTab = {1:"Alle Prime Armi", 2:"Principiante", 3:"Esperto", 4:"Navigato", 5:"Provetto", 6:"Veterano", 7:"Straordinario", 8:"Leggendario", 9:"Epico"};
        const nuovoRango = rangoTab[lvTot] || "Leggenda";

        const updatePayload = {
            livello: lvTot,
            rango: nuovoRango,
            classe: nuoveClassi,
            storia: document.getElementById('edit-storia').value,
            stats: statsFinali,
            inventario: {
                arma: document.getElementById('edit-arma').value,
                armatura: document.getElementById('edit-armatura').value,
                anello: document.getElementById('edit-anello').value,
                incantesimi: document.getElementById('edit-incantesimi').value,
                zaino: Array.from({length:9}, (_,i) => document.getElementById(`inv-${i}`).value),
                oro: charData.inventario.oro
            }
        };

        try {
            await db.collection("characters").doc(charId).update(updatePayload);
            alert("✨ L'EROE È ASCESO! I progressi sono stati scritti.");
            window.location.href = "index.html";
        } catch(e) {
            alert("Errore del destino: " + e.message);
        }
    }
</script>
</body>
</html>
