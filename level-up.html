<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drakonia - Avanzamento Completo</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #b8860b; --leather: #2c1e11; --parchment: #f4e4bc; --blood: #8b0000; }
        body { background: #120d08; color: var(--leather); font-family: 'Almendra', serif; margin: 0; padding: 5px; }

        .sheet-container {
            background: var(--parchment) url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            width: 100%; max-width: 600px; margin: auto; padding: 15px;
            border: 10px solid transparent;
            border-image: url('https://www.transparenttextures.com/patterns/dark-leather.png') 30 stretch;
            box-sizing: border-box; box-shadow: 0 0 30px black;
        }

        h1, h2 { font-family: 'Grenze Gotisch'; text-align: center; margin: 5px 0; }
        h1 { font-size: 1.6rem; border-bottom: 2px solid var(--leather); }
        h2 { font-size: 1.2rem; color: var(--blood); }

        .section { 
            background: rgba(0,0,0,0.05); padding: 12px; border-radius: 8px; 
            margin-bottom: 15px; border: 1px solid rgba(44, 30, 17, 0.3); 
        }

        label { display: block; font-weight: bold; font-family: 'Grenze Gotisch'; margin-top: 10px; color: var(--blood); }
        
        select, input, textarea { 
            width: 100%; padding: 10px; margin-top: 5px;
            border: 1px solid var(--leather); background: rgba(255,255,255,0.8);
            font-family: 'Almendra'; font-size: 1rem; border-radius: 4px; box-sizing: border-box;
        }

        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; text-align: center; }
        .stat-box { border: 1px solid var(--leather); padding: 5px; background: white; }
        .stat-val { font-size: 1.2rem; font-weight: bold; }

        .inventory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .inventory-grid input { font-size: 0.85rem; padding: 8px; }

        .ability-box { 
            background: var(--leather); color: var(--gold); padding: 10px; 
            border-radius: 4px; margin-top: 10px; display: none; border: 1px solid var(--gold); 
        }

        .btn-main {
            background: var(--blood); color: white; border: 2px solid var(--gold);
            padding: 18px; width: 100%; font-family: 'Grenze Gotisch';
            font-size: 1.3rem; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="sheet-container">
    <h1>AVANZAMENTO EROE</h1>
    <h2 id="pg-nome">Caricamento...</h2>

    <div class="section">
        <label>GESTIONE LIVELLO</label>
        <select id="level-mode" onchange="updateUI()">
            <option value="up">Aumenta Classe Esistente</option>
            <option value="multi">Nuova Via (Multiclasse)</option>
        </select>

        <div id="ui-up"><select id="sel-class-up" onchange="previewAbil()"></select></div>
        <div id="ui-multi" style="display:none;">
            <select id="sel-new-class" onchange="previewAbil()">
                <option value="">-- Scegli Classe --</option>
                <option value="Guerriero">Guerriero</option>
                <option value="Truffatore">Truffatore</option>
                <option value="Saggio">Saggio</option>
                <option value="Stregone">Stregone</option>
                <option value="Druido">Druido</option>
            </select>
        </div>

        <div id="abil-preview" class="ability-box"></div>

        <div id="stat-bonus-ui" style="display:none; background:#fff3cd; padding:10px; margin-top:10px; border:1px solid var(--gold);">
            <label>✨ AUMENTO CARATTERISTICA (+1)</label>
            <select id="stat-boost">
                <option value="">-- Seleziona --</option>
                <option value="prd">Prodezza (PRD)</option>
                <option value="int">Intelligenza (INT)</option>
                <option value="rpd">Rapidità (RPD)</option>
                <option value="pr">Resistenza (PR)</option>
            </select>
        </div>
    </div>

    <div class="section">
        <label>CARATTERISTICHE ATTUALI</label>
        <div class="stat-grid">
            <div class="stat-box">PRD<div id="cur-prd" class="stat-val">0</div></div>
            <div class="stat-box">INT<div id="cur-int" class="stat-val">0</div></div>
            <div class="stat-box">RPD<div id="cur-rpd" class="stat-val">0</div></div>
            <div class="stat-box">PR<div id="cur-pr" class="stat-val">0</div></div>
        </div>

        <label>LA TUA CRONACA (STORIA)</label>
        <textarea id="edit-storia" rows="4"></textarea>
    </div>

    <div class="section">
        <label>EQUIPAGGIAMENTO ATTIVO</label>
        <input type="text" id="edit-arma" placeholder="Arma">
        <input type="text" id="edit-armatura" placeholder="Armatura">
        <input type="text" id="edit-anello" placeholder="Accessorio/Anello">

        <label>ZAINO (OGGETTI)</label>
        <div class="inventory-grid" id="zaino-inputs"></div>

        <label>ABILITÀ E INCANTESIMI</label>
        <textarea id="edit-incantesimi" rows="4" placeholder="Lista poteri e magie..."></textarea>
    </div>

    <button class="btn-main" onclick="salvaTutto()">INCIDI PROGRESSI</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
        authDomain: "drakonia-companion.firebaseapp.com",
        projectId: "drakonia-companion",
        storageBucket: "drakonia-companion.firebasestorage.app",
        messagingSenderId: "803844500713",
        appId: "1:803844500713:web:c902b67f4e395bd20c9478"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const charId = new URLSearchParams(window.location.search).get('id');
    let charData = null;

    const abilDB = {
        "Guerriero": ["", "Casta dei Guerrieri", "Armature Pesanti", "Minaccioso", "Aumento Caratteristica", "Ambidestro 1", "Aumento Caratteristica", "Addestramento Marziale", "Aumento Caratteristica", "Ambidestro 3"],
        "Truffatore": ["", "Furbizia Lesto", "Tecnica dell'Arco", "Virtuoso", "Tecnica del Pugnale", "Aumento Caratteristica", "Intrallazzo", "Aumento Caratteristica", "Aumento Caratteristica", "Velocità di Pensiero 3"],
        "Saggio": ["", "Guarigione", "Tecnica del Bastone", "Leggere la Mente", "Vista Paranormale", "Aumento Caratteristica", "Aumento Caratteristica", "Immunità", "Aumento Caratteristica", "Esorcismo 3"],
        "Stregone": ["", "Stregoneria 1", "Rituale 1", "Memoria Magica 1", "Stregoneria 2", "Aumento Caratteristica", "Trascrizione", "Aumento Caratteristica", "Aumento Caratteristica", "Stregoneria 4"],
        "Druido": ["", "Magia Primordiale 1", "Tecnica della Natura", "Aumento Caratteristica", "Sintonia 1", "Aumento Caratteristica", "Sintonia 2", "Rituale 2", "Aumento Caratteristica", "Magia Primordiale 4"]
    };

    window.onload = async () => {
        if(!charId) return alert("ID mancante!");
        
        const inv = document.getElementById('zaino-inputs');
        for(let i=0; i<9; i++) inv.innerHTML += `<input type="text" id="z-${i}" placeholder="Slot ${i+1}">`;

        const doc = await db.collection("characters").doc(charId).get();
        if(!doc.exists) return alert("Errore!");
        charData = doc.data();
        initUI();
    };

    function initUI() {
        document.getElementById('pg-nome').innerText = charData.nome;
        document.getElementById('edit-storia').value = charData.storia || "";
        document.getElementById('edit-arma').value = charData.inventario?.arma || "";
        document.getElementById('edit-armatura').value = charData.inventario?.armatura || "";
        document.getElementById('edit-anello').value = charData.inventario?.anello || "";
        document.getElementById('edit-incantesimi').value = charData.inventario?.incantesimi || "";

        const sts = charData.stats || {prd:0, int:0, rpd:0, pr:0};
        document.getElementById('cur-prd').innerText = sts.prd;
        document.getElementById('cur-int').innerText = sts.int;
        document.getElementById('cur-rpd').innerText = sts.rpd;
        document.getElementById('cur-pr').innerText = sts.pr;

        if(charData.inventario?.zaino) {
            charData.inventario.zaino.forEach((v, i) => { if(i<9) document.getElementById(`z-${i}`).value = v; });
        }

        let map = (typeof charData.classe === 'object') ? charData.classe : {[charData.classe]: charData.livello};
        charData.mappaClassi = map;

        const sel = document.getElementById('sel-class-up');
        sel.innerHTML = '<option value="">-- Seleziona Classe --</option>';
        for(let c in map) sel.innerHTML += `<option value="${c}">${c} (Lv. ${map[c]})</option>`;
    }

    function updateUI() {
        const m = document.getElementById('level-mode').value;
        document.getElementById('ui-up').style.display = m === 'up' ? 'block' : 'none';
        document.getElementById('ui-multi').style.display = m === 'multi' ? 'block' : 'none';
        previewAbil();
    }

    function previewAbil() {
        const m = document.getElementById('level-mode').value;
        const c = m === 'up' ? document.getElementById('sel-class-up').value : document.getElementById('sel-new-class').value;
        
        if(!c) return document.getElementById('abil-preview').style.display = 'none';

        const nxt = m === 'up' ? (charData.mappaClassi[c] || 0) + 1 : 1;
        const txt = (abilDB[c] && abilDB[c][nxt]) ? abilDB[c][nxt] : "Nuova abilità di Livello " + nxt;
        
        const box = document.getElementById('abil-preview');
        box.innerHTML = `<strong>LIVELLO ${nxt}:</strong> ${txt}`;
        box.style.display = 'block';

        document.getElementById('stat-bonus-ui').style.display = txt.includes("Aumento") ? 'block' : 'none';
    }

    async function salvaTutto() {
        const mode = document.getElementById('level-mode').value;
        const cls = mode === 'up' ? document.getElementById('sel-class-up').value : document.getElementById('sel-new-class').value;
        const boost = document.getElementById('stat-boost').value;

        // Se non è stato scelto di livellare, salviamo solo i campi testo
        let updateData = {
            storia: document.getElementById('edit-storia').value,
            "inventario.arma": document.getElementById('edit-arma').value,
            "inventario.armatura": document.getElementById('edit-armatura').value,
            "inventario.anello": document.getElementById('edit-anello').value,
            "inventario.incantesimi": document.getElementById('edit-incantesimi').value,
            "inventario.zaino": Array.from({length:9}, (_,i) => document.getElementById(`z-${i}`).value)
        };

        // Se una classe è selezionata, applichiamo il level up
        if(cls) {
            let nMap = {...charData.mappaClassi};
            nMap[cls] = (nMap[cls] || 0) + 1;
            let nLvl = (parseInt(charData.livello) || 1) + 1;
            
            updateData.livello = nLvl;
            updateData.classe = nMap;

            if(document.getElementById('stat-bonus-ui').style.display === 'block') {
                if(!boost) return alert("Scegli l'aumento caratteristica!");
                let nStats = {...charData.stats};
                nStats[boost] = (parseInt(nStats[boost]) || 0) + 1;
                updateData.stats = nStats;
            }
        }

        try {
            await db.collection("characters").doc(charId).update(updateData);
            alert("✨ Progressi salvati!");
            window.location.href = "index.html";
        } catch(e) { alert("Errore: " + e.message); }
    }
</script>
</body>
</html>
