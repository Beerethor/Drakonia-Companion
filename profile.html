<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drakonia - Profilo Eroe</title>
    <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@400;700&family=Almendra&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="icon/icon_192x192.png">
    <link rel="apple-touch-icon" href="icon/icon_192x192.png">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        :root { --gold: #b8860b; --parchment: #f4e4bc; --leather: #2c1e11; --blood: #8b0000; --mystic: #4a321f; }
        
        body { 
            background: #1a1a1a url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--leather); font-family: 'Almendra', serif; padding: 20px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }

        .profile-card {
            background: var(--parchment);
            padding: 30px; border: 8px double var(--leather);
            width: 100%; max-width: 450px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        .avatar-container {
            width: 110px; height: 110px; margin: 0 auto 15px;
            border: 3px solid var(--gold); border-radius: 50%;
            overflow: hidden; background: var(--mystic);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; }

        h2 { font-family: 'Grenze Gotisch'; color: var(--blood); font-size: 2.2rem; margin: 5px 0; }
        
        .role-badge { 
            display: inline-block; padding: 3px 12px; background: var(--leather); 
            color: var(--gold); font-family: 'Grenze Gotisch'; border-radius: 15px; font-size: 0.9rem; margin-bottom: 10px;
        }

        .section { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(0,0,0,0.1); }
        
        input { 
            width: 100%; padding: 10px; margin: 8px 0; border: none; 
            border-bottom: 2px solid var(--leather); background: rgba(255,255,255,0.4); 
            font-family: 'Almendra'; box-sizing: border-box; font-size: 1rem;
        }

        .btn {
            background: var(--mystic); color: var(--gold); border: none; width: 100%;
            padding: 12px; font-family: 'Grenze Gotisch'; font-size: 1.2rem; 
            cursor: pointer; margin-top: 10px; transition: 0.3s;
            clip-path: polygon(5% 0, 95% 0, 100% 50%, 95% 100%, 5% 100%, 0 50%);
        }
        .btn:hover { background: var(--blood); color: white; }

        /* Pannelli a comparsa */
        #edit-profile-panel, #security-panel { display: none; background: rgba(0,0,0,0.03); padding: 15px; border-radius: 8px; margin-top: 10px; }
        
        .btn-link { background: none; border: none; color: var(--blood); text-decoration: underline; cursor: pointer; font-size: 0.9rem; margin-top: 10px; display: inline-block; }
        .back-link { display: block; margin-bottom: 15px; color: var(--mystic); text-decoration: none; font-weight: bold; font-size: 0.9rem; text-align: left; }
    </style>
</head>
<body>

    <div class="profile-card">
        <a href="index.html" class="back-link">← Torna al Villaggio</a>

        <div class="avatar-container">
            <img id="user-avatar" src="" alt="Avatar">
        </div>

        <div class="role-badge" id="user-role">...</div>
        <h2 id="user-display-name">...</h2>

        <div class="section">
            <button class="btn-link" onclick="togglePanel('edit-profile-panel')">🎭 Modifica Sembianze</button>
            
            <div id="edit-profile-panel">
                <input type="text" id="edit-username" placeholder="Nuovo Nome Eroe">
                <input type="text" id="edit-avatar" placeholder="URL Nuovo Avatar (Immagine)">
                <button class="btn" onclick="updateProfile()">SALVA MODIFICHE</button>
            </div>
        </div>

        <div class="section" id="master-toggle-section">
            <p id="master-text" style="font-size: 0.85rem; margin: 0;">Vuoi gestire le tue campagne?</p>
            <button class="btn" style="background: var(--leather); border: 1px solid var(--gold); color: var(--gold);" id="master-btn" onclick="toggleMasterRole()">DIVENTA MASTER</button>
        </div>

        <div class="section">
            <button class="btn-link" onclick="togglePanel('security-panel')">🛡️ Gestisci Password</button>
            
            <div id="security-panel">
                <input type="password" id="old-pass" placeholder="Vecchia Password">
                <input type="text" id="sec-word" placeholder="O Parola Segreta">
                <hr style="opacity: 0.1;">
                <input type="password" id="new-pass" placeholder="Nuova Password">
                <button class="btn" onclick="updateSecurity()">AGGIORNA CHIAVI</button>
            </div>
        </div>

        <button class="btn-link" style="color: grey; margin-top: 30px;" onclick="logout()">Abbandona il Regno</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
            authDomain: "drakonia-companion.firebaseapp.com",
            projectId: "drakonia-companion",
            storageBucket: "drakonia-companion.firebasestorage.app",
            messagingSenderId: "803844500713",
            appId: "1:803844500713:web:c902b67f4e395bd20c9478"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const MASTER_KEY = "Drakonia_Ancient_Secret_99"; 

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const snap = await db.collection("users").doc(user.uid).get();
                if (snap.exists) {
                    const data = snap.data();
                    document.getElementById('user-display-name').innerText = data.username.toUpperCase();
                    document.getElementById('edit-username').value = data.username;
                    document.getElementById('user-role').innerText = (data.role || "User").toUpperCase();
                    
                    const mBtn = document.getElementById('master-btn');
                    const mText = document.getElementById('master-text');
                    
                    if (data.role === "Master") {
                        mBtn.innerText = "TORNA VIANDANTE";
                        mText.innerText = "Sei attualmente un Master.";
                    } else if (data.role === "Founder") {
                        document.getElementById('master-toggle-section').style.display = "none";
                    }

                    const avatarUrl = data.avatarURL || `https://api.dicebear.com/7.x/miniavs/svg?seed=${data.username}`;
                    document.getElementById('user-avatar').src = avatarUrl;
                    document.getElementById('edit-avatar').value = data.avatarURL || "";
                }
            } else { window.location.href = 'index.html'; }
        });

        // Funzione generica per mostrare/nascondere pannelli
        function togglePanel(panelId) {
            const panel = document.getElementById(panelId);
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        async function toggleMasterRole() {
            const user = auth.currentUser;
            const snap = await db.collection("users").doc(user.uid).get();
            const currentRole = snap.data().role || "User";
            const newRole = (currentRole === "Master") ? "User" : "Master";
            try {
                await db.collection("users").doc(user.uid).update({ role: newRole });
                location.reload();
            } catch (e) { alert("Errore: " + e.message); }
        }

        async function updateProfile() {
            const user = auth.currentUser;
            const newName = document.getElementById('edit-username').value.trim().toLowerCase();
            const newAvatar = document.getElementById('edit-avatar').value.trim();
            if (!newName) return alert("Nome obbligatorio");
            try {
                await db.collection("users").doc(user.uid).update({ username: newName, avatarURL: newAvatar });
                alert("Sembianze aggiornate!");
                location.reload();
            } catch (e) { alert("Errore: " + e.message); }
        }

        async function updateSecurity() {
            const user = auth.currentUser;
            const oldP = document.getElementById('old-pass').value;
            const secIn = document.getElementById('sec-word').value.trim();
            const newP = document.getElementById('new-pass').value;
            if (!newP || newP.length < 6) return alert("Password troppo corta!");
            try {
                const snap = await db.collection("users").doc(user.uid).get();
                const encryptedInDB = snap.data().secretWord;
                let authorized = false;
                if (oldP) {
                    const cred = firebase.auth.EmailAuthProvider.credential(user.email, oldP);
                    await user.reauthenticateWithCredential(cred);
                    authorized = true;
                } else if (secIn) {
                    const bytes = CryptoJS.AES.decrypt(encryptedInDB, MASTER_KEY);
                    const decryptedSecret = bytes.toString(CryptoJS.enc.Utf8);
                    if (decryptedSecret === secIn) authorized = true;
                }
                if (authorized) {
                    await user.updatePassword(newP);
                    alert("Chiavi aggiornate!");
                    location.reload();
                } else { alert("Verifica fallita. Controlla la vecchia password o la parola segreta."); }
            } catch (e) { alert("Errore: " + e.message); }
        }

        function logout() { auth.signOut().then(() => window.location.href = 'index.html'); }
    </script>
</body>
</html>
