<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo Eroe - Codex Drakonia</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; --parchment: #f4e4bc; --leather: #2c1e11; --glass: rgba(26, 18, 11, 0.95); }
        
        body { 
            background: #120d08 url('https://www.transparenttextures.com/patterns/dark-leather.png'); 
            color: var(--parchment); font-family: 'Almendra', serif; margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Tasto Torna Indietro */
        .btn-back {
            align-self: flex-start;
            background: none;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 5px 15px;
            font-family: 'Grenze Gotisch';
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.3s;
            text-decoration: none;
            font-size: 1rem;
        }
        .btn-back:hover { background: var(--gold); color: var(--leather); }

        .hero-card {
            background: var(--glass); border: 2px solid var(--gold); padding: 25px;
            text-align: center; border-radius: 10px; box-shadow: 0 0 30px black;
            width: 100%; max-width: 400px; box-sizing: border-box;
        }

        .avatar-frame {
            width: 120px; height: 120px; margin: 0 auto; border: 3px solid var(--gold);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background: var(--leather); overflow: hidden;
        }

        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        .hero-name { font-family: 'Grenze Gotisch'; font-size: 2.5rem; color: var(--gold); margin: 10px 0; }
        
        .friends-section {
            width: 100%; max-width: 400px; margin-top: 30px;
            background: rgba(0,0,0,0.4); padding: 20px; border-radius: 10px;
            border: 1px solid var(--gold); box-sizing: border-box;
        }

        .friends-list { list-style: none; padding: 0; margin-top: 15px; }
        .friend-item {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--leather); padding: 10px; margin-bottom: 8px;
            border-left: 3px solid var(--gold); border-radius: 4px;
        }

        .remove-btn { color: #ff4444; cursor: pointer; font-weight: bold; border: none; background: none; }

        .btn-fantasy {
            background: var(--leather); color: var(--gold); border: 1px solid var(--gold);
            padding: 12px; width: 100%; font-family: 'Grenze Gotisch'; cursor: pointer; 
            margin-top: 10px; font-size: 1.2rem; transition: 0.3s;
        }

        #settings-panel {
            display: none; background: var(--parchment); color: var(--leather);
            padding: 20px; border: 5px double var(--leather); margin-top: 15px; width: 100%; max-width: 400px;
        }

        input.edit-field { 
            width: 100%; padding: 10px; margin: 10px 0; border: 1px solid var(--leather); 
            box-sizing: border-box; font-family: 'Almendra';
        }

        h3 { font-family: 'Grenze Gotisch'; color: var(--gold); margin: 0; border-bottom: 1px solid var(--gold); }
    </style>
</head>
<body>

    <a href="login.html" class="btn-back">« Ritorna alla Taverna</a>

    <div class="hero-card">
        <div class="avatar-frame"><img id="display-avatar" src=""></div>
        <h2 id="display-name" class="hero-name">---</h2>
        <p>Codice Eroe: <span id="display-code" style="color:var(--gold); font-weight:bold;"></span></p>
        
        <button class="btn-fantasy" onclick="toggleSettings()">⚙️ GESTISCI PROFILO</button>
    </div>

    <div id="settings-panel">
        <h3>MODIFICA ANNALI</h3>
        <label>Nome Eroe:</label>
        <input type="text" id="edit-name" class="edit-field">
        <label>URL Avatar Magico:</label>
        <input type="text" id="edit-url" class="edit-field" placeholder="Incolla link immagine...">
        <button class="btn-fantasy" onclick="saveProfile()" style="background:var(--leather); color:white; border-color:white;">SALVA MODIFICHE</button>
    </div>

    <div class="friends-section">
        <h3>COMPAGNI DI VIAGGIO</h3>
        <div style="margin-top:15px;">
            <input type="text" id="new-friend-code" class="edit-field" placeholder="Codice Eroe (es: DRK-1234)" style="background:rgba(255,255,255,0.1); color:white; border-color:var(--gold);">
            <button class="btn-fantasy" onclick="addFriend()">AGGIUNGI COMPAGNO</button>
        </div>
        <ul id="friends-list" class="friends-list"></ul>
    </div>

    <button onclick="logout()" style="background:transparent; color:rgba(255,0,0,0.6); border:none; width:100%; margin-top:40px; cursor:pointer; font-family:'Grenze Gotisch'; font-size:1.2rem;">RITIRATI DALL'AVVENTURA</button>

    <script>
        let user = JSON.parse(localStorage.getItem('currentUser'));
        if (!user) window.location.href = 'login.html';
        if (!user.friends) user.friends = [];

        function render() {
            document.getElementById('display-name').innerText = user.username;
            document.getElementById('display-code').innerText = user.friendCode;
            document.getElementById('display-avatar').src = user.avatar || "https://img.icons8.com/color/96/fantasy.png";
            document.getElementById('edit-name').value = user.username;
            document.getElementById('edit-url').value = user.avatar || "";

            const listEl = document.getElementById('friends-list');
            listEl.innerHTML = user.friends.length === 0 ? "<p style='font-style:italic; opacity:0.5;'>Nessun compagno trovato...</p>" : "";
            
            user.friends.forEach((friend, index) => {
                listEl.innerHTML += `
                    <li class="friend-item">
                        <span>🛡️ ${friend}</span>
                        <button class="remove-btn" onclick="removeFriend(${index})">abbandona</button>
                    </li>
                `;
            });
        }

        function toggleSettings() {
            const p = document.getElementById('settings-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        function saveProfile() {
            user.username = document.getElementById('edit-name').value;
            user.avatar = document.getElementById('edit-url').value;
            localStorage.setItem('currentUser', JSON.stringify(user));
            alert("Annali aggiornati!");
            toggleSettings();
            render();
        }

        function addFriend() {
            const codeInput = document.getElementById('new-friend-code');
            const code = codeInput.value.trim().toUpperCase();
            if (code && !user.friends.includes(code) && code !== user.friendCode) {
                user.friends.push(code);
                localStorage.setItem('currentUser', JSON.stringify(user));
                codeInput.value = "";
                render();
            }
        }

        function removeFriend(index) {
            user.friends.splice(index, 1);
            localStorage.setItem('currentUser', JSON.stringify(user));
            render();
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }

        render();
    </script>
</body>
</html>
