<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo Eroe - Codex Drakonia</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --parchment: #f4e4bc;
            --leather: #2c1e11;
            --gold: #b8860b;
            --blood: #8b0000;
            --glass: rgba(26, 18, 11, 0.98);
        }

        body {
            background: #120d08 url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--parchment);
            font-family: 'Almendra', serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 550px; padding: 20px; }

        /* --- SCHEDA EROE STYLE UPGRADE --- */
        .hero-card {
            background: var(--glass);
            border: 2px solid var(--gold);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            position: relative;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
        }

        .hero-card::before {
            content: ""; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid rgba(184, 134, 11, 0.3); pointer-events: none;
        }

        .avatar-frame {
            position: relative; display: inline-block; padding: 10px;
            background: url('https://www.transparenttextures.com/patterns/black-linen.png');
            border: 2px solid var(--gold); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        .profile-avatar-large {
            width: 140px; height: 160px; object-fit: cover;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        .hero-name {
            font-family: 'Grenze Gotisch', cursive; font-size: 3.5rem;
            color: var(--gold); margin: 15px 0 5px 0; text-shadow: 3px 3px 5px black;
        }

        /* --- BOTTONI FANTASY --- */
        .btn-fantasy {
            background: #4a321f; color: var(--gold); border: 1px solid var(--gold);
            padding: 12px; cursor: pointer; font-family: 'Grenze Gotisch'; font-size: 1.2rem;
            width: 100%; transition: 0.3s; text-transform: uppercase;
        }

        .btn-fantasy:hover { background: var(--gold); color: var(--leather); }

        /* --- PANNELLO MODIFICA --- */
        #settings-panel {
            display: none; background: var(--parchment); color: var(--leather);
            padding: 25px; border-radius: 5px; margin-top: 20px;
            border: 8px double var(--leather); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 15px; }
        .input-group label { font-family: 'Grenze Gotisch'; font-size: 1.2rem; display: block; }
        
        .input-field {
            width: 100%; padding: 10px; border: 1px solid var(--leather);
            background: rgba(255,255,255,0.5); font-family: 'Almendra'; box-sizing: border-box;
        }

        /* --- SEZIONE ALLEATI --- */
        .allies-section { margin-top: 30px; border-top: 2px solid var(--gold); padding-top: 20px; }
        
        .ally-item {
            display: flex; align-items: center; background: rgba(0,0,0,0.4);
            padding: 10px; margin-bottom: 10px; border-left: 4px solid var(--gold);
        }

        .ally-avatar { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--gold); margin-right: 15px; }

        .back-link { color: var(--gold); text-decoration: none; font-family: 'MedievalSharp'; }
    </style>
</head>
<body>

<div class="container">
    <header style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <a href="index.html" class="back-link">← TAVERNA</a>
        <span id="sync-status" style="font-size: 0.8rem; color: var(--gold);">Sincronizzato Cloud</span>
    </header>

    <main>
        <section class="hero-card">
            <div class="avatar-frame">
                <img id="display-avatar" src="https://img.icons8.com/color/96/fantasy.png" class="profile-avatar-large">
            </div>
            <h2 id="display-name" class="hero-name">VIANDANTE</h2>
            <div style="margin-bottom: 20px;">
                <span class="friend-code-badge">CODICE: <span id="my-friend-code">---</span></span>
            </div>
            
            <button class="btn-fantasy" onclick="toggleSettings()">📜 Riconsacra Identità</button>
        </section>

        <div id="settings-panel">
            <div class="input-group">
                <label>Nuovo Nome Eroe</label>
                <input type="text" id="edit-name" class="input-field" placeholder="Es. Gwydion">
            </div>

            <div class="input-group">
                <label>Immagine (URL Magico)</label>
                <input type="text" id="edit-photo-url" class="input-field" placeholder="https://...">
            </div>

            <div style="border: 1px dashed var(--leather); padding: 10px; text-align: center;">
                <label for="file-upload" style="cursor:pointer; font-weight:bold;">📁 CARICA RITRATTO DISPOSITIVO</label>
                <input type="file" id="file-upload" accept="image/*" style="display:none;">
                <small id="file-name" style="display:block; margin-top:5px;"></small>
            </div>

            <button onclick="updateProfile()" class="btn-fantasy" style="margin-top:20px; background: var(--leather); color: white;">SALVA NEGLI ANNALI</button>
        </div>

        <section class="allies-section">
            <h3 style="font-family:'Grenze Gotisch'; color:var(--gold); letter-spacing: 2px;">ADUNATA ALLEATI</h3>
            <div style="display:flex; gap:10px;">
                <input type="text" id="search-friend-code" class="input-field" style="flex-grow:1; background: var(--parchment);" placeholder="Codice DRK-XXXX">
                <button onclick="addFriend()" class="btn-fantasy" style="width:auto; padding: 0 20px;">RECLUTA</button>
            </div>

            <div id="friends-list" style="margin-top:20px;"></div>
        </section>

        <button onclick="logout()" class="btn-fantasy" style="border:none; color: var(--blood); margin-top:40px; background:transparent; font-size: 1rem;">Abbandona Drakonia</button>
    </main>
</div>

<script>
    // --- CONFIGURAZIONE FIREBASE (SOSTITUISCI CON I TUOI DATI) ---
    const firebaseConfig = {
        apiKey: "LA_TUA_API_KEY",
        authDomain: "IL_TUO_PROGETTO.firebaseapp.com",
        projectId: "IL_TUO_PROGETTO",
        storageBucket: "IL_TUO_PROGETTO.appspot.com",
        messagingSenderId: "ID_SENDER",
        appId: "APP_ID"
    };

    // Inizializza Firebase solo se config è valida
    if (firebaseConfig.apiKey !== "LA_TUA_API_KEY") {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore ? firebase.firestore() : null;

    let currentUser = JSON.parse(localStorage.getItem('currentUser'));

    function init() {
        if (!currentUser) {
            window.location.href = 'login.html';
            return;
        }
        renderDisplay();
        renderFriends();
    }

    function renderDisplay() {
        document.getElementById('display-name').innerText = currentUser.username;
        document.getElementById('display-avatar').src = currentUser.avatar || "https://img.icons8.com/color/96/fantasy.png";
        document.getElementById('my-friend-code').innerText = currentUser.friendCode;
        document.getElementById('edit-name').value = currentUser.username;
    }

    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }

    document.getElementById('file-upload').onchange = function() {
        if(this.files[0]) document.getElementById('file-name').innerText = "Ritratto: " + this.files[0].name;
    };

    // --- LOGICA DI SALVATAGGIO (SERVER + LOCALE) ---
    async function updateProfile() {
        const btn = document.querySelector('#settings-panel .btn-fantasy');
        btn.innerText = "SINCRO IN CORSO...";
        
        const newName = document.getElementById('edit-name').value;
        const photoUrl = document.getElementById('edit-photo-url').value;
        const fileInput = document.getElementById('file-upload');

        if(newName) currentUser.username = newName;

        if (fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = async function(e) {
                currentUser.avatar = e.target.result; 
                await commitChanges();
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            if(photoUrl) currentUser.avatar = photoUrl;
            await commitChanges();
        }
    }

    async function commitChanges() {
        try {
            // 1. Salvataggio Locale (immediato)
            localStorage.setItem('currentUser', JSON.stringify(currentUser));

            // 2. Tenta Salvataggio Server (Firebase)
            if (db) {
                await db.collection("users").doc(currentUser.uid).update({
                    username: currentUser.username,
                    avatar: currentUser.avatar
                });
                document.getElementById('sync-status').innerText = "Sincronizzato Cloud";
            } else {
                console.warn("Server non configurato. Salvataggio solo locale.");
                document.getElementById('sync-status').innerText = "Solo Locale";
            }

            alert("Cronache aggiornate!");
            location.reload();
        } catch (error) {
            console.error(error);
            alert("Errore di sincronizzazione. Modifiche salvate solo localmente.");
        }
    }

    // --- LOGICA AMICI ---
    async function addFriend() {
        const code = document.getElementById('search-friend-code').value.trim().toUpperCase();
        if(!code || code === currentUser.friendCode) return;

        // Se Firebase è attivo, cerchiamo sul server
        if(db) {
            const snapshot = await db.collection("users").where("friendCode", "==", code).get();
            if(snapshot.empty) {
                alert("Eroe non trovato nel regno.");
                return;
            }
            // Aggiungi logica di salvataggio alleato...
        }
        alert("Funzione reclutamento in fase di benedizione magica.");
    }

    function logout() {
        localStorage.removeItem('currentUser');
        window.location.href = 'login.html';
    }

    init();
</script>

</body>
</html>
