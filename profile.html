<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo Eroe - Codex Drakonia</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; --parchment: #f4e4bc; --leather: #2c1e11; --glass: rgba(26, 18, 11, 0.95); }
        body { 
            background: #120d08 url('https://www.transparenttextures.com/patterns/dark-leather.png'); 
            color: var(--parchment); font-family: 'Almendra', serif; margin: 0; padding: 15px;
        }
        .hero-card {
            background: var(--glass); border: 2px solid var(--gold); padding: 25px;
            text-align: center; border-radius: 10px; box-shadow: 0 0 30px black;
        }
        .avatar-frame {
            width: 120px; height: 120px; margin: 0 auto; border: 3px solid var(--gold);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background: var(--leather); overflow: hidden;
        }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        .hero-name { font-family: 'Grenze Gotisch'; font-size: 2.5rem; color: var(--gold); margin: 10px 0; }
        
        /* Tabelle Bottini */
        .db-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        .db-table th { background: var(--gold); color: var(--leather); font-family: 'Grenze Gotisch'; padding: 8px; }
        .db-table td { border: 1px solid rgba(184, 134, 11, 0.3); padding: 8px; text-align: center; }

        .btn-fantasy {
            background: var(--leather); color: var(--gold); border: 1px solid var(--gold);
            padding: 10px; width: 100%; font-family: 'Grenze Gotisch'; cursor: pointer; margin-top: 10px;
        }

        #settings-panel {
            display: none; background: var(--parchment); color: var(--leather);
            padding: 20px; border: 5px double var(--leather); margin-top: 15px;
        }
        input.edit-field { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid var(--leather); }
    </style>
</head>
<body>

    <div class="hero-card">
        <div class="avatar-frame"><img id="display-avatar" src=""></div>
        <h2 id="display-name" class="hero-name">---</h2>
        <small id="display-code" style="color:var(--gold); font-weight:bold;"></small>
        
        <button class="btn-fantasy" onclick="toggleSettings()">⚙️ MODIFICA PROFILO</button>
    </div>

    <div id="settings-panel">
        <label>Nome Eroe:</label>
        <input type="text" id="edit-name" class="edit-field">
        <label>URL Immagine:</label>
        <input type="text" id="edit-url" class="edit-field">
        <button class="btn-fantasy" onclick="saveProfile()" style="background:var(--leather); color:white;">SALVA MODIFICHE</button>
    </div>

    <div style="margin-top:30px;">
        <h3 style="font-family:'Grenze Gotisch'; color:var(--gold); border-bottom:1px solid var(--gold);">TABELLA BOTTINI (PAG. 102)</h3>
        <table class="db-table">
            <tr><th>LUOGO</th><th>LV 1</th><th>LV 2</th><th>LV 3</th></tr>
            <tr><td>Area</td><td>10 PO</td><td>20 PO</td><td>30 PO</td></tr>
            <tr><td>Forziere</td><td>50 PO</td><td>100 PO</td><td>150 PO</td></tr>
        </table>
    </div>

    <button onclick="logout()" style="background:transparent; color:red; border:none; width:100%; margin-top:30px; cursor:pointer;">ESCI DA DRAKONIA</button>

    <script>
        let user = JSON.parse(localStorage.getItem('currentUser'));
        if (!user) window.location.href = 'login.html';

        function render() {
            document.getElementById('display-name').innerText = user.username;
            document.getElementById('display-code').innerText = user.friendCode;
            document.getElementById('display-avatar').src = user.avatar || "https://img.icons8.com/color/96/fantasy.png";
            document.getElementById('edit-name').value = user.username;
        }

        function toggleSettings() {
            const p = document.getElementById('settings-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        function saveProfile() {
            user.username = document.getElementById('edit-name').value;
            const newUrl = document.getElementById('edit-url').value;
            if (newUrl) user.avatar = newUrl;
            
            localStorage.setItem('currentUser', JSON.stringify(user));
            alert("Annali aggiornati!");
            location.reload();
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }

        render();
    </script>
</body>
</html>
