<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drakonia - Profilo Eroe</title>
    <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@400;700&family=Almendra&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        :root { --gold: #b8860b; --parchment: #f4e4bc; --leather: #2c1e11; --blood: #8b0000; }
        body { 
            background: #1a1a1a url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--parchment); font-family: 'Almendra', serif; padding: 20px;
        }
        .profile-card {
            background: var(--parchment); color: var(--leather);
            padding: 30px; border: 6px double var(--leather);
            max-width: 500px; margin: 40px auto; box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }
        h2, h3 { font-family: 'Grenze Gotisch'; color: var(--gold); text-align: center; }
        .section { border-top: 1px solid rgba(44, 30, 17, 0.2); margin-top: 20px; padding-top: 20px; }
        input { 
            width: 100%; padding: 10px; margin: 8px 0; border: none; 
            border-bottom: 2px solid var(--leather); background: rgba(0,0,0,0.05); 
            font-family: 'Almendra'; box-sizing: border-box;
        }
        .btn {
            background: var(--leather); color: var(--gold); border: none; width: 100%;
            padding: 12px; font-family: 'Grenze Gotisch'; font-size: 1.2rem; 
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        .btn:hover { background: var(--blood); color: white; }
        .btn-logout { background: transparent; color: var(--blood); border: 1px solid var(--blood); font-size: 0.9rem; padding: 5px; margin-top: 30px;}
    </style>
</head>
<body>

    <div class="profile-card">
        <h2>Profilo di <span id="user-display-name">...</span></h2>
        <p style="text-align:center;">Rango: <span id="user-role" style="font-weight:bold; color:var(--blood);">...</span></p>

        <div class="section">
            <h3>🛡️ Sicurezza Account</h3>
            <p style="font-size: 0.85rem; margin-bottom: 10px;">Per cambiare la Parola d'Ordine, inserisci quella vecchia oppure la tua Parola Segreta.</p>
            
            <input type="password" id="old-pass" placeholder="Vecchia Parola d'Ordine">
            <input type="text" id="sec-word" placeholder="Oppure Parola Segreta">
            <hr style="opacity: 0.2;">
            <input type="password" id="new-pass" placeholder="NUOVA Parola d'Ordine">
            
            <button class="btn" onclick="updateSecurity()">AGGIORNA CHIAVI</button>
        </div>

        <button class="btn btn-logout" onclick="firebase.auth().signOut().then(() => window.location.href='index.html')">Esci dal Regno</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
            authDomain: "drakonia-companion.firebaseapp.com",
            projectId: "drakonia-companion",
            storageBucket: "drakonia-companion.firebasestorage.app",
            messagingSenderId: "803844500713",
            appId: "1:803844500713:web:c902b67f4e395bd20c9478"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const MASTER_KEY = "Drakonia_Ancient_Secret_99"; 

        // Caricamento Dati Profilo
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const snap = await db.collection("users").doc(user.uid).get();
                if (snap.exists) {
                    const data = snap.data();
                    document.getElementById('user-display-name').innerText = data.username.toUpperCase();
                    document.getElementById('user-role').innerText = data.role || "Viandante";
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        async function updateSecurity() {
            const user = auth.currentUser;
            const oldP = document.getElementById('old-pass').value;
            const secIn = document.getElementById('sec-word').value.trim();
            const newP = document.getElementById('new-pass').value;

            if (!newP || newP.length < 6) return alert("La nuova password deve essere di almeno 6 caratteri!");

            try {
                const snap = await db.collection("users").doc(user.uid).get();
                const encryptedInDB = snap.data().secretWord;
                let authorized = false;

                // Opzione 1: Vecchia Password (Re-authentication ufficiale)
                if (oldP) {
                    const cred = firebase.auth.EmailAuthProvider.credential(user.email, oldP);
                    await user.reauthenticateWithCredential(cred);
                    authorized = true;
                } 
                // Opzione 2: Parola Segreta (Verifica locale decriptata)
                else if (secIn) {
                    const bytes = CryptoJS.AES.decrypt(encryptedInDB, MASTER_KEY);
                    const decryptedSecret = bytes.toString(CryptoJS.enc.Utf8);
                    
                    if (decryptedSecret === secIn) {
                        authorized = true;
                    } else {
                        return alert("La Parola Segreta non corrisponde ai nostri archivi.");
                    }
                } else {
                    return alert("Inserisci la vecchia password o la parola segreta!");
                }

                if (authorized) {
                    await user.updatePassword(newP);
                    alert("Sia lode! La tua Parola d'Ordine è stata cambiata.");
                    // Pulizia campi
                    document.getElementById('old-pass').value = "";
                    document.getElementById('sec-word').value = "";
                    document.getElementById('new-pass').value = "";
                }

            } catch (e) {
                alert("Errore del Portale: " + e.message);
                console.error(e);
            }
        }
    </script>
</body>
</html>
