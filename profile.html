<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo Eroe - Codex Drakonia</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root {
            --parchment: #f4e4bc;
            --leather: #2c1e11;
            --gold: #b8860b;
            --blood: #8b0000;
            --glass: rgba(44, 30, 17, 0.95);
        }

        body {
            background: #120d08 url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--parchment);
            font-family: 'Almendra', serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 550px;
            padding: 20px;
        }

        /* --- SCHEDA EROE --- */
        .hero-card {
            background: var(--glass);
            border: 3px solid var(--gold);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            position: relative;
        }

        .avatar-frame {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }

        .profile-avatar-large {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 5px solid var(--gold);
            object-fit: cover;
            background: var(--leather);
            box-shadow: 0 0 20px var(--gold);
        }

        .hero-name {
            font-family: 'Grenze Gotisch', cursive;
            font-size: 3rem;
            color: var(--gold);
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .friend-code-badge {
            background: var(--gold);
            color: var(--leather);
            padding: 6px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-family: 'MedievalSharp', cursive;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* --- BOTTONI --- */
        .btn-fantasy {
            background: linear-gradient(#4a321f, #1a120b);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 12px 25px;
            cursor: pointer;
            font-family: 'Grenze Gotisch', cursive;
            font-size: 1.2rem;
            width: 100%;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .btn-fantasy:hover {
            filter: brightness(1.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(184, 134, 11, 0.4);
        }

        /* --- PANNELLO IMPOSTAZIONI --- */
        #settings-panel {
            display: none;
            background: var(--parchment);
            color: var(--leather);
            padding: 25px;
            border-radius: 10px;
            margin-top: 20px;
            border: 6px double var(--leather);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { font-weight: bold; display: block; margin-bottom: 5px; }
        
        .input-field {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--leather);
            background: rgba(0,0,0,0.05);
            font-family: 'Almendra';
            box-sizing: border-box;
            border-radius: 4px;
        }

        /* --- SEZIONE ALLEATI --- */
        .allies-section {
            margin-top: 40px;
            border-top: 2px solid var(--gold);
            padding-top: 20px;
        }

        .ally-item {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid rgba(184, 134, 11, 0.2);
        }

        .ally-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); margin-right: 15px; }

        .back-link { color: var(--gold); text-decoration: none; display: block; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← Ritorna alla Taverna</a>

    <main>
        <section class="hero-card">
            <div class="avatar-frame">
                <img id="display-avatar" src="https://img.icons8.com/color/96/fantasy.png" class="profile-avatar-large">
            </div>
            <h2 id="display-name" class="hero-name">CARICAMENTO...</h2>
            <div class="friend-code-badge">CODICE: <span id="my-friend-code">---</span></div>
            
            <button class="btn-fantasy" onclick="toggleSettings()">⚙️ MODIFICA IDENTITÀ</button>
        </section>

        <div id="settings-panel">
            <h3 style="margin-top:0; font-family:'Grenze Gotisch'; font-size:1.8rem; border-bottom:2px solid var(--leather);">MODIFICA PROFILO</h3>
            
            <div class="input-group">
                <label>Nome dell'Eroe</label>
                <input type="text" id="edit-name" class="input-field">
            </div>

            <div class="input-group">
                <label>Immagine (URL)</label>
                <input type="text" id="edit-photo-url" class="input-field" placeholder="https://link-immagine.jpg">
            </div>

            <p style="text-align:center; margin:10px 0;">— oppure —</p>

            <label for="file-upload" style="display:block; text-align:center; padding:15px; border:2px dashed var(--leather); cursor:pointer; font-weight:bold;">
                📁 CARICA DAL DISPOSITIVO
            </label>
            <input type="file" id="file-upload" accept="image/*" style="display:none;">
            <small id="file-name" style="display:block; text-align:center; margin-top:5px; color:var(--blood);"></small>

            <button onclick="updateProfile()" class="btn-fantasy" style="background:var(--leather); color:white; margin-top:20px;">SALVA NEL DATABASE</button>
        </div>

        <section class="allies-section">
            <h3 style="font-family:'Grenze Gotisch'; color:var(--gold);">🤝 CERCA ALLEATI</h3>
            <div style="display:flex; gap:10px;">
                <input type="text" id="search-friend-code" class="input-field" style="margin:0;" placeholder="Codice DRK-XXXX">
                <button onclick="addFriend()" class="btn-fantasy" style="margin:0; width:auto;">AGGIUNGI</button>
            </div>

            <h4 style="margin-top:25px; border-bottom:1px solid var(--gold);">I TUOI COMPAGNI</h4>
            <div id="friends-list"></div>
        </section>

        <button onclick="logout()" class="btn-fantasy" style="border-color:var(--blood); color:var(--blood); margin-top:40px; background:transparent;">LOGOUT</button>
    </main>
</div>

<script>
    // --- LOGICA DI SISTEMA ---

    // Recupero dati dai database locali
    let currentUser = JSON.parse(localStorage.getItem('currentUser'));
    let allUsers = JSON.parse(localStorage.getItem('users')) || [];

    function init() {
        if (!currentUser) {
            alert("Devi effettuare il login per accedere al profilo!");
            window.location.href = 'login.html';
            return;
        }
        renderDisplay();
        renderFriends();
    }

    // Aggiorna la vista
    function renderDisplay() {
        document.getElementById('display-name').innerText = currentUser.username;
        document.getElementById('display-avatar').src = currentUser.avatar || "https://img.icons8.com/color/96/fantasy.png";
        document.getElementById('my-friend-code').innerText = currentUser.friendCode || "DRK-0000";
        document.getElementById('edit-name').value = currentUser.username;
    }

    // Toggle Pannello
    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }

    // Feedback file
    document.getElementById('file-upload').onchange = function() {
        if(this.files[0]) document.getElementById('file-name').innerText = "File pronto: " + this.files[0].name;
    };

    // --- SALVATAGGIO NEL DATABASE ---
    window.updateProfile = function() {
        const newName = document.getElementById('edit-name').value;
        const photoUrl = document.getElementById('edit-photo-url').value;
        const fileInput = document.getElementById('file-upload');

        if(newName) currentUser.username = newName;

        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                currentUser.avatar = e.target.result; // Converte immagine in testo per database
                commitToDatabase();
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            if(photoUrl) currentUser.avatar = photoUrl;
            commitToDatabase();
        }
    }

    function commitToDatabase() {
        try {
            // 1. Salva Sessione Corrente
            localStorage.setItem('currentUser', JSON.stringify(currentUser));

            // 2. Sincronizza nel Database Globale (allUsers)
            const index = allUsers.findIndex(u => u.friendCode === currentUser.friendCode);
            if (index !== -1) {
                allUsers[index] = currentUser;
            } else {
                allUsers.push(currentUser);
            }
            localStorage.setItem('users', JSON.stringify(allUsers));

            alert("Dati salvati negli annali di Drakonia!");
            location.reload();
        } catch (e) {
            alert("Errore: Memoria piena. Usa un URL per l'immagine invece di un file pesante.");
        }
    }

    // --- LOGICA AMICI ---
    window.addFriend = function() {
        const code = document.getElementById('search-friend-code').value.trim().toUpperCase();
        const friendObj = allUsers.find(u => u.friendCode === code);

        if (!friendObj) {
            alert("Codice errato: nessun eroe trovato.");
            return;
        }
        if (code === currentUser.friendCode) {
            alert("Non puoi aggiungere te stesso!");
            return;
        }

        if (!currentUser.friends) currentUser.friends = [];
        if (currentUser.friends.includes(code)) {
            alert("Questo alleato è già nella tua lista.");
            return;
        }

        currentUser.friends.push(code);
        commitToDatabase();
    }

    function renderFriends() {
        const container = document.getElementById('friends-list');
        if (!currentUser.friends || currentUser.friends.length === 0) {
            container.innerHTML = "<p style='opacity:0.5'>Nessun alleato reclutato.</p>";
            return;
        }

        container.innerHTML = "";
        currentUser.friends.forEach(fCode => {
            const fData = allUsers.find(u => u.friendCode === fCode) || { username: "Eroe Sconosciuto", avatar: "" };
            container.innerHTML += `
                <div class="ally-item">
                    <img src="${fData.avatar || 'https://via.placeholder.com/40'}" class="ally-avatar">
                    <div>
                        <strong>${fData.username}</strong><br>
                        <small style="color:var(--gold)">${fCode}</small>
                    </div>
                </div>`;
        });
    }

    window.logout = function() {
        localStorage.removeItem('currentUser');
        window.location.href = 'login.html';
    }

    // Start
    init();
</script>

</body>
</html>
