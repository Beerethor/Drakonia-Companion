<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo Eroe - Codex Drakonia</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #b8860b; --parchment: #f4e4bc; --leather: #2c1e11; --glass: rgba(26, 18, 11, 0.95); --blood: #8b0000; }
        body { 
            background: #120d08 url('https://www.transparenttextures.com/patterns/dark-leather.png'); 
            color: var(--parchment); font-family: 'Almendra', serif; margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }
        .btn-back {
            align-self: flex-start; background: none; border: 1px solid var(--gold);
            color: var(--gold); padding: 5px 15px; font-family: 'Grenze Gotisch';
            cursor: pointer; margin-bottom: 15px; text-decoration: none; font-size: 1rem;
        }
        .hero-card {
            background: var(--glass); border: 2px solid var(--gold); padding: 25px;
            text-align: center; border-radius: 10px; box-shadow: 0 0 30px black;
            width: 100%; max-width: 400px; box-sizing: border-box;
        }
        .avatar-frame {
            width: 120px; height: 120px; margin: 0 auto; border: 3px solid var(--gold);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background: var(--leather); overflow: hidden;
        }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        .hero-name { font-family: 'Grenze Gotisch'; font-size: 2.5rem; color: var(--gold); margin: 10px 0 5px 0; }
        
        /* Grado Label */
        .rank-label {
            display: inline-block; background: var(--gold); color: var(--leather);
            padding: 2px 15px; font-family: 'Grenze Gotisch'; font-weight: bold;
            border-radius: 5px; margin-bottom: 15px; letter-spacing: 1px;
        }

        .friends-section {
            width: 100%; max-width: 400px; margin-top: 30px;
            background: rgba(0,0,0,0.4); padding: 20px; border-radius: 10px;
            border: 1px solid var(--gold); box-sizing: border-box;
        }
        .btn-fantasy {
            background: var(--leather); color: var(--gold); border: 1px solid var(--gold);
            padding: 12px; width: 100%; font-family: 'Grenze Gotisch'; cursor: pointer; 
            margin-top: 10px; font-size: 1.2rem; transition: 0.3s;
        }
        .btn-fantasy:hover { background: var(--gold); color: var(--leather); }
        
        /* Tasto Diventa Master */
        .btn-master { background: var(--blood); color: white; border: 1px solid white; margin-top: 15px; }

        #settings-panel {
            display: none; background: var(--parchment); color: var(--leather);
            padding: 20px; border: 5px double var(--leather); margin-top: 15px; width: 100%; max-width: 400px;
        }
        input.edit-field { 
            width: 100%; padding: 10px; margin: 10px 0; border: 1px solid var(--leather); 
            box-sizing: border-box; font-family: 'Almendra';
        }
        .friend-item { 
            display: flex; justify-content: space-between; padding: 10px; 
            background: var(--leather); margin-bottom: 5px; border-radius: 4px;
            border-left: 2px solid var(--gold);
        }
        .remove-btn { color: #ff4444; cursor: pointer; background: none; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <a href="index.html" class="btn-back">« Torna all'Index</a>

    <div class="hero-card">
        <div class="avatar-frame"><img id="display-avatar" src="https://img.icons8.com/color/96/fantasy.png"></div>
        <h2 id="display-name" class="hero-name">In attesa...</h2>
        <div id="display-rank" class="rank-label">CARICAMENTO...</div>
        <p>Codice Eroe: <span id="display-code" style="color:var(--gold); font-weight:bold;"></span></p>
        
        <button class="btn-fantasy" onclick="toggleSettings()">⚙️ GESTISCI PROFILO</button>
        
        <button id="master-promotion-btn" class="btn-fantasy btn-master" style="display: none;" onclick="becomeMaster()">📜 DIVENTA MASTER</button>
    </div>

    <div id="settings-panel">
        <h3>MODIFICA ANNALI</h3>
        <input type="text" id="edit-name" class="edit-field" placeholder="Nome Eroe">
        <input type="text" id="edit-url" class="edit-field" placeholder="URL Immagine Avatar">
        <button class="btn-fantasy" onclick="saveProfile()" style="background:var(--leather); color:white;">SALVA IN FIRESTORE</button>
    </div>

    <div class="friends-section">
        <h3>LISTA AMICI</h3>
        <input type="text" id="new-friend-code" class="edit-field" placeholder="Codice Amico (DRK-XXXX)" style="background:rgba(255,255,255,0.1); color:white;">
        <button class="btn-fantasy" onclick="addFriend()">AGGIUNGI COMPAGNO</button>
        <div id="friends-list" style="margin-top:15px;"></div>
    </div>

    <button onclick="logout()" style="color:rgba(255,0,0,0.6); background:none; border:none; margin-top:40px; cursor:pointer; font-family:'Grenze Gotisch';">RITIRATI DALL'AVVENTURA</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
            authDomain: "drakonia-companion.firebaseapp.com",
            projectId: "drakonia-companion",
            storageBucket: "drakonia-companion.firebasestorage.app",
            messagingSenderId: "803844500713",
            appId: "1:803844500713:web:c902b67f4e395bd20c9478"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUserData = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                db.collection("users").doc(user.uid).onSnapshot((doc) => {
                    if (doc.exists) {
                        currentUserData = doc.data();
                    } else {
                        currentUserData = {
                            username: user.displayName || "Nuovo Eroe",
                            avatar: user.photoURL || "",
                            role: "Giocatore", // Ruolo predefinito
                            friendCode: "DRK-" + user.uid.substring(0,5).toUpperCase(),
                            friends: []
                        };
                        db.collection("users").doc(user.uid).set(currentUserData);
                    }
                    render();
                });
            } else {
                window.location.href = 'login.html';
            }
        });

        function render() {
            if(!currentUserData) return;
            document.getElementById('display-name').innerText = currentUserData.username;
            document.getElementById('display-code').innerText = currentUserData.friendCode;
            document.getElementById('display-rank').innerText = currentUserData.role.toUpperCase();
            document.getElementById('display-avatar').src = currentUserData.avatar || "https://img.icons8.com/color/96/fantasy.png";
            
            // Logica tasto Master
            const masterBtn = document.getElementById('master-promotion-btn');
            if(currentUserData.role === "Giocatore") {
                masterBtn.style.display = "block";
            } else {
                masterBtn.style.display = "none";
            }

            document.getElementById('edit-name').value = currentUserData.username;
            document.getElementById('edit-url').value = currentUserData.avatar;
            
            const list = document.getElementById('friends-list');
            list.innerHTML = "";
            if(currentUserData.friends && currentUserData.friends.length > 0) {
                currentUserData.friends.forEach((f, i) => {
                    list.innerHTML += `
                        <div class="friend-item">
                            <span>🛡️ ${f}</span>
                            <button class="remove-btn" onclick="removeFriend(${i})">X</button>
                        </div>`;
                });
            } else {
                list.innerHTML = "<p style='font-style:italic; opacity:0.5;'>Nessun compagno...</p>";
            }
        }

        async function becomeMaster() {
            if(confirm("Vuoi davvero abbandonare la vita da semplice avventuriero per guidare il destino di Drakonia come Master?")) {
                try {
                    await db.collection("users").doc(auth.currentUser.uid).update({
                        role: "Master"
                    });
                    alert("Congratulazioni, Master. Il potere della narrazione è ora nelle tue mani.");
                } catch(e) { alert("Errore: " + e.message); }
            }
        }

        async function saveProfile() {
            const user = auth.currentUser;
            const newName = document.getElementById('edit-name').value;
            const newUrl = document.getElementById('edit-url').value;

            if(user) {
                try {
                    await db.collection("users").doc(user.uid).update({
                        username: newName,
                        avatar: newUrl
                    });
                    alert("Annali di Firestore aggiornati!");
                    toggleSettings();
                } catch(e) { alert("Errore: " + e.message); }
            }
        }

        async function addFriend() {
            const code = document.getElementById('new-friend-code').value.trim().toUpperCase();
            if(code && auth.currentUser) {
                const friends = currentUserData.friends || [];
                if(!friends.includes(code) && code !== currentUserData.friendCode) {
                    friends.push(code);
                    await db.collection("users").doc(auth.currentUser.uid).update({ friends: friends });
                    document.getElementById('new-friend-code').value = "";
                }
            }
        }

        async function removeFriend(index) {
            if(confirm("Rimuovere questo compagno?")) {
                const friends = [...currentUserData.friends];
                friends.splice(index, 1);
                await db.collection("users").doc(auth.currentUser.uid).update({ friends: friends });
            }
        }

        function toggleSettings() {
            const p = document.getElementById('settings-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        function logout() {
            auth.signOut().then(() => window.location.href = 'login.html');
        }
    </script>
</body>
</html>
