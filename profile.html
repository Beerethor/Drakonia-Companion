<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo Eroe - Drakonia</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root {
            --parchment: #f4e4bc;
            --leather: #2c1e11;
            --gold: #b8860b;
            --blood: #8b0000;
            --glass: rgba(44, 30, 17, 0.9);
        }

        body {
            background: #120d08 url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--parchment);
            font-family: 'Almendra', serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        /* --- SCHEDA EROE (Visualizzazione) --- */
        .hero-card {
            background: var(--glass);
            border: 3px solid var(--gold);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            position: relative;
            overflow: hidden;
        }

        .hero-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }

        .profile-avatar-large {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--gold);
            object-fit: cover;
            background: var(--leather);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .hero-name {
            font-family: 'Grenze Gotisch', cursive;
            font-size: 2.5rem;
            color: var(--gold);
            margin: 10px 0;
            text-shadow: 2px 2px 4px #000;
        }

        .friend-code-badge {
            display: inline-block;
            background: var(--gold);
            color: var(--leather);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-family: 'MedievalSharp', cursive;
            letter-spacing: 1px;
        }

        /* --- BOTTONI FANTASY --- */
        .btn-action {
            background: linear-gradient(#4a321f, #2c1e11);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 12px 20px;
            cursor: pointer;
            font-family: 'Grenze Gotisch', cursive;
            font-size: 1.1rem;
            transition: 0.3s;
            width: 100%;
            margin-top: 15px;
        }

        .btn-action:hover {
            background: var(--gold);
            color: var(--leather);
        }

        /* --- MODALE / PANNELLO MODIFICA --- */
        #settings-panel {
            display: none;
            background: var(--parchment);
            color: var(--leather);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            border: 5px double var(--leather);
        }

        .input-field {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid var(--leather);
            background: rgba(0,0,0,0.05);
            font-family: 'Almendra';
            box-sizing: border-box;
        }

        /* --- SEZIONE ALLEATI --- */
        .allies-section {
            margin-top: 30px;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
        }

        .ally-item {
            display: flex;
            align-items: center;
            background: var(--leather);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--gold);
        }

        .ally-avatar { width: 40px; height: 40px; border-radius: 50%; margin-right: 15px; }

        .nav-back { text-decoration: none; color: var(--gold); font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="nav-back">← Torna alla Taverna</a>

    <main>
        <section class="hero-card">
            <div class="avatar-container">
                <img id="display-avatar" src="https://img.icons8.com/color/96/fantasy.png" class="profile-avatar-large">
            </div>
            <h2 id="display-name" class="hero-name">Caricamento...</h2>
            <div class="friend-code-badge">CODICE: <span id="my-friend-code">---</span></div>
            
            <button class="btn-action" onclick="toggleSettings()">⚙️ MODIFICA IDENTITÀ</button>
        </section>

        <div id="settings-panel">
            <h3 style="font-family: 'Grenze Gotisch'; margin-top: 0;">🛠️ Archivio Identità</h3>
            
            <label>Nome dell'Eroe</label>
            <input type="text" id="edit-name" class="input-field" placeholder="Es: Arthas">

            <label>Immagine (URL)</label>
            <input type="text" id="edit-photo-url" class="input-field" placeholder="Incolla URL immagine...">

            <div style="text-align: center; margin: 10px 0;">— oppure —</div>

            <label for="file-upload" style="cursor:pointer; color: var(--blood); font-weight: bold; display: block; text-align: center; border: 1px dashed var(--blood); padding: 10px;">
                📁 CARICA DALL'ARCHIVIO
            </label>
            <input type="file" id="file-upload" accept="image/*" style="display: none;">
            <small id="file-name" style="display:block; text-align:center;"></small>

            <button onclick="updateProfile()" class="btn-action" style="background: var(--leather); color: white;">SALVA MODIFICHE</button>
        </div>

        <section class="allies-section">
            <h3 style="font-family: 'Grenze Gotisch'; color: var(--gold);">🤝 Cerca Alleati</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="search-friend-code" class="input-field" style="margin: 0;" placeholder="DRK-XXXX">
                <button onclick="addFriend()" class="btn-action" style="margin: 0; width: auto;">AGGIUNGI</button>
            </div>

            <h4 style="margin-top: 20px;">I TUOI ALLEATI</h4>
            <div id="friends-list">
                <p style="font-style: italic; opacity: 0.6;">Nessun alleato trovato...</p>
            </div>
        </section>

        <button onclick="logout()" class="btn-action" style="border-color: var(--blood); color: var(--blood); margin-top: 50px;">LOGOUT</button>
    </main>
</div>

<script>
    // Logica per mostrare/nascondere il pannello
    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }

    // Anteprima nome file
    document.getElementById('file-upload').onchange = function() {
        if(this.files[0]) {
            document.getElementById('file-name').innerText = "Pronto per il caricamento: " + this.files[0].name;
        }
    };
</script>

<script type="module">
    // --- LOGICA DI AGGIORNAMENTO (Sostituisce profile.js per questa prova) ---
    // Nota: Ho incluso la logica qui per assicurarmi che funzioni subito.

    const currentUser = JSON.parse(localStorage.getItem('currentUser'));

    function init() {
        if (!currentUser) {
            window.location.href = 'login.html';
            return;
        }
        document.getElementById('display-name').innerText = currentUser.username;
        document.getElementById('display-avatar').src = currentUser.avatar || "https://img.icons8.com/color/96/fantasy.png";
        document.getElementById('my-friend-code').innerText = currentUser.friendCode || "DRK-0000";
    }

    window.updateProfile = function() {
        const newName = document.getElementById('edit-name').value;
        const photoUrl = document.getElementById('edit-photo-url').value;
        const fileInput = document.getElementById('file-upload');

        if (newName) currentUser.username = newName;
        
        if (fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                currentUser.avatar = e.target.result;
                saveAndReload();
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else if (photoUrl) {
            currentUser.avatar = photoUrl;
            saveAndReload();
        } else {
            saveAndReload();
        }
    }

    function saveAndReload() {
        // Aggiorna database utenti (simulato)
        let users = JSON.parse(localStorage.getItem('users')) || [];
        users = users.map(u => u.id === currentUser.id ? currentUser : u);
        
        localStorage.setItem('users', JSON.stringify(users));
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        
        alert("Identità aggiornata, Eroe!");
        location.reload();
    }

    window.logout = function() {
        localStorage.removeItem('currentUser');
        window.location.href = 'login.html';
    }

    init();
</script>

</body>
</html>
