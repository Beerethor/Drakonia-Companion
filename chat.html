<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Missiva - Drakonia</title>
    <link rel="icon" type="image/png" href="icon/icon_192x192.png">
    <link rel="apple-touch-icon" href="icon/icon_192x192.png">
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --gold: #b8860b; 
            --parchment: #f4e4bc; 
            --leather: #2c1e11; 
            --blood: #8b0000; 
            --ink: #1a110a; 
            --shadow: rgba(0,0,0,0.5);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: var(--ink) url('https://www.transparenttextures.com/patterns/dark-leather.png'); 
            color: var(--parchment); 
            font-family: 'Almendra', serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            height: -webkit-fill-available;
            overflow: hidden;
        }

        .header { 
            background: var(--leather); 
            padding: 12px 18px; 
            border-bottom: 2px solid var(--gold); 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            box-shadow: 0 2px 10px var(--shadow);
            z-index: 10;
        }

        .back-link { color: var(--gold); text-decoration: none; font-size: 1.5rem; line-height: 1; }

        #expiry-timer { 
            font-size: 0.75rem; 
            text-align: center; 
            padding: 6px; 
            background: rgba(139, 0, 0, 0.4); 
            color: #ffcccc; 
            border-bottom: 1px solid rgba(184, 134, 11, 0.3);
            font-family: 'MedievalSharp';
        }

        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            -webkit-overflow-scrolling: touch;
        }

        .msg { 
            max-width: 80%; 
            padding: 12px 16px; 
            border-radius: 15px; 
            line-height: 1.4; 
            position: relative; 
            word-wrap: break-word;
            font-size: 1.05rem;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.4);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg.sent { 
            align-self: flex-end; 
            background: linear-gradient(135deg, #d4af37, var(--gold));
            color: #1a110a; 
            border-bottom-right-radius: 2px; 
            font-weight: 500;
        }

        .msg.received { 
            align-self: flex-start; 
            background: #2a221a;
            color: var(--parchment); 
            border: 1px solid var(--gold); 
            border-bottom-left-radius: 2px; 
        }

        .msg-time {
            display: block;
            font-size: 0.65rem;
            margin-top: 5px;
            opacity: 0.7;
            text-align: right;
        }

        .input-area { 
            background: var(--leather); 
            padding: 12px; 
            display: flex; 
            gap: 10px; 
            border-top: 2px solid var(--gold);
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }

        input { 
            flex: 1; 
            background: var(--parchment); 
            border: 2px solid transparent; 
            padding: 12px 15px; 
            font-family: 'Almendra'; 
            border-radius: 25px; 
            font-size: 16px; 
            color: #1a110a;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        input:focus { outline: none; border-color: var(--gold); background: #fff; }

        .send-btn { 
            background: var(--gold); 
            border: none; 
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--leather);
            box-shadow: 0 2px 5px var(--shadow);
            transition: transform 0.1s;
        }

        .send-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="header">
        <a href="messaggi.html" class="back-link">«</a>
        <h3 id="chat-with-name" style="margin:0; color:var(--gold); letter-spacing: 1px;">MISSIVA</h3>
        <div style="width:24px;"></div>
    </div>
    
    <div id="expiry-timer">Verificando i sigilli temporali...</div>
    
    <div id="chat-window"></div>
    
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Scrivi un messaggio..." autocomplete="off" enterkeyhint="send">
        <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
        authDomain: "drakonia-companion.firebaseapp.com",
        projectId: "drakonia-companion",
        storageBucket: "drakonia-companion.firebasestorage.app",
        messagingSenderId: "803844500713",
        appId: "1:803844500713:web:c902b67f4e395bd20c9478"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const urlParams = new URLSearchParams(window.location.search);
    const friendId = urlParams.get('id');
    const friendName = urlParams.get('name');
    let chatId = null;

    if (!friendId) location.href = 'messaggi.html';
    document.getElementById('chat-with-name').innerText = (friendName || "Viandante").toUpperCase();

    const inputField = document.getElementById('msg-input');
    const chatWindow = document.getElementById('chat-window');

    inputField.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

    auth.onAuthStateChanged(user => {
        if (user) {
            chatId = user.uid < friendId ? `${user.uid}_${friendId}` : `${friendId}_${user.uid}`;
            
            // --- LOGICA SEGNA COME LETTO ---
            // Se entriamo in chat e l'ultimo mittente non siamo noi, resettiamo lo stato "nuovo"
            db.collection("chats").doc(chatId).get().then(doc => {
                if (doc.exists && doc.data().lastSenderId !== user.uid) {
                    // Aggiorniamo il lastSenderId a noi stessi per "spegnere" il rosso nell'inbox
                    db.collection("chats").doc(chatId).update({ 
                        lastSenderId: user.uid 
                    }).catch(e => console.log("Silent update fail (nuova chat)"));
                }
            });

            // Listener Messaggi
            db.collection("chats").doc(chatId).collection("messages").orderBy("timestamp", "asc")
            .onSnapshot(snap => {
                chatWindow.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const isSent = m.senderId === user.uid;
                    const time = m.timestamp ? new Date(m.timestamp.toMillis()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";
                    
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `msg ${isSent ? 'sent' : 'received'}`;
                    msgDiv.innerHTML = `${m.text} <span class="msg-time">${time}</span>`;
                    chatWindow.appendChild(msgDiv);
                });
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }, err => console.error("Errore snapshot:", err));

            // Listener Scadenza
            db.collection("chats").doc(chatId).onSnapshot(doc => {
                if (doc.exists && doc.data().lastUpdate) {
                    const last = doc.data().lastUpdate.toMillis();
                    const expiry = last + (7 * 24 * 60 * 60 * 1000);
                    const updateTimer = () => {
                        const diff = expiry - Date.now();
                        if (diff <= 0) {
                            document.getElementById('expiry-timer').innerText = "QUESTA MISSIVA È SVANITA NEL NULLA.";
                            return;
                        }
                        const d = Math.floor(diff / (1000*60*60*24));
                        const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
                        const m = Math.floor((diff % (1000*60*60)) / (1000*60));
                        document.getElementById('expiry-timer').innerText = `📜 I messaggi svaniranno tra: ${d}g ${h}h ${m}m`;
                    };
                    updateTimer();
                } else {
                    document.getElementById('expiry-timer').innerText = "📜 Prima missiva di questa conversazione.";
                }
            });
        } else { location.href = 'login.html'; }
    });

    async function sendMessage() {
        const text = inputField.value.trim();
        if (!text || !chatId) return;

        inputField.value = ""; 
        inputField.focus();

        try {
            const now = firebase.firestore.FieldValue.serverTimestamp();
            const batch = db.batch();
            
            const chatRef = db.collection("chats").doc(chatId);
            // AGGIUNTA: lastSenderId inserito nel batch
            batch.set(chatRef, {
                lastUpdate: now,
                lastSenderId: auth.currentUser.uid, // <--- Fondamentale per il rosso nell'inbox
                participants: [auth.currentUser.uid, friendId]
            }, { merge: true });

            const msgRef = chatRef.collection("messages").doc();
            batch.set(msgRef, {
                senderId: auth.currentUser.uid,
                text: text,
                timestamp: now
            });

            await batch.commit();
            chatWindow.scrollTop = chatWindow.scrollHeight;
        } catch (e) {
            console.error("Errore invio:", e);
            alert("La magia del messaggio è fallita. Riprova, eroe.");
        }
    }
</script>
</body>
</html>
