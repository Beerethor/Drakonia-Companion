<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Missiva - Drakonia</title>
    <link rel="icon" type="image/png" href="icon/icon_192x192.png">
    <link rel="apple-touch-icon" href="icon/icon_192x192.png">
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --gold: #b8860b; 
            --parchment: #f4e4bc; 
            --leather: #2c1e11; 
            --blood: #8b0000; 
            --ink: #1a110a; 
            --shadow: rgba(0,0,0,0.5);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; /* Blocca lo scroll della pagina intera */
        }

        body { 
            background: var(--ink) url('https://www.transparenttextures.com/patterns/dark-leather.png'); 
            color: var(--parchment); 
            font-family: 'Almendra', serif; 
            display: flex; 
            flex-direction: column; 
        }

        /* HEADER FIX */
        .header { 
            background: var(--leather); 
            padding: 15px 20px; 
            padding-top: calc(15px + env(safe-area-inset-top));
            border-bottom: 2px solid var(--gold); 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            z-index: 10;
        }

        .back-link { color: var(--gold); text-decoration: none; font-size: 1.8rem; font-weight: bold; }

        #expiry-timer { 
            font-size: 0.75rem; 
            text-align: center; 
            padding: 8px; 
            background: rgba(44, 30, 17, 0.9); 
            color: var(--gold); 
            border-bottom: 1px solid var(--gold);
            font-family: 'MedievalSharp';
            text-transform: uppercase;
        }

        /* FINESTRA CHAT CON SCROLLBAR */
        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            -webkit-overflow-scrolling: touch;
        }

        /* Stile Scrollbar Medievale */
        #chat-window::-webkit-scrollbar { width: 6px; }
        #chat-window::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        #chat-window::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .msg { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            line-height: 1.4; 
            position: relative; 
            word-wrap: break-word;
            font-size: 1.1rem;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.3);
        }

        .msg.sent { 
            align-self: flex-end; 
            background: linear-gradient(135deg, #d4af37, var(--gold));
            color: #1a110a; 
            border-bottom-right-radius: 2px; 
        }

        .msg.received { 
            align-self: flex-start; 
            background: #2a221a;
            color: var(--parchment); 
            border: 1px solid var(--gold); 
            border-bottom-left-radius: 2px; 
        }

        .msg-time {
            display: block; font-size: 0.65rem; margin-top: 5px;
            opacity: 0.7; text-align: right;
        }

        /* AREA INPUT FISSA IN BASSO */
        .input-area { 
            background: var(--leather); 
            padding: 15px; 
            display: flex; 
            gap: 10px; 
            border-top: 2px solid var(--gold);
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        input { 
            flex: 1; 
            background: var(--parchment); 
            border: none; 
            padding: 12px 18px; 
            font-family: 'Almendra'; 
            border-radius: 30px; 
            font-size: 16px; /* Evita zoom su iOS */
            color: #1a110a;
        }

        .send-btn { 
            background: var(--gold); 
            border: none; 
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--leather);
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="messaggi.html" class="back-link">«</a>
        <h3 id="chat-with-name" style="margin:0; letter-spacing: 1px;">MISSIVA</h3>
        <div style="width:24px;"></div>
    </div>
    
    <div id="expiry-timer">Verificando i sigilli temporali...</div>
    
    <div id="chat-window"></div>
    
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Invia una missiva..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
        authDomain: "drakonia-companion.firebaseapp.com",
        projectId: "drakonia-companion",
        storageBucket: "drakonia-companion.firebasestorage.app",
        messagingSenderId: "803844500713",
        appId: "1:803844500713:web:c902b67f4e395bd20c9478"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const urlParams = new URLSearchParams(window.location.search);
    const friendId = urlParams.get('id');
    const friendName = urlParams.get('name');
    let chatId = null;

    if (!friendId) location.href = 'messaggi.html';
    document.getElementById('chat-with-name').innerText = (friendName || "Viandante").toUpperCase();

    const inputField = document.getElementById('msg-input');
    const chatWindow = document.getElementById('chat-window');

    inputField.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

    auth.onAuthStateChanged(user => {
        if (user) {
            chatId = user.uid < friendId ? `${user.uid}_${friendId}` : `${friendId}_${user.uid}`;
            
            // Marcatore di lettura
            db.collection("chats").doc(chatId).get().then(doc => {
                if (doc.exists && doc.data().lastSenderId !== user.uid) {
                    db.collection("chats").doc(chatId).update({ lastSenderId: user.uid });
                }
            });

            // Listener Messaggi con Auto-Scroll
            db.collection("chats").doc(chatId).collection("messages").orderBy("timestamp", "asc")
            .onSnapshot(snap => {
                chatWindow.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const isSent = m.senderId === user.uid;
                    const time = m.timestamp ? new Date(m.timestamp.toMillis()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";
                    
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `msg ${isSent ? 'sent' : 'received'}`;
                    msgDiv.innerHTML = `${m.text} <span class="msg-time">${time}</span>`;
                    chatWindow.appendChild(msgDiv);
                });
                chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
            });

            // Timer di Scadenza
            setInterval(() => {
                db.collection("chats").doc(chatId).get().then(doc => {
                    if (doc.exists && doc.data().lastUpdate) {
                        const expiry = doc.data().lastUpdate.toMillis() + (7 * 24 * 60 * 60 * 1000);
                        const diff = expiry - Date.now();
                        if (diff <= 0) {
                            document.getElementById('expiry-timer').innerText = "MISSIVA DISSOLTA NEL TEMPO";
                        } else {
                            const d = Math.floor(diff / (1000*60*60*24));
                            const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
                            const m = Math.floor((diff % (1000*60*60)) / (1000*60));
                            document.getElementById('expiry-timer').innerText = `⌛ Svanisce tra: ${d}g ${h}h ${m}m`;
                        }
                    }
                });
            }, 60000); // Aggiorna ogni minuto
        } else { location.href = 'login.html'; }
    });

    async function sendMessage() {
        const text = inputField.value.trim();
        if (!text || !chatId) return;
        inputField.value = ""; 

        try {
            const now = firebase.firestore.FieldValue.serverTimestamp();
            const batch = db.batch();
            const chatRef = db.collection("chats").doc(chatId);
            
            batch.set(chatRef, {
                lastUpdate: now,
                lastSenderId: auth.currentUser.uid,
                participants: [auth.currentUser.uid, friendId]
            }, { merge: true });

            const msgRef = chatRef.collection("messages").doc();
            batch.set(msgRef, {
                senderId: auth.currentUser.uid,
                text: text,
                timestamp: now
            });

            await batch.commit();
        } catch (e) { console.error(e); }
    }
</script>
</body>
</html>
