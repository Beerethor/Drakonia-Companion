<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drakonia - Installatore GameData</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #2d2d2d; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border: 1px solid #444; max-width: 500px; }
        h1 { color: #d4af37; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 2px; }
        p { line-height: 1.6; color: #bbb; }
        button { background-color: #d4af37; color: #1a1a1a; border: none; padding: 12px 24px; font-size: 1rem; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s; margin-top: 1.5rem; }
        button:hover { background-color: #f1c40f; transform: scale(1.05); }
        #status { margin-top: 1.5rem; padding: 10px; border-radius: 4px; display: none; font-family: monospace; font-size: 0.9rem; }
        .success { background: #1e3a1e; color: #4ade80; border: 1px solid #4ade80; display: block !important; }
        .error { background: #3a1e1e; color: #f87171; border: 1px solid #f87171; display: block !important; }
    </style>
</head>
<body>

<div class="card">
    <h1>Drakonia Setup</h1>
    <p>Questo strumento configurerà le classi <strong>Guerriero, Truffatore, Saggio, Stregone</strong> e <strong>Druido</strong> nel tuo database Firestore.</p>
    <p><small>Assicurati che il file <code>init-gamedata.js</code> sia nella stessa cartella.</small></p>
    
    <button id="installBtn">LANCIA INSTALLAZIONE</button>
    
    <div id="status"></div>
</div>

<script type="module">
    import { installDrakonia } from './init-gamedata.js';

    const btn = document.getElementById('installBtn');
    const status = document.getElementById('status');

    btn.addEventListener('click', async () => {
        btn.disabled = true;
        btn.innerText = "Installazione in corso...";
        status.className = '';
        status.innerText = "Connessione a Firestore...";
        status.style.display = 'block';

        try {
            await installDrakonia();
            status.className = 'success';
            status.innerText = "✅ CONFIGURAZIONE COMPLETATA!\nLe classi sono state caricate su Firestore.";
            btn.innerText = "INSTALLATO";
        } catch (err) {
            status.className = 'error';
            status.innerText = "❌ ERRORE: " + err.message;
            btn.disabled = false;
            btn.innerText = "RIPROVA";
        }
    });
</script>

</body>
</html>
