<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Drakonia</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="overlay"></div> <!-- Effetto oscuramento per far risaltare il form -->
    
    <div class="login-container">
        <div class="ornament top"></div> <!-- Decorazione grafica -->
        
        <header-login>
            <h1>DRAKONIA</h1>
            <div class="divider"></div>
            <p class="subtitle">Varca la soglia del destino</p>
        </header-login>
        
        <form id="login-form">
            <div class="input-group">
                <label for="email">Email dell'Eroe</label>
                <input type="email" id="email" required placeholder="pergamena@regno.it">
                <div class="input-border"></div>
            </div>
            
            <div class="input-group">
                <label for="password">Parola d'Ordine</label>
                <input type="password" id="password" required placeholder="********">
                <div class="input-border"></div>
            </div>

            <div class="login-actions">
                <button type="submit" class="btn-fantasy main-btn">
                    <span>ENTRA</span>
                </button>
                <button type="button" onclick="registerUser()" class="btn-fantasy secondary-btn">
                    <span>NUOVO EROE</span>
                </button>
            </div>
        </form>
        
        <p id="auth-error" class="error-msg"></p>
        <a href="index.html" class="back-link">Ritorna alla Taverna</a>
        
        <div class="ornament bottom"></div>
    </div>
</body>
</html>
