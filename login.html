<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Drakonia</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="overlay"></div>
    
    <div class="login-container">
        <h1>DRAKONIA</h1>
        <div class="divider"></div>
        <p class="subtitle">Varca la soglia del destino</p>
        
        <form id="login-form">
            <div class="input-group">
                <label>Email dell'Eroe</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-group">
                <label>Parola d'Ordine</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit" class="btn-fantasy main-btn">ENTRA</button>
        </form>

        <div class="divider-text">oppure</div>

        <button type="button" id="google-login-btn" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            <span>Entra con Google</span>
        </button>
        
        <p id="auth-error" class="error-msg"></p>
        <a href="index.html" class="back-link">Ritorna alla Taverna</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCW7QYU-iMAln3hUrVHuoLJzEDoUEfLJnM",
          authDomain: "drakonia-companion.firebaseapp.com",
          projectId: "drakonia-companion",
          appId: "1:803844500713:web:c902b67f4e395bd20c9478"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                window.location.href = "index.html";
            } catch (err) { document.getElementById('auth-error').innerText = "Credenziali errate."; }
        };

        document.getElementById('google-login-btn').onclick = async () => {
            try {
                await signInWithPopup(auth, provider);
                window.location.href = "index.html";
            } catch (err) { document.getElementById('auth-error').innerText = "Login Google fallito."; }
        };
    </script>
</body>
</html>
